<hr />
<h2 id="1-basic-syntax-and-the-is-a-relationship">1. Basic syntax and the &ldquo;is-a&rdquo; relationship</h2>
<pre><code class="language-cpp">class Animal {                     // base class (a.k.a. superclass / parent)
public:
    void breathe() { /* ... */ }
    std::string name;
};

class Dog : public Animal {        // derived class (subclass / child)
public:
    void bark() { /* ... */ }
};
</code></pre>
<pre><code>   Dog IS-A Animal.
        Animal (base)
          ^  public inheritance
          |
        Dog (derived) -- adds bark(), inherits breathe() and name

   Dog d;
   d.breathe();   // inherited from Animal
   d.bark();      // Dog's own
   d.name = &quot;Rex&quot;;// inherited data member
</code></pre>
<pre><code>   The &quot;is-a&quot; test: &quot;Every Dog IS-A(n) Animal.&quot; If that sentence is false, do
   NOT use public inheritance (use composition, chapter 10). Classic mistake:
   &quot;Stack is-a vector&quot; — no; Stack HAS-A vector.
</code></pre>
<hr />
<h2 id="2-object-layout-under-inheritance">2. Object layout under inheritance</h2>
<p>A derived object <strong>contains</strong> a base subobject, followed by its own members.</p>
<pre><code class="language-cpp">class Base    { int a; };
class Derived : public Base { int b; };
</code></pre>
<div class="diagram"><div class="diagram-title">Derived object layout</div><div class="dbox blue"><div class="dbox-title">Derived object in memory</div><div class="dbox teal"><div class="dbox-title">Base subobject</div><div class="dtext"><code>int a</code></div></div><div class="dbox purple"><div class="dbox-title">Derived members</div><div class="dtext"><code>int b</code></div></div><div class="dtext">A <code>Derived*</code> can be treated as a <code>Base*</code> (Base part at the front) — upcasting (§5)</div></div></div>
<hr />
<h2 id="3-the-three-inheritance-access-modes">3. The three inheritance access modes</h2>
<p><code>public</code>, <code>protected</code>, <code>private</code> inheritance change how the base&rsquo;s members are
seen <em>through the derived class</em>.</p>
<pre><code class="language-cpp">class Pub  : public    Base {};   // is-a; base's public-&gt;public, protected-&gt;protected
class Prot : protected Base {};   // base's public &amp; protected -&gt; protected
class Priv : private   Base {};   // base's public &amp; protected -&gt; private
</code></pre>
<pre><code>   Base member  | public inh. | protected inh. | private inh.
   -------------+-------------+----------------+-------------
   public       | public      | protected      | private
   protected    | protected   | protected      | private
   private      | (inaccessible in all cases)

   public inheritance   = &quot;is-a&quot; (the common, meaningful one)
   private inheritance  = &quot;implemented-in-terms-of&quot; (like composition; rare)
   protected inheritance= even rarer; usually a design smell
</code></pre>
<pre><code>   99% of the time you want PUBLIC inheritance. Private inheritance is an
   alternative to composition when you need access to protected members or to
   override virtuals — prefer a member (composition) unless you need those.
</code></pre>
<hr />
<h2 id="4-construction--destruction-order-with-inheritance">4. Construction &amp; destruction order with inheritance</h2>
<pre><code>   Constructing a Derived:
     1. Base constructor runs first (the base subobject is built)
     2. Derived's members initialized (declaration order)
     3. Derived constructor body runs
   Destroying: EXACT REVERSE
     3. Derived destructor body

     1. Base destructor runs last

struct Derived : Base { Derived(){puts(&quot;Derived ctor&quot;);} ~Derived(){puts(&quot;Derived dtor&quot;);} };

<h2 id="5-upcasting-and-downcasting">5. Upcasting and downcasting</h2>
<pre><code class="language-cpp">Dog d;
Animal* ap = &amp;d;      // UPCAST: Derived* -&gt; Base*  (always safe, implicit)
Animal&amp; ar = d;       // upcast via reference too

Dog* dp1 = static_cast&lt;Dog*&gt;(ap);    // you ASSERT it's really a Dog (unchecked)

</code></pre>
<hr />
<h2 id="6-name-hiding--using">6. Name hiding &amp; <code>using</code></h2>
<p>A name in the derived class <strong>hides</strong> <em>all</em> base overloads of that name — even
ones with different signatures.</p>
<pre><code class="language-cpp">struct Base {
    void f(int)    { puts(&quot;Base::f(int)&quot;); }
    void f(double) { puts(&quot;Base::f(double)&quot;); }
};

</code></pre>

         using Base::f;                 // un-hide Base::f overloads
         void f(std::string) { ... }
     };

</code></pre>
<hr />
<h2 id="7-object-slicing-a-critical-pitfall">7. Object slicing (a critical pitfall)</h2>
<p>Assigning/copying a derived object into a <strong>base value</strong> chops off the derived
part — the &ldquo;slice.&rdquo;</p>

</code></pre>

                  v
   Animal: [ Animal part ]              &lt;- Dog part SLICED off (discarded)

   Consequence: virtual calls on 'a' use Animal's behavior, not Dog's.
   FIX: use pointers/references for polymorphism:
     std::vector&lt;std::unique_ptr&lt;Animal&gt;&gt; zoo;   // stores Dogs as Animal* -&gt; no slicing
</code></pre>
<p>Slicing is one of the most common OOP bugs — chapter 06 (polymorphism needs
references/pointers) and chapter 15 revisit it.</p>
<hr />
<h2 id="8-final--stop-further-inheritanceoverriding">8. <code>final</code> — stop further inheritance/overriding</h2>
<pre><code class="language-cpp">class Sealed final { };            // no class may inherit from Sealed
// class X : Sealed {};            // ERROR

class Widget {
    virtual void draw() final;     // no override in derived (chapter 06)
};
</code></pre>
<pre><code>   final on a CLASS  -&gt; can't be a base class.
   final on a METHOD -&gt; can't be overridden further.
   Used to lock a design and to enable devirtualization optimizations.
</code></pre>
<hr />

a-&gt;sound();     // &quot;...&quot;  &lt;- calls Animal::sound! (based on the POINTER's type)
</code></pre>
<pre><code>   Without 'virtual', the compiler picks the function by the STATIC type of the
   expression (Animal*), not the DYNAMIC type of the object (Dog).
   -&gt; a-&gt;sound() == Animal::sound()  even though it points at a Dog. Not useful.
</code></pre>
<hr />
<h2 id="2-virtual-enables-dynamic-dispatch">2. <code>virtual</code> enables dynamic dispatch</h2>
<p>Mark the function <code>virtual</code> in the base; now the call resolves by the <strong>dynamic
type</strong> of the actual object.</p>
<pre><code class="language-cpp">struct Animal {
    virtual std::string sound() const { return &quot;...&quot;; }   // virtual!
    virtual ~Animal() = default;                            // virtual dtor (§7)
};
struct Dog : Animal {
    std::string sound() const override { return &quot;Woof&quot;; }  // override
};
struct Cat : Animal {
    std::string sound() const override { return &quot;Meow&quot;; }
};

Animal* a = new Dog();
a-&gt;sound();     // &quot;Woof&quot;  &lt;- resolves to Dog::sound at RUNTIME. 
</code></pre>
<pre><code>   virtual -&gt; the call is dispatched based on the OBJECT'S REAL type:
     Animal* -&gt; Dog object  =&gt; Dog::sound()
     Animal* -&gt; Cat object  =&gt; Cat::sound()
   ONE line of code, MANY behaviors. This is runtime polymorphism.
</code></pre>
<pre><code>   for (Animal* a : {mk_dog(), mk_cat(), mk_dog()})
       std::cout &lt;&lt; a-&gt;sound();          // Woof Meow Woof
   The caller doesn't know or care which concrete type it has.
</code></pre>
<p>Runnable: <a href="examples/ch06_polymorphism.cpp"><code>examples/ch06_polymorphism.cpp</code></a>.</p>
<hr />
<h2 id="3-how-it-works-the-vtable-and-vptr">3. How it works: the vtable and vptr</h2>
<p>For each polymorphic class the compiler builds a <strong>vtable</strong> (virtual table): an
array of function pointers to the class&rsquo;s virtual functions. Each object gets a
hidden <strong>vptr</strong> pointing to its class&rsquo;s vtable.</p>
<pre><code>   Class vtables (one per class, shared):
     Dog::vtable        Cat::vtable
     +-------------+    +-------------+
     | &amp;Dog::sound |    | &amp;Cat::sound |
     | &amp;Animal::~  |    | &amp;Animal::~  |
     +-------------+    +-------------+

   Objects (each carries a hidden vptr):
     dog: [ vptr -&gt; Dog::vtable | ...Dog data... ]
     cat: [ vptr -&gt; Cat::vtable | ...Cat data... ]

   a-&gt;sound()  with a = &amp;dog:
     1. read dog.vptr        -&gt; Dog::vtable
     2. load slot[0]         -&gt; &amp;Dog::sound
     3. call it              -&gt; &quot;Woof&quot;
   Two pointer dereferences + an indirect call. That's the cost of 'virtual'.
</code></pre>
<pre><code>   Non-virtual call:  direct call to a known address (can inline).
   Virtual call:      load vptr -&gt; load slot -&gt; indirect call (cannot inline
                      unless the compiler proves the dynamic type).

   Size cost: a polymorphic object is larger by one pointer (the vptr).
     struct Empty {};                sizeof == 1
     struct Poly { virtual ~Poly(); }; sizeof == 8 (the vptr) on 64-bit
</code></pre>
<p>Runnable: <a href="examples/ch06_vtable.cpp"><code>examples/ch06_vtable.cpp</code></a> (prints sizes to
show the vptr overhead).</p>
<hr />
<h2 id="4-override--say-what-you-mean-always-use-it">4. <code>override</code> — say what you mean (always use it)</h2>
<p><code>override</code> tells the compiler &ldquo;this is meant to override a base virtual.&rdquo; If it
doesn&rsquo;t actually override one (typo, wrong signature, missing <code>const</code>), you get a
<strong>compile error</strong> instead of a silent bug.</p>
<pre><code class="language-cpp">struct Base { virtual void f(int) const; };

struct Good : Base { void f(int) const override; };   // OK: really overrides

struct Bad : Base {
    void f(int) override;         // ERROR: not const -&gt; doesn't match Base::f
    void f(long) override;        // ERROR: different param -&gt; not an override
    void g() override;            // ERROR: Base has no virtual g()
};
</code></pre>
<pre><code>   WITHOUT override, 'void f(int)' (non-const) would silently create a NEW
   function that HIDES nothing and is never called polymorphically -&gt; the classic
   &quot;why isn't my override being called?&quot; bug.
   RULE: put 'override' on every intended override. It's free insurance.
</code></pre>
<hr />
<h2 id="5-final-on-virtual-functions">5. <code>final</code> on virtual functions</h2>
<pre><code class="language-cpp">struct Base    { virtual void f(); };
struct Mid : Base { void f() final; };   // Mid::f is the last word
struct Leaf : Mid { void f(); };         // ERROR: can't override a final f()
</code></pre>
<pre><code>   final = &quot;no further overrides.&quot; Locks the behavior and lets the compiler
   devirtualize (turn virtual calls into direct calls) when it knows the type.
</code></pre>
<hr />
<h2 id="6-calling-the-base-version-explicitly">6. Calling the base version explicitly</h2>
<pre><code class="language-cpp">struct Derived : Base {
    void f() override {
        Base::f();          // call the base implementation first...
        // ...then add derived behavior
    }
};
</code></pre>
<pre><code>   Base::f()  &lt;- qualified call bypasses virtual dispatch and runs Base's version.
   Common for extending (not replacing) base behavior.
</code></pre>
<hr />
<h2 id="7-the-virtual-destructor-rule-critical">7. The virtual destructor rule (CRITICAL)</h2>
<p><strong>If a class is meant to be used polymorphically (deleted through a base
pointer), its destructor MUST be virtual.</strong> Otherwise <code>delete base_ptr</code> only runs
the base destructor — the derived part leaks or is destroyed incorrectly (UB).</p>
<pre><code class="language-cpp">struct Base { /* no virtual dtor! */ ~Base() { puts(&quot;~Base&quot;); } };
struct Derived : Base { std::string big; ~Derived() { puts(&quot;~Derived&quot;); } };

Base* p = new Derived();
delete p;              // prints only &quot;~Base&quot; -&gt; ~Derived NEVER runs -&gt; UB/leak!
</code></pre>
<pre><code>   delete (Base*) pointing to Derived, with a NON-virtual dtor:
     -&gt; only ~Base runs. Derived's members (big) not destroyed -&gt; LEAK / UB.

   FIX: make the base destructor virtual:
     struct Base { virtual ~Base() = default; };
   Now delete p runs ~Derived THEN ~Base (correct order).
</code></pre>
<pre><code>   +---------------------------------------------------------------+
   | If a class has ANY virtual function, give it a virtual dtor.  |
   | If you'll delete derived objects via base pointers, virtual   |
   | dtor is MANDATORY. When in doubt for a base class: virtual ~. |
   +---------------------------------------------------------------+
</code></pre>
<p>Runnable: <a href="examples/ch06_virtual_dtor.cpp"><code>examples/ch06_virtual_dtor.cpp</code></a>.</p>
<hr />
<h2 id="8-pure-virtual-preview--abstract-classes">8. Pure virtual preview &amp; abstract classes</h2>
<p>A <code>virtual f() = 0;</code> is a <strong>pure virtual</strong> function — no (required) body,
making the class <strong>abstract</strong> (can&rsquo;t be instantiated). That&rsquo;s chapter 07.</p>
<pre><code class="language-cpp">struct Shape {
    virtual double area() const = 0;   // pure virtual -&gt; Shape is abstract
    virtual ~Shape() = default;
};
// Shape s;             // ERROR: abstract
</code></pre>
<hr />
<h2 id="9-dont-call-virtuals-from-constructorsdestructors">9. Don&rsquo;t call virtuals from constructors/destructors</h2>
<p>During Base&rsquo;s constructor, the object is <em>not yet</em> a Derived, so virtual calls
resolve to <strong>Base&rsquo;s</strong> version (the vptr points to Base&rsquo;s vtable at that moment).</p>
<pre><code class="language-cpp">struct Base {
    Base() { init(); }                 // calls Base::init, NOT Derived::init!
    virtual void init() { puts(&quot;Base::init&quot;); }
};
struct Derived : Base {
    void init() override { puts(&quot;Derived::init&quot;); }
};
// Derived d;  prints &quot;Base::init&quot;  (surprising!)
</code></pre>
<pre><code>   During Base::Base(), the Derived part doesn't exist yet -&gt; vptr = Base's.
   So virtual dispatch gives Base::init. Same in destructors (reverse).
   RULE: avoid calling virtual functions in constructors/destructors.
</code></pre>
<hr />
<h2 id="10-cost--when-to-use-runtime-polymorphism">10. Cost &amp; when to use runtime polymorphism</h2>
<pre><code>   COST of virtual: +1 vptr per object, an indirect call (usually cheap, but
     not inlinable), and it disables some optimizations.
   USE it when: you need a heterogeneous collection behind one interface, or
     runtime-selected behavior (plugins, shapes, strategies).
   AVOID it when: the type set is fixed &amp; known (std::variant, chapter 14) or
     you need zero overhead (templates/CRTP — see cpp-templates guide).
</code></pre>
<pre><code>   Runtime polymorphism (virtual)   vs   std::variant + visit (closed set)
     open set of types                    fixed set of types
     heap + base pointers                 value semantics, no heap
     indirect call                        visit (often devirtualized)
   Chapter 14 compares these in depth.
</code></pre>
<hr />
<h2 id="11-summary">11. Summary</h2>
<div class="diagram"><div class="diagram-title">Polymorphism &amp; virtual functions</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><code>virtual</code> → calls dispatch on the <b>object's dynamic type</b> (through base pointer/reference). Without it, the <b>static</b> type decides (no polymorphism)</div><div class="dtext">Mechanism: per-class <b>vtable</b> of function ptrs + per-object <b>vptr</b>. Cost: one extra pointer per object + an indirect call</div><div class="dtext">Always write <code>override</code> (catches signature mistakes). <code>final</code> locks a method/class and enables devirtualization</div><div class="dtext"><b>Virtual destructor</b> is mandatory for polymorphic base classes (else <code>delete</code>-through-base = UB/leak)</div><div class="dtext">Don't call virtuals from ctors/dtors (resolve to current class)</div></div></div>

<p>Abstraction — the second pillar — is about defining <strong>what</strong> something does
without saying <strong>how</strong>. In C++ this is expressed with <strong>pure virtual functions</strong>,
<strong>abstract classes</strong>, and <strong>interfaces</strong>. This is how you program to a contract.</p>
<p>Prereq: <a href="06-polymorphism-vtables.md">06-polymorphism-vtables.md</a>.</p>
<hr />
<h2 id="1-pure-virtual-functions">1. Pure virtual functions</h2>
<p>A pure virtual function declares an operation with <strong>no implementation required</strong>
in the base — derived classes <em>must</em> provide one.</p>
<pre><code class="language-cpp">class Shape {
public:
    virtual double area() const = 0;        // pure virtual (the &quot;= 0&quot;)
    virtual double perimeter() const = 0;
    virtual ~Shape() = default;             // virtual dtor (chapter 06 §7)
};
</code></pre>
<pre><code>   virtual double area() const = 0;
                                ^^^
   &quot;= 0&quot; means PURE virtual: no body needed here; subclasses must override it.
   A class with &gt;=1 pure virtual is ABSTRACT: it cannot be instantiated.
</code></pre>
<hr />
<h2 id="2-abstract-classes-cannot-be-instantiated">2. Abstract classes cannot be instantiated</h2>
<pre><code class="language-cpp">// Shape s;                 // ERROR: 'Shape' is abstract (has pure virtuals)
Shape* p = nullptr;         // OK: pointers/references to abstract types are fine

class Circle : public Shape {
    double r_;
public:
    Circle(double r) : r_(r) {}
    double area() const override { return 3.14159265 * r_ * r_; }      // must impl
    double perimeter() const override { return 2 * 3.14159265 * r_; }  // must impl
};

Circle c(2);                // OK: Circle implements ALL pure virtuals -&gt; concrete
</code></pre>
<pre><code>   Shape (abstract)                 Circle (concrete)
   +------------------+             +------------------+
   | area() = 0       |  &lt;-------   | area() override  |
   | perimeter() = 0  |  implements | perimeter() over |
   +------------------+             | r_               |
   can't create a Shape             +------------------+
                                    can create a Circle

   If Circle FORGOT to implement perimeter(), Circle would ALSO be abstract.
</code></pre>
<hr />
<h2 id="3-programming-to-an-interface">3. Programming to an interface</h2>
<p>The power move: write code against the <strong>abstract base</strong>, and it works for any
current <em>or future</em> derived type.</p>
<pre><code class="language-cpp">double total_area(const std::vector&lt;std::unique_ptr&lt;Shape&gt;&gt;&amp; shapes) {
    double sum = 0;
    for (const auto&amp; s : shapes)
        sum += s-&gt;area();       // virtual dispatch: each shape's own area()
    return sum;
}
</code></pre>
<pre><code>   total_area doesn't know about Circle/Square/Triangle. It only knows Shape.
   Add a new Shape subclass later -&gt; total_area works UNCHANGED.
   -&gt; This is the Open/Closed Principle (chapter 12): open to extension,
      closed to modification.
</code></pre>
<pre><code>   caller ──uses──&gt; [ Shape interface ] &lt;──implements── Circle
                                        &lt;──implements── Square
                                        &lt;──implements── Triangle (added later)
   Dependencies point at the ABSTRACTION, not concrete types.
</code></pre>
<p>Runnable: <a href="examples/ch07_shapes.cpp"><code>examples/ch07_shapes.cpp</code></a>.</p>
<hr />
<h2 id="4-interfaces-in-c-pure-abstract-classes">4. &ldquo;Interfaces&rdquo; in C++ (pure abstract classes)</h2>
<p>C++ has no <code>interface</code> keyword. The idiom is a class with <strong>only</strong> pure virtual
functions (plus a virtual destructor) and no data — a pure abstract class.</p>
<pre><code class="language-cpp">class Drawable {                 // an &quot;interface&quot;
public:
    virtual void draw() const = 0;
    virtual ~Drawable() = default;
};

class Serializable {             // another &quot;interface&quot;
public:
    virtual std::string serialize() const = 0;
    virtual ~Serializable() = default;
};

// A class can implement MULTIPLE interfaces (multiple inheritance, chapter 08):
class Button : public Drawable, public Serializable {
public:
    void draw() const override { /* ... */ }
    std::string serialize() const override { return &quot;Button{...}&quot;; }
};
</code></pre>
<pre><code>   Interface = pure abstract class (all methods pure virtual, no state).
   Implementing several interfaces via multiple inheritance is the ONE place
   multiple inheritance is broadly endorsed (chapter 08). No diamond issues
   because interfaces have no data.
</code></pre>
<hr />
<h2 id="5-pure-virtual-functions-can-have-a-body-rare-but-useful">5. Pure virtual functions CAN have a body (rare but useful)</h2>
<p><code>= 0</code> means &ldquo;must be overridden,&rdquo; but you may still <em>provide</em> a default
implementation that derived classes call explicitly.</p>
<pre><code class="language-cpp">class Logger {
public:
    virtual void log(const std::string&amp; msg) = 0;   // still pure -&gt; abstract
    virtual ~Logger() = default;
};
void Logger::log(const std::string&amp; msg) {          // ...but has a definition
    std::cout &lt;&lt; &quot;[default] &quot; &lt;&lt; msg &lt;&lt; '\\n';
}

class FileLogger : public Logger {
public:
    void log(const std::string&amp; msg) override {
        Logger::log(msg);          // reuse the base's default behavior
        // + write to file
    }
};
</code></pre>
<pre><code>   A pure virtual with a body = &quot;you MUST override, but here's shared code you
   can delegate to via Base::method().&quot; Handy for common setup/teardown.
</code></pre>
<hr />
<h2 id="6-the-non-virtual-interface-nvi-idiom">6. The Non-Virtual Interface (NVI) idiom</h2>
<p>Make the <strong>public</strong> interface non-virtual and the <strong>customization points</strong>
private/protected virtual. This keeps a stable public API while letting
subclasses customize the guts, and lets the base add pre/post logic.</p>
<pre><code class="language-cpp">class Report {
public:
    void generate() {              // public, NON-virtual: fixed algorithm skeleton
        write_header();
        write_body();              // the varying part
        write_footer();
    }
    virtual ~Report() = default;
private:
    void write_header() { /* common */ }
    void write_footer() { /* common */ }
    virtual void write_body() = 0; // the ONLY customization point (private virtual)
};

class SalesReport : public Report {
    void write_body() override { /* sales-specific */ }
};
</code></pre>
<pre><code>   Public API (generate) is STABLE and non-virtual -&gt; base controls the flow
   (add logging, locking, invariants around the virtual call).
   Subclasses override the PRIVATE virtual (write_body) — they can override a
   private virtual even though they can't CALL it. This is the Template Method
   pattern (chapter 13) done the NVI way.
</code></pre>
<hr />
<h2 id="7-abstract-class-vs-interface-vs-concrete-base">7. Abstract class vs interface vs concrete base</h2>
<div class="diagram"><div class="diagram-title">Abstract vs interface vs concrete</div><div class="dbox green"><div class="dbox-title">Concrete class</div><div class="dtext">All methods implemented; can instantiate</div></div><div class="dbox teal"><div class="dbox-title">Abstract class</div><div class="dtext">≥1 pure virtual; can't instantiate; <b>may</b> have data + implemented methods (partial)</div></div><div class="dbox purple"><div class="dbox-title">Interface (idiom)</div><div class="dtext"><b>All</b> pure virtual, <b>no</b> data; a pure contract</div></div></div>
<hr />
<h2 id="8-worked-example-a-plugin-style-shape-system">8. Worked example: a plugin-style shape system</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;memory&gt;
#include &lt;vector&gt;

class Shape {
public:
    virtual double area() const = 0;
    virtual const char* name() const = 0;
    virtual ~Shape() = default;
};

class Circle : public Shape {
    double r_;
public:
    explicit Circle(double r) : r_(r) {}
    double area() const override { return 3.14159265 * r_ * r_; }
    const char* name() const override { return &quot;Circle&quot;; }
};

class Rectangle : public Shape {
    double w_, h_;
public:
    Rectangle(double w, double h) : w_(w), h_(h) {}
    double area() const override { return w_ * h_; }
    const char* name() const override { return &quot;Rectangle&quot;; }
};

int main() {
    std::vector&lt;std::unique_ptr&lt;Shape&gt;&gt; shapes;
    shapes.push_back(std::make_unique&lt;Circle&gt;(2.0));
    shapes.push_back(std::make_unique&lt;Rectangle&gt;(3.0, 4.0));

    double total = 0;
    for (const auto&amp; s : shapes) {
        std::cout &lt;&lt; s-&gt;name() &lt;&lt; &quot; area = &quot; &lt;&lt; s-&gt;area() &lt;&lt; '\\n';
        total += s-&gt;area();
    }
    std::cout &lt;&lt; &quot;total area = &quot; &lt;&lt; total &lt;&lt; '\\n';
}
</code></pre>
<pre><code>   Output:
     Circle area = 12.5664
     Rectangle area = 12
     total area = 24.5664
   The loop is written against Shape ONLY. Adding a Triangle class later needs
   ZERO changes to main's loop.
</code></pre>
<p>Runnable: <a href="examples/ch07_shapes.cpp"><code>examples/ch07_shapes.cpp</code></a>.</p>
<hr />
<h2 id="9-summary">9. Summary</h2>
<div class="diagram"><div class="diagram-title">Abstract classes &amp; interfaces</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><b>Pure virtual</b>: <code>virtual R f() = 0;</code> → subclasses <b>must</b> override. A class with any pure virtual is <b>abstract</b> (can't instantiate), but pointers/refs are fine</div><div class="dtext"><b>Interface</b> (C++ idiom) = pure abstract class: all pure virtual, no data, virtual dtor. Implement several via multiple inheritance</div><div class="dtext">Program to the <b>interface</b>: code depends on the abstraction, so new subclasses work without changing callers (Open/Closed)</div><div class="dtext">Pure virtuals <b>may</b> have a body (shared default via <code>Base::f()</code>). <b>NVI</b> idiom: public non-virtual API + private virtual hooks</div></div></div>
<p>Next: <a href="08-multiple-virtual-inheritance.md">08-multiple-virtual-inheritance.md</a>.</p>` },
  { name: `10. Multiple Virtual Inheritance`, path: `08-multiple-virtual-inheritance.md`, dir: ``, words: 997, mins: 5, body: `<h1 id="08--multiple--virtual-diamond-inheritance">08 — Multiple &amp; Virtual (Diamond) Inheritance</h1>
<p>C++ is one of the few mainstream languages allowing a class to inherit from
<strong>multiple</strong> bases. This is powerful (implementing several interfaces) but has a
famous trap — the <strong>diamond problem</strong> — solved with <strong>virtual inheritance</strong>. This
chapter makes both crystal clear.</p>
<p>Prereq: <a href="07-abstract-classes-interfaces.md">07-abstract-classes-interfaces.md</a>.</p>
<hr />
<h2 id="1-multiple-inheritance-basics">1. Multiple inheritance basics</h2>
<pre><code class="language-cpp">class Camera   { public: void snap();   };
class Phone    { public: void call();   };

class Smartphone : public Camera, public Phone {  // inherit from BOTH
public:
    void use() { snap(); call(); }                // has both capabilities
};
</code></pre>
<div class="diagram"><div class="diagram-title">Smartphone object layout</div><div class="dbox blue"><div class="dbox-title">Smartphone</div><div class="dbox teal"><div class="dbox-title">Camera subobject</div><div class="dtext">Camera part</div></div><div class="dbox purple"><div class="dbox-title">Phone subobject</div><div class="dtext">Phone part</div></div><div class="dbox gray"><div class="dbox-title">Smartphone members</div><div class="dtext">Smartphone part</div></div></div></div>
<p>The most common, safest use is implementing <strong>multiple interfaces</strong> (pure
abstract classes with no data — chapter 07):</p>
<pre><code class="language-cpp">class Serializable { public: virtual std::string save() const = 0; virtual ~Serializable()=default; };
class Drawable     { public: virtual void draw() const = 0;         virtual ~Drawable()=default; };

class Widget : public Serializable, public Drawable {   // implements both
public:
    std::string save() const override { return &quot;...&quot;; }
    void draw() const override { /* ... */ }
};
</code></pre>
<pre><code>   Multiple inheritance of INTERFACES (no state) = clean &amp; recommended.
   Multiple inheritance of STATEFUL classes = where trouble can start (next).
</code></pre>
<hr />
<h2 id="2-ambiguity-from-multiple-bases">2. Ambiguity from multiple bases</h2>
<p>If two bases share a member name, the derived class must disambiguate:</p>
<pre><code class="language-cpp">class A { public: void f(); int x; };
class B { public: void f(); int x; };
class C : public A, public B {};

C c;
// c.f();      // ERROR: ambiguous — A::f or B::f?
c.A::f();      // disambiguate explicitly
c.B::x = 1;
</code></pre>
<pre><code>   Two bases with the same name -&gt; the compiler can't choose -&gt; you qualify:
     c.A::f()   or   c.B::f()
   Same for data members.
</code></pre>
<hr />
<h2 id="3-the-diamond-problem">3. The Diamond Problem</h2>
<p>When two bases themselves derive from a common base, the common base is
<strong>duplicated</strong> in the most-derived object.</p>
<pre><code class="language-cpp">class Animal      { public: std::string name; };
class Mammal : public Animal {};
class WingedAnimal : public Animal {};
class Bat : public Mammal, public WingedAnimal {};   // DIAMOND
</code></pre>
<div class="diagram"><div class="diagram-title">Bat layout (non-virtual inheritance)</div><div class="dbox red"><div class="dbox-title">Diamond problem — Animal duplicated</div><div class="dbox orange"><div class="dbox-title">Mammal subobject</div><div class="dtext">Animal #1 (via Mammal)</div></div><div class="dbox orange"><div class="dbox-title">WingedAnimal subobject</div><div class="dtext">Animal #2 (via WingedAnimal)</div></div><div class="dbox blue"><div class="dbox-title">Bat part</div></div><div class="dtext"><code>b.name</code> is <b>ambiguous</b> — two <code>Animal::name</code> subobjects</div></div></div>
<pre><code>   The diamond gives you TWO Animal subobjects -&gt; duplicated data, ambiguous
   access. Usually NOT what you want (a Bat has ONE name).
</code></pre>
<hr />
<h2 id="4-virtual-inheritance-solves-the-diamond">4. Virtual inheritance solves the diamond</h2>
<p>Declare the shared base <code>virtual</code> in the intermediate classes. Now there&rsquo;s a
<strong>single, shared</strong> base subobject.</p>
<pre><code class="language-cpp">class Animal      { public: std::string name; };
class Mammal        : public virtual Animal {};   // virtual inheritance
class WingedAnimal  : public virtual Animal {};   // virtual inheritance
class Bat : public Mammal, public WingedAnimal {};
</code></pre>
<div class="diagram"><div class="diagram-title">Bat layout (virtual inheritance)</div><div class="dbox green"><div class="dbox-title">Virtual inheritance — one shared Animal</div><div class="dbox teal"><div class="dbox-title">Mammal part</div></div><div class="dbox teal"><div class="dbox-title">WingedAnimal part</div></div><div class="dbox blue"><div class="dbox-title">Bat part</div></div><div class="dbox green"><div class="dbox-title">Animal (shared, once)</div><div class="dtext">Exactly one <code>Animal</code>, referenced by both paths — <code>b.name</code> is unambiguous</div></div></div></div>
<p>Runnable: <a href="examples/ch08_diamond.cpp"><code>examples/ch08_diamond.cpp</code></a>.</p>

<h2 id="5-who-constructs-the-virtual-base-the-most-derived-class">5. Who constructs the virtual base? The most-derived class</h2>
<p>With virtual inheritance, the <strong>most-derived class</strong> is responsible for
initializing the shared virtual base directly (bypassing the intermediates).</p>
<pre><code class="language-cpp">class Animal {
public:
    Animal(std::string n) : name(std::move(n)) {}
    std::string name;
};
class Mammal : public virtual Animal {
public:
    Mammal() : Animal(&quot;default&quot;) {}   // this Animal(...) is IGNORED for a Bat!
};
class WingedAnimal : public virtual Animal {
public:
    WingedAnimal() : Animal(&quot;default&quot;) {}   // also ignored for a Bat
};
class Bat : public Mammal, public WingedAnimal {
public:
    Bat(std::string n) : Animal(std::move(n)) {}   // MOST-DERIVED inits the vbase
};
</code></pre>
<pre><code>   For 'Bat b(&quot;Bruce&quot;);':
     * Bat's init list must (and does) construct the shared Animal directly.
     * Mammal's and WingedAnimal's ' : Animal(...) ' calls are SKIPPED.
   Rule: the most-derived object initializes each virtual base ONCE, directly.
   (If Bat didn't, Animal's DEFAULT ctor would be needed — error if none.)
</code></pre>
<pre><code>   Construction order with virtual bases:
     1. ALL virtual bases first (in depth-first, left-to-right order), ONCE
     2. then non-virtual bases
     3. then members, then body
</code></pre>
<hr />
<h2 id="6-costs-of-virtual-inheritance">6. Costs of virtual inheritance</h2>
<pre><code>   * Access to the virtual base is INDIRECT: objects store an offset/pointer to
     locate the shared base subobject -&gt; a small runtime cost per access.
   * Object layout is more complex; sizeof grows.
   * Construction is more involved (most-derived initializes vbase).

   -&gt; Use virtual inheritance ONLY when you truly have a shared-state diamond.
      For interfaces (no state), plain multiple inheritance is fine and cheaper.
</code></pre>
<hr />
<h2 id="7-when-to-use-multiple-inheritance-guidance">7. When to use multiple inheritance (guidance)</h2>
<pre><code>   GOOD (recommended):
     * Implement multiple INTERFACES (pure abstract, no data). No diamond issues.
     * Mix-in small stateless behavior classes (policy/mixin).

   USE WITH CARE:
     * Multiple STATEFUL bases -&gt; possible ambiguity; think hard.
     * Diamonds with shared state -&gt; need virtual inheritance -&gt; complexity.

   OFTEN BETTER ALTERNATIVE:
     * COMPOSITION (chapter 10): hold members instead of inheriting. Usually
       simpler than multiple stateful inheritance.
</code></pre>
<pre><code>   +--------------------------------------------------------------+
   | Rule of thumb: inherit multiple INTERFACES freely; be very   |
   | cautious inheriting multiple IMPLEMENTATIONS. Prefer         |
   | composition for &quot;has-a&quot; reuse.                               |
   +--------------------------------------------------------------+
</code></pre>
<hr />

    Bat b(&quot;Bruce&quot;, 0.3);
    std::cout &lt;&lt; b.name &lt;&lt; &quot; span=&quot; &lt;&lt; b.wingspan   // ONE name (shared Animal)
              &lt;&lt; &quot; warm=&quot; &lt;&lt; b.warm_blooded &lt;&lt; '\\n';// Bruce span=0.3 warm=1

<h2 id="9-summary">9. Summary</h2>
<div class="diagram"><div class="diagram-title">Multiple &amp; virtual inheritance</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext">C++ allows <b>multiple inheritance</b>. Best use: implement several <b>interfaces</b> (pure abstract, no state) — clean, no diamond</div><div class="dtext">Shared names across bases → disambiguate with <code>Base::member</code></div><div class="dtext"><b>DIAMOND</b>: two bases share a common base → the base is <b>duplicated</b> (two subobjects, ambiguous, buggy)</div><div class="dtext"><b>Virtual inheritance</b> (<code>: public virtual Base</code>) → <b>one</b> shared base subobject. The <b>most-derived</b> class constructs the virtual base. Cost: indirect access + complexity — use only for real shared diamonds. Prefer composition for stateful reuse</div></div></div>

<p>Operator overloading lets your types use natural syntax: <code>a + b</code>, <code>v[i]</code>,
<code>s1 == s2</code>, <code>std::cout &lt;&lt; obj</code>. Used well, it makes user types feel built-in.
Used poorly, it obscures. This chapter covers the mechanics, idioms, and the
C++20 spaceship operator.</p>
<p>Prereq: <a href="01-classes-and-objects.md">01-classes-and-objects.md</a>, <a href="04-copy-move-rule-of-five.md">04-copy-move-rule-of-five.md</a>.</p>
<hr />
<h2 id="1-what-you-can-overload">1. What you can overload</h2>
<pre><code>   Overloadable: + - * / %  == != &lt; &gt; &lt;= &gt;=  += -= *= ...  &lt;&lt; &gt;&gt;  [] () -&gt; 
                 ++ -- unary + - !  ~  &amp; | ^  new delete  , (comma)  &lt;=&gt; (C++20)
   NOT overloadable:  ::   .   .*   ?:   sizeof   typeid   (and a few others)

   You cannot invent new operators or change arity/precedence/associativity.
</code></pre>
<p>An overloaded operator is just a function with a special name: <code>operator+</code>,
<code>operator==</code>, etc.</p>
<hr />
<h2 id="2-member-vs-non-member-free-function">2. Member vs non-member (free function)</h2>
<pre><code class="language-cpp">struct Vec2 {
    double x, y;
    Vec2&amp; operator+=(const Vec2&amp; o) { x += o.x; y += o.y; return *this; }  // member
};

// binary + as a FREE function (symmetric operands):
Vec2 operator+(Vec2 a, const Vec2&amp; b) { a += b; return a; }   // reuse +=
</code></pre>
<pre><code>   MEMBER operator:      a.operator@(b)   -&gt; left operand MUST be your type.
   NON-MEMBER operator:  operator@(a, b)  -&gt; both operands symmetric; allows
                         conversions on the LEFT operand too.

   Guidelines:
     * Must be MEMBER: = [] () -&gt; and (by convention) compound assign += -= ...
     * Prefer NON-MEMBER (often friend) for symmetric binary ops: + - * == &lt; &lt;&lt;
       so that '2 + obj' and 'obj + 2' both work.
</code></pre>
<pre><code>   Why non-member for symmetric ops:
     If operator+ is a member, 'obj + 2' works (obj.operator+(2)) but
     '2 + obj' does NOT (int has no operator+ taking Vec2).
     A free operator+(Vec2,Vec2) with an implicit int-&gt;Vec2 conversion fixes both.
</code></pre>
<hr />
<h2 id="3-the-canonical-arithmetic-pattern-implement-compound-derive-binary">3. The canonical arithmetic pattern: implement compound, derive binary</h2>
<pre><code class="language-cpp">struct Money {
    long cents = 0;
    Money&amp; operator+=(Money o) { cents += o.cents; return *this; }
    Money&amp; operator-=(Money o) { cents -= o.cents; return *this; }
};
inline Money operator+(Money a, Money b) { return a += b; }   // reuse +=
inline Money operator-(Money a, Money b) { return a -= b; }
</code></pre>
<pre><code>   Write the MUTATING compound op (+=) once with the real logic; define the
   binary op (+) in terms of it (take first operand BY VALUE, += the second,
   return it). Less duplication, consistent behavior.
</code></pre>
<hr />
<h2 id="4-comparison-c20-spaceship--huge-simplification">4. Comparison: C++20 spaceship <code>&lt;=&gt;</code> (huge simplification)</h2>
<p>Pre-C++20 you wrote six comparison operators. C++20&rsquo;s three-way comparison
generates them from one defaulted operator.</p>
<pre><code class="language-cpp">#include &lt;compare&gt;

struct Version {
    int major, minor, patch;
    auto operator&lt;=&gt;(const Version&amp;) const = default;   // generates &lt; &lt;= &gt; &gt;=
    bool operator==(const Version&amp;) const = default;    // == and != (declare too)
};
</code></pre>
<pre><code>   = default  -&gt;  member-wise lexicographic comparison, in declaration order.
   Now all of  &lt; &lt;= &gt; &gt;= == !=  work:
     Version{1,2,0} &lt; Version{1,3,0}   // true (compares major, then minor, ...)

   a &lt;=&gt; b returns an ordering category:
     strong_ordering  : ints, etc. (a&lt;b, a==b, a&gt;b; equal == identical)
     weak_ordering    : equivalent but not identical (case-insensitive strings)
     partial_ordering : may be unordered (floats: NaN)
</code></pre>
<p>Custom three-way when defaults don&rsquo;t fit:</p>
<pre><code class="language-cpp">struct CaseInsensitive {
    std::string s;
    std::weak_ordering operator&lt;=&gt;(const CaseInsensitive&amp; o) const {
        return lower(s) &lt;=&gt; lower(o.s);   // compare normalized forms
    }
    bool operator==(const CaseInsensitive&amp; o) const { return lower(s)==lower(o.s); }
};
</code></pre>
<pre><code>   Pre-C++20: 6 operators (== != &lt; &lt;= &gt; &gt;=), lots of boilerplate &amp; bugs.
   C++20:     one '&lt;=&gt; = default' (+ '== = default') -&gt; all six. 
</code></pre>
<p>Runnable: <a href="examples/ch09_spaceship.cpp"><code>examples/ch09_spaceship.cpp</code></a>.</p>
<hr />
<h2 id="5-stream-insertion-operator-the-hidden-friend-idiom">5. Stream insertion: <code>operator&lt;&lt;</code> (the hidden-friend idiom)</h2>
<pre><code class="language-cpp">class Point {
    int x_, y_;
public:
    Point(int x, int y) : x_(x), y_(y) {}
    // hidden friend: found by ADL, one per class, can access privates:
    friend std::ostream&amp; operator&lt;&lt;(std::ostream&amp; os, const Point&amp; p) {
        return os &lt;&lt; '(' &lt;&lt; p.x_ &lt;&lt; &quot;, &quot; &lt;&lt; p.y_ &lt;&lt; ')';
    }
};

// std::cout &lt;&lt; Point{1,2};   -&gt;  (1, 2)
</code></pre>
<pre><code>   operator&lt;&lt; MUST be a non-member (the left operand is std::ostream, not your
   type). Declaring it a 'friend' inside the class lets it read privates and
   keeps it discoverable via ADL. Return the stream (os) to allow chaining:
     std::cout &lt;&lt; p1 &lt;&lt; &quot; &quot; &lt;&lt; p2 &lt;&lt; '\\n';
</code></pre>
<hr />
<h2 id="6-subscript-call-and-arrow">6. Subscript, call, and arrow</h2>
<pre><code class="language-cpp">class Grid {
    std::vector&lt;int&gt; data_;
    std::size_t cols_;
public:
    Grid(std::size_t r, std::size_t c) : data_(r*c), cols_(c) {}

    int&amp;       operator[](std::size_t i)       { return data_[i]; }   // mutable
    const int&amp; operator[](std::size_t i) const { return data_[i]; }   // const

    // C++23: multidimensional subscript
    int&amp; operator[](std::size_t r, std::size_t c) { return data_[r*cols_ + c]; }
};

struct Adder {                          // function-call operator -&gt; &quot;functor&quot;
    int base;
    int operator()(int x) const { return base + x; }   // Adder{10}(5) == 15
};

template &lt;class T&gt;
class SmartPtr {                        // arrow operator -&gt; proxy/smart pointers
    T* p_;
public:
    T* operator-&gt;() const { return p_; }    // sp-&gt;member  ==  sp.operator-&gt;()-&gt;member
    T&amp; operator*()  const { return *p_; }
};
</code></pre>
<pre><code>   operator[]  : indexing. Provide const &amp; non-const overloads. (C++23: multi-arg)
   operator()  : makes objects CALLABLE (functors; used by STL, lambdas desugar to this)
   operator-&gt;  : for smart pointers/iterators; chains until it reaches a raw ptr.
   All three MUST be member functions.
</code></pre>
<hr />
<h2 id="7-incrementdecrement-pre-vs-post">7. Increment/decrement (pre vs post)</h2>
<pre><code class="language-cpp">struct Counter {
    int n = 0;
    Counter&amp; operator++()    { ++n; return *this; }        // PRE-increment  (++c)
    Counter  operator++(int) { Counter old = *this; ++n; return old; } // POST (c++)
};
</code></pre>
<pre><code>   ++c  -&gt; operator++()      returns a REFERENCE to the incremented object (fast)
   c++  -&gt; operator++(int)   the dummy 'int' param distinguishes it; returns the
                             OLD value BY VALUE (needs a copy -&gt; prefer ++c).
</code></pre>
<hr />
<h2 id="8-conversion-operators-and-why-explicit-matters">8. Conversion operators (and why <code>explicit</code> matters)</h2>
<pre><code class="language-cpp">class Fraction {
    int num_, den_;
public:
    Fraction(int n, int d) : num_(n), den_(d) {}
    explicit operator double() const { return double(num_) / den_; }  // to double
    explicit operator bool() const { return num_ != 0; }              // &quot;is nonzero&quot;
};

Fraction f(1, 2);
double d = static_cast&lt;double&gt;(f);   // explicit -&gt; must cast (0.5)
if (f) { /* uses explicit operator bool -&gt; allowed in boolean contexts */ }
</code></pre>
<pre><code>   operator TargetType() const;   -&gt; defines a conversion FROM your type.
   Mark it 'explicit' to avoid surprising implicit conversions (same reasoning
   as explicit constructors, chapter 02). 'explicit operator bool' is special:
   it still works in if/while/&amp;&amp;/|| contexts (contextual conversion to bool).
</code></pre>
<hr />
<h2 id="9-rules--good-taste">9. Rules &amp; good taste</h2>
<div class="diagram"><div class="dbox green"><div class="dbox-title">DO</div><div class="dtext">Keep semantics <b>intuitive</b>: <code>+</code> should add, <code>==</code> should compare equal</div><div class="dtext">Make <code>==</code> and <code>&lt;</code> consistent with each other and with <code>&lt;=&gt;</code></div><div class="dtext">Return by value for arithmetic (<code>a+b</code>), by reference for <code>+=</code>/<code>[]</code>/<code>&lt;&lt;</code> (chaining)</div><div class="dtext">Prefer non-member (friend) for symmetric binary ops</div><div class="dtext">Use <code>= default</code> for comparisons (C++20) whenever member-wise is correct</div></div><div class="dbox red"><div class="dbox-title">DON'T</div><div class="dtext">Overload operators with surprising meaning (<code>operator+</code> that subtracts)</div><div class="dtext">Overload <code>&amp;&amp;</code> <code>||</code> <code>,</code> — they lose short-circuit / sequencing semantics</div><div class="dtext">Add operators the type doesn't naturally have (don't force it)</div></div></div>
<div class="diagram"><div class="dbox orange"><div class="dbox-title">Good taste</div><div class="dtext">Overload an operator <b>only</b> when the meaning is <b>obvious</b> to a reader. If you must document "what does <code>+</code> mean here?", use a named function instead</div></div></div>
<hr />
<h2 id="10-worked-example-a-vector2d">10. Worked example: a <code>Vector2D</code></h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;compare&gt;

struct Vector2D {
    double x = 0, y = 0;

    Vector2D&amp; operator+=(const Vector2D&amp; o) { x += o.x; y += o.y; return *this; }
    Vector2D&amp; operator*=(double s)          { x *= s;  y *= s;  return *this; }

    bool operator==(const Vector2D&amp;) const = default;   // member-wise ==

    friend Vector2D operator+(Vector2D a, const Vector2D&amp; b) { return a += b; }
    friend Vector2D operator*(Vector2D a, double s)          { return a *= s; }
    friend Vector2D operator*(double s, Vector2D a)          { return a *= s; } // symmetric
    friend std::ostream&amp; operator&lt;&lt;(std::ostream&amp; os, const Vector2D&amp; v) {
        return os &lt;&lt; '(' &lt;&lt; v.x &lt;&lt; &quot;, &quot; &lt;&lt; v.y &lt;&lt; ')';
    }
};

int main() {
    Vector2D a{1, 2}, b{3, 4};
    std::cout &lt;&lt; a + b &lt;&lt; '\\n';     // (4, 6)
    std::cout &lt;&lt; 2.0 * a &lt;&lt; '\\n';   // (2, 4)   (symmetric operator*)
    std::cout &lt;&lt; (a == a) &lt;&lt; '\\n';  // 1
}
</code></pre>
<p>Runnable: <a href="examples/ch09_vector2d.cpp"><code>examples/ch09_vector2d.cpp</code></a>.</p>

<h2 id="11-summary">11. Summary</h2>

<p>Choosing how objects relate is where OOP designs live or die. The modern maxim is
<strong>&ldquo;favor composition over inheritance.&rdquo;</strong> This chapter explains the object
relationships (is-a, has-a, uses-a), when each fits, and why composition is
usually the safer default.</p>
<p>Prereq: <a href="05-inheritance.md">05-inheritance.md</a>.</p>
<hr />
<h2 id="1-the-relationships">1. The relationships</h2>
<pre><code>   IS-A     (inheritance)  : Dog IS-A Animal            -&gt; public inheritance
   HAS-A    (composition)  : Car HAS-A Engine (owns it) -&gt; member object
   HAS-A    (aggregation)  : Team HAS players (refers)  -&gt; pointer/reference member
   USES-A   (dependency)   : Order USES a PriceService  -&gt; parameter / temporary
</code></pre>
<pre><code>   Car ─owns──► Engine        (composition: Engine lifetime = Car lifetime)
   Team ─refs─► Player...      (aggregation: players exist independently)
   Report ─uses► Printer       (dependency: passed in, not stored)
   Dog ──is───► Animal         (inheritance)
</code></pre>
<hr />
<h2 id="2-composition-has-a-via-member-objects">2. Composition: &ldquo;has-a&rdquo; via member objects</h2>
<pre><code class="language-cpp">class Engine {
public:
    void start() { /* ... */ }
    void stop()  { /* ... */ }
};

class Car {
    Engine engine_;            // Car HAS-A Engine (composition; owns it)
    Wheels wheels_;
public:
    void drive() {
        engine_.start();       // delegate to the part
        // ...
    }
};
</code></pre>
<div class="diagram"><div class="diagram-title">Composition — Car has-a Engine</div><div class="dbox blue"><div class="dbox-title">Car</div><div class="dtext"><code>Engine engine_</code> — the Engine is <b>part of</b> the Car (created &amp; destroyed with the Car, RAII)</div><div class="dtext"><code>Wheels wheels_</code></div><div class="dtext">Car exposes what it wants (<code>drive()</code>) and forwards to its parts. It is <b>not</b> an Engine; it <b>has</b> one</div></div></div>
<pre><code>   Composition = strong ownership. When the Car is destroyed, its Engine is too.
   The whole controls access to its parts; parts don't leak into the interface.
</code></pre>
<hr />
<h2 id="3-aggregation-has-a-but-parts-live-independently">3. Aggregation: &ldquo;has-a&rdquo; but parts live independently</h2>
<pre><code class="language-cpp">class Player { /* ... */ };

class Team {
    std::vector&lt;Player*&gt; members_;      // Team refers to Players it doesn't own
public:                                 // (or std::shared_ptr for shared ownership)
    void add(Player* p) { members_.push_back(p); }
};
</code></pre>
<pre><code>   Aggregation: the Team knows about Players but does NOT own their lifetime.
   Deleting the Team does not delete the Players. Use non-owning pointers,
   references, or shared_ptr depending on ownership semantics.
</code></pre>
<hr />
<h2 id="4-why-favor-composition-over-inheritance">4. Why &ldquo;favor composition over inheritance&rdquo;</h2>
<p>Inheritance is the <strong>tightest</strong> coupling in OOP: the derived class depends on the
base&rsquo;s implementation details and inherits its <em>entire</em> interface — including
things you may not want.</p>
<pre><code>   PROBLEMS with (over)using inheritance:
     * Tight coupling: change the base -&gt; ripples into all derived classes.
     * The &quot;fragile base class&quot; problem: base edits silently break subclasses.
     * You inherit the WHOLE interface, even parts that don't apply.
     * Deep hierarchies are hard to understand and rigid to change.
     * Only one thing can vary along the inheritance axis.

   COMPOSITION advantages:
     * Loose coupling: depend on a small interface, swap implementations.
     * Flexible: combine multiple behaviors; change parts at runtime.
     * Clear ownership; no accidental &quot;is-a&quot; that isn't true.
     * Easier to test (inject mock parts).
</code></pre>
<hr />
<h2 id="5-the-classic-cautionary-tale-stack-from-vector">5. The classic cautionary tale: <code>Stack</code> from <code>Vector</code></h2>
<pre><code class="language-cpp">// BAD: Stack IS-A vector?  No! This exposes push_back, operator[], insert...
template &lt;class T&gt;
class Stack : public std::vector&lt;T&gt; {    // WRONG relationship
public:
    void push(const T&amp; x) { this-&gt;push_back(x); }
    void pop() { this-&gt;pop_back(); }
};

Stack&lt;int&gt; s;
s.push(1);
s[0] = 99;                 // OOPS: inherited operator[] breaks stack semantics!
s.insert(s.begin(), 5);    // OOPS: inherited insert bypasses push/pop entirely!
</code></pre>
<pre><code>   Public inheritance gave Stack the ENTIRE vector interface, letting callers
   violate the LIFO invariant. Stack is NOT a vector; it HAS a vector.
</code></pre>
<pre><code class="language-cpp">// GOOD: Stack HAS-A vector (composition) -&gt; expose ONLY stack operations
template &lt;class T&gt;
class Stack {
    std::vector&lt;T&gt; data_;                // composition
public:
    void push(const T&amp; x) { data_.push_back(x); }
    void pop()            { data_.pop_back(); }
    const T&amp; top() const  { return data_.back(); }
    bool empty() const    { return data_.empty(); }
};
</code></pre>
<pre><code>   Now the ONLY operations are push/pop/top/empty. The vector is hidden; the
   LIFO invariant cannot be broken. (This is exactly what std::stack does — it's
   a container ADAPTER built by composition, not inheritance.)
</code></pre>
<p>Runnable: <a href="examples/ch10_stack_composition.cpp"><code>examples/ch10_stack_composition.cpp</code></a>.</p>

<h2 id="6-strategy-pattern-composition-for-varying-behavior">6. Strategy pattern: composition for varying behavior</h2>
<p>Instead of subclassing to change behavior, <strong>inject</strong> a behavior object. This
lets behavior change at runtime and avoids a class explosion.</p>
<pre><code class="language-cpp">// INHERITANCE approach (rigid): a subclass per behavior combo -&gt; explosion
//   class SortedListAscending : public List { ... };
//   class SortedListDescending : public List { ... };  // and every combo...

// COMPOSITION approach: inject a comparator (strategy)
class Sorter {
    std::function&lt;bool(int,int)&gt; compare_;      // the strategy (a part)
public:
    explicit Sorter(std::function&lt;bool(int,int)&gt; cmp) : compare_(std::move(cmp)) {}
    void sort(std::vector&lt;int&gt;&amp; v) { std::sort(v.begin(), v.end(), compare_); }
};

Sorter asc([](int a, int b){ return a &lt; b; });
Sorter desc([](int a, int b){ return a &gt; b; });
// swap strategy at runtime; no new subclasses needed.
</code></pre>
<pre><code>   Vary behavior by COMPOSING a strategy object rather than SUBCLASSING.
   -&gt; N behaviors + M contexts = N+M pieces (composition)
      vs  N*M subclasses (inheritance explosion).
</code></pre>
<hr />
<h2 id="7-decision-guide-inherit-or-compose">7. Decision guide: inherit or compose?</h2>
<pre><code>   Ask, in order:
   1. Is it TRULY &quot;is-a&quot; (Liskov: a Derived works ANYWHERE a Base is expected)?
        NO  -&gt; compose.
        YES -&gt; continue.
   2. Do you need RUNTIME POLYMORPHISM over a shared interface?
        YES -&gt; (public) inheritance with virtuals is a good fit.
        NO  -&gt; composition is usually simpler.
   3. Would inheriting expose base operations that break your invariants?
        YES -&gt; compose (hide the part).
   4. Do you just want to REUSE code?
        -&gt; that's NOT a reason to inherit. Compose (or free functions).
</code></pre>

<p>Public inheritance must obey LSP (chapter 12): a <code>Derived</code> must be usable

</code></pre>

   inherited method, the is-a relationship is false. Prefer composition.
</code></pre>
<hr />

<div class="diagram"><div class="diagram-title">Composition vs inheritance</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext">Relationships: <b>IS-A</b> (inherit), <b>HAS-A</b> (compose/aggregate), <b>USES-A</b> (dependency)</div><div class="dtext"><b>Favor composition</b> over inheritance: looser coupling, flexible, clear ownership, no accidental interface leakage</div><div class="dtext">Inherit <b>only</b> for genuine is-a + substitutability (LSP) and/or runtime polymorphism — <b>not</b> merely to reuse code</div><div class="dtext">Classic trap: <code>Stack : public vector</code> leaks the interface; <code>Stack { vector data_; }</code> (composition) hides it</div><div class="dtext"><b>Strategy</b> pattern: inject behavior objects instead of subclassing</div></div></div>

<p>Three supporting features that round out class design: <strong>static</strong> members (shared
across all objects), <strong>friends</strong> (controlled access grants), and <strong>nested</strong>
classes (types scoped inside a class).</p>
<p>Prereq: <a href="03-encapsulation.md">03-encapsulation.md</a>.</p>
<hr />
<h2 id="1-static-data-members--one-per-class-not-per-object">1. Static data members — one per class, not per object</h2>
<p>A <code>static</code> data member is shared by <strong>all</strong> instances; there&rsquo;s exactly one copy,
belonging to the class itself.</p>
<pre><code class="language-cpp">class Widget {
    static inline int count_ = 0;   // C++17: define + init inline in the header
public:
    Widget()  { ++count_; }
    ~Widget() { --count_; }
    static int count() { return count_; }   // static member function (see §3)
};
</code></pre>
<pre><code>   Widget a, b, c;
   Widget::count();      // 3  -&gt; ONE shared counter for the whole class

   Object layout is UNAFFECTED by static members:
     a: [ ...instance data... ]   b: [ ... ]   c: [ ... ]
   count_ lives ONCE, outside every object (in static storage):
     Widget::count_ = 3
</code></pre>
<pre><code>   Access:  Widget::count_   (via the class, not an object).
   sizeof(Widget) does NOT include static members.
</code></pre>
<h3 id="defining-static-members-pre-c17">Defining static members (pre-C++17)</h3>
<pre><code class="language-cpp">// header:
class Foo { static int n_; };
// exactly ONE .cpp:
int Foo::n_ = 0;         // out-of-line definition (needed before C++17)
</code></pre>
<pre><code>   C++17 'static inline' lets you define+initialize in the class body (header),
   avoiding the separate .cpp definition. Prefer it.
</code></pre>
<h3 id="static-constexpr-constants"><code>static constexpr</code> constants</h3>
<pre><code class="language-cpp">class Circle {
public:
    static constexpr double pi = 3.14159265358979;   // compile-time constant
};
double area(double r) { return Circle::pi * r * r; }
</code></pre>
<hr />
<h2 id="2-static-members-and-the-singleton-meyers-idiom">2. Static members and the Singleton (Meyers&rsquo; idiom)</h2>
<p>A common use of a static local: the thread-safe lazy singleton.</p>
<pre><code class="language-cpp">class Logger {
public:
    static Logger&amp; instance() {
        static Logger inst;      // created ONCE, thread-safe since C++11
        return inst;
    }
    void log(const std::string&amp; s) { /* ... */ }
private:
    Logger() = default;                      // private ctor -&gt; no other instances
    Logger(const Logger&amp;) = delete;          // non-copyable
    Logger&amp; operator=(const Logger&amp;) = delete;
};

// Logger::instance().log(&quot;hi&quot;);
</code></pre>
<pre><code>   static local 'inst' is initialized on FIRST call, exactly once, and its
   construction is thread-safe (the compiler adds a guard). This is the simplest
   correct Singleton in C++. (But: singletons are often overused — chapter 13.)
</code></pre>
<hr />
<h2 id="3-static-member-functions">3. Static member functions</h2>
<p>A <code>static</code> member function belongs to the class, not an object: it has <strong>no
<code>this</code></strong> and can only touch static members (or things passed to it).</p>
<pre><code class="language-cpp">class Math {
public:
    static int square(int x) { return x * x; }   // no 'this'; call as Math::square(5)
};
Math::square(5);          // 25 — no object needed
</code></pre>
<pre><code>   static method:  no 'this', can't access non-static members directly.
   Use for: factory functions, utility functions grouped under the class,
   operations on static state (like Widget::count()).
</code></pre>
<hr />
<h2 id="4-friend--granting-access-to-your-privates">4. <code>friend</code> — granting access to your privates</h2>
<p>A <code>friend</code> declaration lets a specific external function or class access your
<code>private</code>/<code>protected</code> members. Friendship is <strong>granted</strong> by the class (you can&rsquo;t
take it), is <strong>not</strong> inherited, and is <strong>not</strong> transitive.</p>
<pre><code class="language-cpp">class Account {
    double balance_;
public:
    explicit Account(double b) : balance_(b) {}

    friend class Auditor;                    // Auditor may access Account's privates
    friend double total(const Account&amp;, const Account&amp;);  // this function too
};

class Auditor {
public:
    bool suspicious(const Account&amp; a) { return a.balance_ &gt; 1e9; }  // reads private
};

double total(const Account&amp; a, const Account&amp; b) { return a.balance_ + b.balance_; }
</code></pre>
<pre><code>   friend class X;        -&gt; X's methods can access this class's private members.
   friend R f(args);      -&gt; the free function f can access them.

   Friendship:
     * is GRANTED by the grantor (you say who your friends are)
     * is NOT symmetric (A friend of B doesn't make B friend of A)
     * is NOT inherited (a friend of Base is not a friend of Derived)
     * is NOT transitive (friend of a friend is not a friend)
</code></pre>
<h3 id="the-hidden-friend-idiom-best-practice-for-operators">The hidden-friend idiom (best practice for operators)</h3>
<pre><code class="language-cpp">class Point {
    int x_, y_;
public:
    Point(int x, int y) : x_(x), y_(y) {}
    // defined INSIDE the class as a friend -&gt; only found via ADL, per-class:
    friend bool operator==(const Point&amp; a, const Point&amp; b) {
        return a.x_ == b.x_ &amp;&amp; a.y_ == b.y_;    // accesses privates

        return os &lt;&lt; '(' &lt;&lt; p.x_ &lt;&lt; ',' &lt;&lt; p.y_ &lt;&lt; ')';
    }
};
</code></pre>
<pre><code>   &quot;Hidden friend&quot; = a friend function DEFINED in the class body. Benefits:
     * can access privates,
     * found only by argument-dependent lookup (doesn't pollute the namespace),
     * one definition per class (no ODR headaches).
   The idiomatic way to write operator&lt;&lt; / operator== that need private access.
</code></pre>
<pre><code>   Use friends SPARINGLY — they couple the friend to your internals. Prefer
   public methods where possible; reserve friend for operators &amp; tightly-related
   helper classes (e.g. an iterator that needs container internals).
</code></pre>
<hr />
<h2 id="5-nested-classes">5. Nested classes</h2>
<p>A class defined inside another. It&rsquo;s a member type — scoped to the outer class,
useful for implementation details (iterators, nodes, builders).</p>
<pre><code class="language-cpp">class LinkedList {
    struct Node {                     // nested: an implementation detail
        int value;
        Node* next;
    };
    Node* head_ = nullptr;

public:
    class Iterator {                  // nested public type: part of the interface
        Node* cur_;
    public:
        explicit Iterator(Node* n) : cur_(n) {}
        int&amp; operator*() { return cur_-&gt;value; }
        Iterator&amp; operator++() { cur_ = cur_-&gt;next; return *this; }
        bool operator!=(const Iterator&amp; o) const { return cur_ != o.cur_; }
    };

    Iterator begin() { return Iterator(head_); }
    Iterator end()   { return Iterator(nullptr); }
    // ...
};
</code></pre>
<pre><code>   Referred to as  LinkedList::Node,  LinkedList::Iterator.
   A nested class is a normal class that happens to be scoped inside the outer.
   * It does NOT get a hidden pointer to the outer object (unlike Java inner classes).
   * Since C++11, a nested class can access the OUTER class's private static and
     type members by name; it is implicitly a friend of the enclosing class.
   Use nested classes for tightly-coupled helpers (Node, Iterator, Builder).
</code></pre>
<hr />
<h2 id="6-putting-it-together-an-id-generator">6. Putting it together: an ID generator</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;

class Entity {
    static inline int next_id_ = 1;    // shared across all entities
    int id_;
public:
    Entity() : id_(next_id_++) {}      // each object grabs &amp; bumps the shared id
    int id() const { return id_; }
    static int created() { return next_id_ - 1; }   // static query
};

int main() {
    Entity a, b, c;
    std::cout &lt;&lt; a.id() &lt;&lt; b.id() &lt;&lt; c.id() &lt;&lt; '\\n';   // 123
    std::cout &lt;&lt; &quot;created: &quot; &lt;&lt; Entity::created() &lt;&lt; '\\n';  // 3
}
</code></pre>
<p>Runnable: <a href="examples/ch11_static_friend.cpp"><code>examples/ch11_static_friend.cpp</code></a>.</p>
<hr />
<h2 id="7-summary">7. Summary</h2>
<div class="diagram"><div class="diagram-title">Static members, friends &amp; nested classes</div><div class="dbox green"><div class="dbox-title">Static members</div><div class="dtext"><b>Static data member</b>: one shared copy for the whole class (not per object). Prefer <code>static inline</code> (C++17) to define in header. <code>static constexpr</code> for compile-time constants</div><div class="dtext"><b>Static method</b>: no <code>this</code>; for factories/utilities/static state. <b>Meyers singleton</b>: <code>static Local inst;</code> inside <code>instance()</code> — thread-safe lazy init</div></div><div class="dbox teal"><div class="dbox-title">Friend</div><div class="dtext">Grants access to privates; granted by the class; <b>not</b> inherited/transitive/symmetric. Use for operators (hidden friend idiom) and tightly-coupled helper classes — sparingly</div></div><div class="dbox purple"><div class="dbox-title">Nested class</div><div class="dtext">A member type (<code>Node</code>/<code>Iterator</code>/<code>Builder</code>); scoped to the outer, implicitly a friend of it, no hidden outer pointer</div></div></div>

<p>SOLID is five design principles for building OOP systems that are easy to
maintain, extend, and test. They&rsquo;re not rules to follow blindly, but heuristics
that steer you away from rigid, fragile designs. Each shown with a C++
before/after.</p>
<p>Prereqs: chapters 05–11.</p>
<div class="diagram"><div class="diagram-title">SOLID</div><div class="dbox blue"><div class="dbox-title">S — Single Responsibility Principle</div></div><div class="dbox teal"><div class="dbox-title">O — Open/Closed Principle</div></div><div class="dbox purple"><div class="dbox-title">L — Liskov Substitution Principle</div></div><div class="dbox orange"><div class="dbox-title">I — Interface Segregation Principle</div></div><div class="dbox gray"><div class="dbox-title">D — Dependency Inversion Principle</div></div></div>
<hr />
<h2 id="1-s--single-responsibility-principle-srp">1. S — Single Responsibility Principle (SRP)</h2>
<blockquote>
<p>A class should have <strong>one reason to change</strong> — one responsibility.</p>
</blockquote>
<div class="diagram"><div class="diagram-title">SRP violation</div><div class="dbox red dashed"><div class="dbox-title">class Employee — God class</div><div class="dtext"><code>computePay()</code> — payroll logic (changes when tax rules change)</div><div class="dtext"><code>saveToDatabase()</code> — persistence (changes when DB changes)</div><div class="dtext"><code>renderHtml()</code> — presentation (changes when UI changes)</div><div class="dtext">Three reasons to change → edits for one concern risk breaking the others</div></div></div>
<pre><code class="language-cpp">// GOOD: split responsibilities
class Employee { /* data + core domain rules only */ };
class PayCalculator { public: Money computePay(const Employee&amp;); };  // payroll
class EmployeeRepository { public: void save(const Employee&amp;); };    // persistence
class EmployeeView { public: std::string renderHtml(const Employee&amp;); }; // UI
</code></pre>
<pre><code>   Each class has ONE responsibility -&gt; one reason to change -&gt; changes are
   localized and testable. (Don't over-split trivial classes, though.)
</code></pre>
<hr />
<h2 id="2-o--openclosed-principle-ocp">2. O — Open/Closed Principle (OCP)</h2>
<blockquote>
<p>Software entities should be <strong>open for extension, closed for modification.</strong>
Add new behavior by adding code, not by editing existing, working code.</p>
</blockquote>
<pre><code class="language-cpp">// BAD: adding a shape forces editing this function (and re-testing it)
double area(const Shape&amp; s) {
    switch (s.type) {
        case CIRCLE:    return 3.14159 * s.r * s.r;
        case RECTANGLE: return s.w * s.h;
        // add TRIANGLE -&gt; must EDIT this switch. Every new type reopens it.
    }
}
</code></pre>
<pre><code class="language-cpp">// GOOD: polymorphism — extend by adding a subclass, not editing existing code
struct Shape { virtual double area() const = 0; virtual ~Shape() = default; };
struct Circle : Shape { double r; double area() const override { return 3.14159*r*r; } };
struct Rectangle : Shape { double w,h; double area() const override { return w*h; } };
// Adding Triangle: write a new class. area()-callers stay UNCHANGED &amp; untested-again.
</code></pre>
<pre><code>   OCP via abstraction:
     caller ──&gt; [ Shape::area() ] &lt;── Circle
                                  &lt;── Rectangle
                                  &lt;── Triangle   (added later, no edits upstream)
   Extension points = virtual functions / interfaces / injected strategies.
</code></pre>
<hr />
<h2 id="3-l--liskov-substitution-principle-lsp">3. L — Liskov Substitution Principle (LSP)</h2>
<blockquote>
<p>Subtypes must be <strong>substitutable</strong> for their base types without breaking
correctness. A <code>Derived</code> must honor everything a <code>Base</code> promises.</p>
</blockquote>
<pre><code class="language-cpp">// VIOLATION: Square is-a Rectangle?
struct Rectangle {
    virtual void set_width(int w)  { w_ = w; }
    virtual void set_height(int h) { h_ = h; }
    int area() const { return w_ * h_; }
protected: int w_ = 0, h_ = 0;
};
struct Square : Rectangle {
    void set_width(int w)  override { w_ = h_ = w; }   // must keep w==h
    void set_height(int h) override { w_ = h_ = h; }   // ...breaks Rectangle's contract
};

void resize_and_check(Rectangle&amp; r) {
    r.set_width(5); r.set_height(4);
    assert(r.area() == 20);        // holds for Rectangle... FAILS for Square (16)!
}
</code></pre>
<pre><code>   Square breaks the Rectangle contract (independent width/height). Passing a
   Square where a Rectangle is expected corrupts logic -&gt; LSP violated.
   FIX: don't force the is-a. Model Shape with area(); Square &amp; Rectangle are
   siblings, not parent/child. (See chapter 10 §8.)
</code></pre>
<pre><code>   LSP red flags in a subclass:
     * overriding a method to do NOTHING or throw &quot;not supported&quot;
     * strengthening PREconditions (accepting less than the base)
     * weakening POSTconditions (delivering less than the base promised)
     * changing observable behavior clients relied on
</code></pre>
<hr />
<h2 id="4-i--interface-segregation-principle-isp">4. I — Interface Segregation Principle (ISP)</h2>
<blockquote>
<p>Don&rsquo;t force clients to depend on methods they don&rsquo;t use. Prefer <strong>many small,
focused interfaces</strong> over one fat one.</p>
</blockquote>
<pre><code class="language-cpp">// BAD: a fat interface forces unrelated obligations
struct IMachine {
    virtual void print()  = 0;
    virtual void scan()   = 0;
    virtual void fax()    = 0;
    virtual ~IMachine() = default;
};
struct SimplePrinter : IMachine {
    void print() override { /* ok */ }
    void scan() override  { throw std::logic_error(&quot;no scanner&quot;); }  // forced!
    void fax()  override  { throw std::logic_error(&quot;no fax&quot;); }      // forced!
};
</code></pre>
<pre><code class="language-cpp">// GOOD: segregate into role interfaces; implement only what applies
struct IPrinter { virtual void print() = 0; virtual ~IPrinter() = default; };
struct IScanner { virtual void scan()  = 0; virtual ~IScanner() = default; };
struct IFax     { virtual void fax()   = 0; virtual ~IFax()     = default; };

struct SimplePrinter : IPrinter { void print() override { /* ... */ } };  // just this
struct AllInOne : IPrinter, IScanner, IFax {                              // opt-in
    void print() override {} void scan() override {} void fax() override {}
};
</code></pre>
<pre><code>   Fat interface:  everyone implements print+scan+fax (even a plain printer).
   Segregated:     implement only the roles you actually fulfill.
   -&gt; Clients depend only on what they use; no dummy/throwing overrides.
</code></pre>
<hr />
<h2 id="5-d--dependency-inversion-principle-dip">5. D — Dependency Inversion Principle (DIP)</h2>
<blockquote>
<p>Depend on <strong>abstractions</strong>, not concretions. High-level modules shouldn&rsquo;t
depend on low-level details; both depend on interfaces.</p>
</blockquote>
<pre><code class="language-cpp">// BAD: high-level NotificationService hard-wired to a concrete EmailSender
class EmailSender { public: void send(const std::string&amp;) { /* SMTP */ } };
class NotificationService {
    EmailSender sender_;                 // depends on a CONCRETE class
public:
    void notify(const std::string&amp; msg) { sender_.send(msg); }   // can't swap/test
};
</code></pre>
<pre><code class="language-cpp">// GOOD: depend on an abstraction; inject the concrete impl
struct IMessageSender {
    virtual void send(const std::string&amp;) = 0;
    virtual ~IMessageSender() = default;
};
class EmailSender : public IMessageSender { public: void send(const std::string&amp;) override; };
class SmsSender   : public IMessageSender { public: void send(const std::string&amp;) override; };

class NotificationService {
    IMessageSender&amp; sender_;             // depends on the ABSTRACTION
public:
    explicit NotificationService(IMessageSender&amp; s) : sender_(s) {}  // injected
    void notify(const std::string&amp; msg) { sender_.send(msg); }
};
</code></pre>
<pre><code>   BEFORE:  NotificationService ────► EmailSender   (high-level -&gt; low-level)

   AFTER:   NotificationService ────► IMessageSender ◄──── EmailSender
            (high-level)              (abstraction)        (low-level)
                                          ▲
                                          └──── SmsSender / MockSender (for tests)

   Both sides depend on the interface. You can swap Email&lt;-&gt;SMS, and inject a
   MockSender in unit tests. This is &quot;dependency injection.&quot;
</code></pre>
<p>Runnable: <a href="examples/ch12_dip.cpp"><code>examples/ch12_dip.cpp</code></a>.</p>
<hr />
<h2 id="6-solid-at-a-glance">6. SOLID at a glance</h2>
<div class="diagram"><div class="diagram-title">SOLID at a glance</div><div class="dbox green"><div class="dbox-title">S — Single Responsibility</div><div class="dtext">One class, one responsibility (one reason to change)</div></div><div class="dbox green"><div class="dbox-title">O — Open/Closed</div><div class="dtext">Extend via new code (subclasses/strategies), don't edit working code</div></div><div class="dbox green"><div class="dbox-title">L — Liskov Substitution</div><div class="dtext">Subtypes must be drop-in replacements for their base (honor the contract)</div></div><div class="dbox green"><div class="dbox-title">I — Interface Segregation</div><div class="dtext">Small, focused interfaces; don't force unused methods on clients</div></div><div class="dbox green"><div class="dbox-title">D — Dependency Inversion</div><div class="dtext">Depend on abstractions (interfaces) and inject concretions</div></div></div>
<pre><code>   How they reinforce each other:
     * OCP is usually achieved via abstractions (D) + polymorphism (L).
     * ISP keeps those abstractions small so implementers aren't over-burdened.
     * SRP keeps classes small enough that the others are natural.
</code></pre>
<hr />
<h2 id="7-balance--pragmatism">7. Balance &amp; pragmatism</h2>
<pre><code>   SOLID are HEURISTICS, not laws. Over-applying them causes its own harm:
     * too many tiny classes/interfaces -&gt; indirection soup, hard to follow.
     * abstracting things that never vary -&gt; speculative generality (YAGNI).
   Apply them where change is LIKELY. Start simple; refactor toward SOLID when
   a real need (a second implementation, a testing seam) appears.
</code></pre>
<hr />
<h2 id="8-summary">8. Summary</h2>
