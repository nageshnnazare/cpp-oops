<p>Design patterns are named, reusable solutions to recurring design problems. This
chapter surveys the most useful GoF patterns with compact, modern C++ examples
and diagrams. The goal is <em>recognition</em> (you&rsquo;ll see these everywhere) and
<em>judgment</em> (when each helps — and its modern alternative).</p>
<p>Prereqs: chapters 06–12.</p>
<div class="diagram"><div class="diagram-title">GoF pattern families</div><div class="dbox blue"><div class="dbox-title">Creational</div><div class="dtext">how objects are created (Factory, Builder, Singleton, Prototype)</div></div><div class="dbox teal"><div class="dbox-title">Structural</div><div class="dtext">how objects compose (Adapter, Decorator, Composite, Facade, Proxy, Bridge, Flyweight)</div></div><div class="dbox purple"><div class="dbox-title">Behavioral</div><div class="dtext">how objects interact (Strategy, Observer, Command, State, Template Method, Iterator, Visitor, …)</div></div></div>
<hr />
<h2 id="1-strategy-behavioral--swap-an-algorithm">1. Strategy (behavioral) — swap an algorithm</h2>
<p>Encapsulate interchangeable behaviors behind an interface; select at runtime.</p>
<pre><code class="language-cpp">struct Compression {
    virtual std::vector&lt;char&gt; compress(const std::vector&lt;char&gt;&amp;) = 0;
    virtual ~Compression() = default;
};
struct Zip  : Compression { std::vector&lt;char&gt; compress(const std::vector&lt;char&gt;&amp;) override; };
struct Gzip : Compression { std::vector&lt;char&gt; compress(const std::vector&lt;char&gt;&amp;) override; };

class Archiver {
    std::unique_ptr&lt;Compression&gt; strategy_;      // the injected strategy
public:
    explicit Archiver(std::unique_ptr&lt;Compression&gt; s) : strategy_(std::move(s)) {}
    void set_strategy(std::unique_ptr&lt;Compression&gt; s) { strategy_ = std::move(s); }
    void archive(const std::vector&lt;char&gt;&amp; d) { strategy_-&gt;compress(d); }
};
</code></pre>
<pre><code>   Archiver ──has──► Compression* ◄── Zip / Gzip (swap at runtime)
   Modern C++ alternative: std::function&lt;...&gt; as the strategy (no class needed):
     std::function&lt;std::vector&lt;char&gt;(const std::vector&lt;char&gt;&amp;)&gt; strategy_;
</code></pre>
<hr />
<h2 id="2-observer-behavioral--publishsubscribe">2. Observer (behavioral) — publish/subscribe</h2>
<p>Subjects notify a list of observers when they change.</p>
<pre><code class="language-cpp">struct Observer { virtual void on_update(int value) = 0; virtual ~Observer() = default; };

class Subject {
    std::vector&lt;Observer*&gt; observers_;   // non-owning; or weak_ptr for safety
    int state_ = 0;
public:
    void subscribe(Observer* o)   { observers_.push_back(o); }
    void set_state(int v) {
        state_ = v;
        for (auto* o : observers_) o-&gt;on_update(state_);   // notify all
    }
};
</code></pre>
<pre><code>   Subject ──notifies──► Observer, Observer, Observer ...
   Used in: GUIs (events), MVC, reactive systems.
   Pitfalls: dangling observers (unsubscribe in dtor / use weak_ptr), and
   re-entrancy (an observer modifying the list during notification).
   Modern alt: signals/slots libraries, or std::function callbacks.
</code></pre>
<p>Runnable: <a href="examples/ch13_observer.cpp"><code>examples/ch13_observer.cpp</code></a>.</p>
<hr />
<h2 id="3-factory-method--simple-factory-creational">3. Factory Method / Simple Factory (creational)</h2>
<p>Centralize object creation behind a function returning a base pointer.</p>
<pre><code class="language-cpp">struct Shape { virtual double area() const = 0; virtual ~Shape() = default; };
struct Circle : Shape { /*...*/ double area() const override; };
struct Square : Shape { /*...*/ double area() const override; };

enum class Kind { Circle, Square };

std::unique_ptr&lt;Shape&gt; make_shape(Kind k) {     // the factory
    switch (k) {
        case Kind::Circle: return std::make_unique&lt;Circle&gt;();
        case Kind::Square: return std::make_unique&lt;Square&gt;();
    }
    return nullptr;
}
</code></pre>
<pre><code>   Client asks make_shape(kind) and gets a Shape — it doesn't name concrete
   types or call 'new'. Creation logic is in ONE place (easy to change/extend).
   Returns unique_ptr -&gt; ownership is clear, no leaks.
</code></pre>
<hr />
<h2 id="4-builder-creational--construct-complex-objects-step-by-step">4. Builder (creational) — construct complex objects step by step</h2>
<pre><code class="language-cpp">class HttpRequest {
public:
    class Builder {
        HttpRequest req_;
    public:
        Builder&amp; url(std::string u)    { req_.url_ = std::move(u); return *this; }
        Builder&amp; method(std::string m) { req_.method_ = std::move(m); return *this; }
        Builder&amp; header(std::string k, std::string v) {
            req_.headers_.emplace_back(std::move(k), std::move(v)); return *this;
        }
        HttpRequest build() { return std::move(req_); }
    };
private:
    std::string url_, method_ = &quot;GET&quot;;
    std::vector&lt;std::pair&lt;std::string,std::string&gt;&gt; headers_;
};

// auto req = HttpRequest::Builder{}.url(&quot;x&quot;).method(&quot;POST&quot;).header(&quot;A&quot;,&quot;B&quot;).build();

<hr />
<h2 id="5-singleton-creational--one-instance-use-sparingly">5. Singleton (creational) — one instance (use sparingly!)</h2>
<pre><code class="language-cpp">class Config {
public:
    static Config&amp; instance() { static Config c; return c; }  // Meyers singleton
    int get(const std::string&amp; key) const;
private:
    Config() = default;
    Config(const Config&amp;) = delete;
    Config&amp; operator=(const Config&amp;) = delete;
};
</code></pre>
<pre><code>   Thread-safe lazy init (chapter 11). BUT singletons are global state in
   disguise: they hide dependencies, hurt testability, and cause init-order
   issues. Prefer PASSING the dependency (DIP, chapter 12) over a singleton.
   Reserve for truly-single resources (logging sink) — and even then, consider DI.
</code></pre>
<hr />
<h2 id="6-decorator-structural--add-behavior-by-wrapping">6. Decorator (structural) — add behavior by wrapping</h2>
<p>Wrap an object in another with the same interface, adding behavior — an
alternative to subclassing for every combination.</p>
<pre><code class="language-cpp">struct DataSource { virtual std::string read() = 0; virtual ~DataSource() = default; };
struct FileSource : DataSource { std::string read() override { return &quot;raw&quot;; } };

struct Decorator : DataSource {                 // base wrapper
    std::unique_ptr&lt;DataSource&gt; inner_;
    explicit Decorator(std::unique_ptr&lt;DataSource&gt; d) : inner_(std::move(d)) {}
};
struct Encrypted : Decorator {
    using Decorator::Decorator;
    std::string read() override { return &quot;enc(&quot; + inner_-&gt;read() + &quot;)&quot;; }
};
struct Compressed : Decorator {
    using Decorator::Decorator;
    std::string read() override { return &quot;zip(&quot; + inner_-&gt;read() + &quot;)&quot;; }
};

// stack them:
// auto s = std::make_unique&lt;Compressed&gt;(
//              std::make_unique&lt;Encrypted&gt;(
//                  std::make_unique&lt;FileSource&gt;()));
// s-&gt;read();  -&gt;  &quot;zip(enc(raw))&quot;
</code></pre>
<pre><code>   FileSource   -&gt; &quot;raw&quot;
   + Encrypted  -&gt; &quot;enc(raw)&quot;
   + Compressed -&gt; &quot;zip(enc(raw))&quot;
   Each decorator wraps the next, adding one behavior. Combine freely at runtime
   instead of creating EncryptedCompressedFileSource-style subclass explosions.
</code></pre>
<p>Runnable: <a href="examples/ch13_decorator.cpp"><code>examples/ch13_decorator.cpp</code></a>.</p>
<hr />
<h2 id="7-adapter-structural--make-incompatible-interfaces-work-together">7. Adapter (structural) — make incompatible interfaces work together</h2>
<pre><code class="language-cpp">struct Logger { virtual void log(const std::string&amp;) = 0; virtual ~Logger()=default; };

class ThirdPartyLib {                       // has a DIFFERENT interface
public: void write_message(const char* s, int level);
};

class LibAdapter : public Logger {          // adapts ThirdPartyLib to Logger
    ThirdPartyLib&amp; lib_;
public:
    explicit LibAdapter(ThirdPartyLib&amp; l) : lib_(l) {}
    void log(const std::string&amp; s) override { lib_.write_message(s.c_str(), 1); }
};
</code></pre>
<pre><code>   Your code expects Logger; the library speaks write_message(). The Adapter
   TRANSLATES one interface to the other. (Like a power-plug adapter.)
</code></pre>
<hr />
<h2 id="8-template-method-behavioral--fixed-skeleton-customizable-steps">8. Template Method (behavioral) — fixed skeleton, customizable steps</h2>
<pre><code class="language-cpp">class Game {
public:
    void play() {                 // the invariant algorithm (skeleton)
        initialize();
        start_play();
        end_play();
    }
    virtual ~Game() = default;
private:
    virtual void initialize() = 0;   // steps customized by subclasses
    virtual void start_play() = 0;
    virtual void end_play()   = 0;
};
class Chess : public Game {
    void initialize() override {} void start_play() override {} void end_play() override {}
};
</code></pre>
<pre><code>   The base defines the ORDER (play()); subclasses fill in the STEPS. This is
   the NVI idiom from chapter 07: public non-virtual skeleton + private virtuals.
</code></pre>
<hr />
<h2 id="9-command-behavioral--actions-as-objects">9. Command (behavioral) — actions as objects</h2>
<pre><code class="language-cpp">struct Command { virtual void execute() = 0; virtual void undo() = 0; virtual ~Command()=default; };

class AddText : public Command {
    Document&amp; doc_; std::string text_;
public:
    AddText(Document&amp; d, std::string t) : doc_(d), text_(std::move(t)) {}
    void execute() override { doc_.append(text_); }
    void undo()    override { doc_.remove_last(text_.size()); }
};
// std::vector&lt;std::unique_ptr&lt;Command&gt;&gt; history;  -&gt; undo/redo, macros, queues
</code></pre>
<pre><code>   Wrap an operation (+ its undo) as an object -&gt; enables undo/redo stacks,
   queuing, logging, and replaying actions. Modern alt: std::function for simple
   commands without undo.
</code></pre>
<hr />
<h2 id="10-pattern-selector--modern-alternatives">10. Pattern selector &amp; modern alternatives</h2>
<pre><code>   Need                                  Pattern            Modern C++ alt
   -----------------------------------   ----------------   --------------------
   swap an algorithm                     Strategy           std::function / lambda
   notify many on change                 Observer           signals / callbacks
   create without naming concrete type   Factory            factory fn + unique_ptr
   build a complex object stepwise       Builder            named args / aggregates
   exactly one instance                  Singleton          dependency injection!
   add behavior by wrapping              Decorator          ranges views / wrappers
   bridge incompatible interfaces        Adapter            free-function shim
   fixed skeleton, custom steps          Template Method    NVI / std::function hooks
   actions + undo                        Command            std::function (no undo)
   closed set of types + operations      Visitor            std::variant + std::visit
</code></pre>
<pre><code>   Patterns are a VOCABULARY, not a checklist. Many GoF patterns exist to work
   around missing language features; modern C++ (lambdas, std::function,
   variant, templates) often expresses them more directly. Learn them to
   COMMUNICATE and RECOGNIZE, then pick the simplest tool.
</code></pre>
<h3 id="visitor-vs-stdvariant-a-modern-note">Visitor vs <code>std::variant</code> (a modern note)</h3>
<pre><code class="language-cpp">// Instead of a Visitor class hierarchy for a CLOSED set of types:
using Shape = std::variant&lt;Circle, Square, Triangle&gt;;
double area(const Shape&amp; s) {
    return std::visit([](const auto&amp; x){ return x.area(); }, s);   // type-safe dispatch
}
</code></pre>
<pre><code>   For a FIXED set of types, std::variant + std::visit gives compile-time-checked

</code></pre>

<p>Modern C++ (11 through 26) reshaped how idiomatic OOP is written: automatic
resource management with smart pointers, move semantics, closed-set polymorphism
with <code>std::variant</code>, and syntax sugar like deducing <code>this</code> and the spaceship
operator. This chapter is the &ldquo;how OOP is actually written today&rdquo; chapter.</p>
<p>Prereqs: chapters 04, 06, 09, 10.</p>
<hr />
<h2 id="1-smart-pointers-ownership-made-explicit-never-newdelete">1. Smart pointers: ownership made explicit (never <code>new</code>/<code>delete</code>)</h2>
<p>Raw owning pointers are a bug magnet (leaks, double-free, dangling). Smart
pointers encode ownership in the type and clean up via RAII (chapter 02).</p>
<pre><code class="language-cpp">#include &lt;memory&gt;

std::unique_ptr&lt;Widget&gt; a = std::make_unique&lt;Widget&gt;(args);   // sole owner
std::shared_ptr&lt;Widget&gt; b = std::make_shared&lt;Widget&gt;(args);   // shared owner
std::weak_ptr&lt;Widget&gt;   w = b;                                 // non-owning observer
</code></pre>
<pre><code>   unique_ptr&lt;T&gt; : EXCLUSIVE ownership. Move-only. Zero overhead vs raw ptr.
                   Frees automatically when it goes out of scope. THE default.
   shared_ptr&lt;T&gt; : SHARED ownership via an atomic reference count. Frees when
                   the LAST shared_ptr dies. Heavier (control block, atomics).
   weak_ptr&lt;T&gt;   : observes a shared_ptr WITHOUT keeping it alive; breaks cycles.
                   .lock() -&gt; shared_ptr if still alive, else null.
</code></pre>
<pre><code>   unique_ptr:                        shared_ptr:
     up ──owns──► [Widget]             sp1 ─┐
     (dies -&gt; Widget deleted)          sp2 ─┼─► [ctrl: refcount=3] ─► [Widget]
                                       sp3 ─┘   (deleted when count hits 0)
                                       wp ····► (observes; doesn't count)
</code></pre>
<h3 id="ownership-in-interfaces-rules-of-thumb">Ownership in interfaces (rules of thumb)</h3>
<pre><code>   Function takes...            Meaning
   -------------------------    ------------------------------------------
   unique_ptr&lt;T&gt; (by value)     &quot;I take ownership&quot; (sink)
   shared_ptr&lt;T&gt; (by value)     &quot;I share ownership&quot; (keep it alive)
   T*  or  T&amp;                   &quot;I just USE it, no ownership&quot; (non-owning)
   const T&amp;                     read-only use, no ownership

   Return unique_ptr&lt;T&gt; from factories (transfers ownership to the caller).
   Prefer make_unique/make_shared (exception-safe, single allocation for shared).
</code></pre>
<p>Runnable: <a href="examples/ch14_smart_pointers.cpp"><code>examples/ch14_smart_pointers.cpp</code></a>.</p>
<hr />
<h2 id="2-polymorphism-with-smart-pointers-the-modern-base-collection">2. Polymorphism with smart pointers (the modern base-collection)</h2>
<pre><code class="language-cpp">std::vector&lt;std::unique_ptr&lt;Shape&gt;&gt; shapes;
shapes.push_back(std::make_unique&lt;Circle&gt;(2.0));
shapes.push_back(std::make_unique&lt;Square&gt;(3.0));
for (const auto&amp; s : shapes)
    std::cout &lt;&lt; s-&gt;area() &lt;&lt; '\\n';      // virtual dispatch; no leaks; no slicing
// vector's destructor deletes every Shape automatically.
</code></pre>
<pre><code>   This replaces the old  std::vector&lt;Shape*&gt;  + manual new/delete loop.
   No slicing (we store pointers), no leaks (unique_ptr frees), exception-safe.
   Requires Shape to have a virtual destructor (chapter 06 §7).
</code></pre>
<hr />
<h2 id="3-move-semantics-in-class-design-recap--practice">3. Move semantics in class design (recap + practice)</h2>
<pre><code>   * Make move ctor/assign 'noexcept' -&gt; containers move (not copy) on realloc.
   * Rule of Zero: prefer members that already move well (string, vector, unique_ptr).
   * Return big objects BY VALUE — move/RVO makes it cheap (no out-parameters).
   * Accept sink parameters by value and std::move into place:
       Widget(std::string name) : name_(std::move(name)) {}
</code></pre>
<pre><code>   Old style (out-param, ugly):        Modern (return by value, cheap):
     void make(BigThing&amp; out);           BigThing make();
     BigThing b; make(b);                auto b = make();   // move/RVO, no copy
</code></pre>
<hr />
<h2 id="4-closed-set-polymorphism-stdvariant--stdvisit">4. Closed-set polymorphism: <code>std::variant</code> + <code>std::visit</code></h2>
<p>For a <strong>fixed, known</strong> set of types, <code>std::variant</code> gives type-safe polymorphism
with <strong>value semantics</strong> — no inheritance, no heap, no vtable.</p>
<pre><code class="language-cpp">#include &lt;variant&gt;

struct Circle { double r; double area() const { return 3.14159*r*r; } };
struct Square { double s; double area() const { return s*s; } };
using Shape = std::variant&lt;Circle, Square&gt;;

double area(const Shape&amp; sh) {
    return std::visit([](const auto&amp; x){ return x.area(); }, sh);  // dispatch
}

std::vector&lt;Shape&gt; shapes{ Circle{2}, Square{3} };   // stored BY VALUE, contiguous
</code></pre>
<pre><code>   virtual/inheritance             std::variant + visit
   ---------------------------     -----------------------------------
   OPEN set (add types anywhere)   CLOSED set (all types known here)
   heap + base pointers            value semantics, cache-friendly, no heap
   vtable indirect call            visit (often devirtualized/inlined)
   new subtype = new class         new type = edit the variant + visitors

   Use variant for a small FIXED set (AST nodes, states, results). Use
   inheritance for an OPEN, extensible set (plugins).
</code></pre>
<p>Runnable: <a href="examples/ch14_variant.cpp"><code>examples/ch14_variant.cpp</code></a>.</p>
<hr />
<h2 id="5-type-erasure-runtime-polymorphism-without-inheritance">5. Type erasure: runtime polymorphism WITHOUT inheritance</h2>
<p>Sometimes you want polymorphism but don&rsquo;t want callers to inherit from your base
(non-intrusive). Type erasure (<code>std::function</code> is a famous example) wraps any
conforming type behind a value interface. (Full mechanics are in the
<code>cpp-templates</code> guide, chapter 10; here&rsquo;s the OOP framing.)</p>
<pre><code class="language-cpp">// std::function IS type erasure over &quot;callable&quot;:
std::function&lt;int(int)&gt; f = [](int x){ return x + 1; };   // holds a lambda
f = &amp;some_free_function;                                    // ...or a function ptr
f = SomeFunctor{};                                          // ...or a functor
f(41);   // 42 — dispatches to whatever it holds, no common base class required
</code></pre>
<pre><code>   Type erasure: one value type (std::function / std::any / a custom wrapper)
   stores ANY type that satisfies a duck-typed interface, dispatching via a
   hidden virtual under the hood. Non-intrusive: stored types need NO base class.
</code></pre>
<hr />
<h2 id="6-override-final--default--delete-write-intent">6. <code>override</code>, <code>final</code>, <code>= default</code>, <code>= delete</code> (write intent)</h2>
<p>Modern class declarations state intent explicitly (chapters 04, 06):</p>
<pre><code class="language-cpp">class Base {
public:
    virtual void f();
    virtual ~Base() = default;             // virtual dtor, defaulted
};
class Derived final : public Base {         // no further subclassing
public:
    void f() override;                      // compiler-checked override
    Derived(const Derived&amp;) = delete;       // non-copyable
    Derived(Derived&amp;&amp;) noexcept = default;  // movable
};
</code></pre>
<pre><code>   override  -&gt; catches signature mistakes at compile time.
   final     -&gt; locks classes/methods; enables devirtualization.
   = default -&gt; &quot;generate the standard version&quot; (keeps it trivial where possible).
   = delete  -&gt; forbid an operation (compile error on use).
   Together they make the class's contract explicit and self-documenting.
</code></pre>
<hr />
<h2 id="7-deducing-this-c23--deduplicate-cvref-overloads">7. Deducing <code>this</code> (C++23) — deduplicate cv/ref overloads</h2>
<p>An explicit object parameter lets one member serve <code>&amp;</code>, <code>const&amp;</code>, <code>&amp;&amp;</code>, and even
acts as a clean CRTP replacement (see the <code>cpp-templates</code> guide chapter 14).</p>
<pre><code class="language-cpp">class Widget {
    std::string data_;
public:
    // one function replaces const/non-const/rvalue getter overloads:
    template &lt;class Self&gt;
    auto&amp;&amp; data(this Self&amp;&amp; self) {
        return std::forward&lt;Self&gt;(self).data_;   // returns matching ref-ness
    }
};
</code></pre>
<pre><code>   w.data()             -&gt; std::string&amp;
   const_w.data()       -&gt; const std::string&amp;
   std::move(w).data()  -&gt; std::string&amp;&amp;
   ONE definition. Also enables recursive lambdas and simplifies CRTP-style
   static polymorphism. (Needs GCC 14+/Clang 18+, -std=c++23.)
</code></pre>
<p>Runnable: <a href="examples/ch14_deducing_this.cpp"><code>examples/ch14_deducing_this.cpp</code></a>.</p>
<hr />
<h2 id="8-three-way-comparison--c20-in-class-design">8. Three-way comparison <code>&lt;=&gt;</code> (C++20) in class design</h2>
<pre><code class="language-cpp">#include &lt;compare&gt;
struct Point {
    int x, y;
    auto operator&lt;=&gt;(const Point&amp;) const = default;  // all six comparisons
    bool operator==(const Point&amp;) const = default;
};
// Point is now usable in std::set, std::map keys, sorting, ==, etc. for free.
</code></pre>
<pre><code>   One defaulted &lt;=&gt; (+ ==) replaces six hand-written operators (chapter 09).
   Makes value types &quot;regular&quot; (comparable) with almost no boilerplate.
</code></pre>
<hr />
<h2 id="9-putting-it-together-a-modern-shape-system">9. Putting it together: a modern shape system</h2>
<pre><code class="language-cpp">#include &lt;memory&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

class Shape {
public:
    virtual double area() const = 0;
    virtual ~Shape() = default;                 // virtual dtor
};

class Circle final : public Shape {             // final: not a base
    double r_;
public:
    explicit Circle(double r) : r_(r) {}
    double area() const override { return 3.14159265 * r_ * r_; }
};

class Rectangle final : public Shape {
    double w_, h_;
public:
    Rectangle(double w, double h) : w_(w), h_(h) {}
    double area() const override { return w_ * h_; }
};

// factory returns owning unique_ptr:
std::unique_ptr&lt;Shape&gt; make_circle(double r) { return std::make_unique&lt;Circle&gt;(r); }

int main() {
    std::vector&lt;std::unique_ptr&lt;Shape&gt;&gt; shapes;
    shapes.push_back(make_circle(2.0));
    shapes.push_back(std::make_unique&lt;Rectangle&gt;(3.0, 4.0));

    double total = 0;
    for (const auto&amp; s : shapes) total += s-&gt;area();
    std::cout &lt;&lt; &quot;total = &quot; &lt;&lt; total &lt;&lt; '\\n';    // 24.5664
    // no delete needed — unique_ptr + vector clean up automatically.
}
</code></pre>
<p>Runnable: <a href="examples/ch14_modern_shapes.cpp"><code>examples/ch14_modern_shapes.cpp</code></a>.</p>
<hr />
<h2 id="10-summary">10. Summary</h2>
<div class="diagram"><div class="diagram-title">Modern C++ OOP</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><b>Smart pointers</b>: <code>unique_ptr</code> (sole owner, default), <code>shared_ptr</code> (shared, refcounted), <code>weak_ptr</code> (observer, breaks cycles). Use <code>make_unique</code>/<code>make_shared</code>; never raw <code>new</code>/<code>delete</code>. Encode ownership in signatures</div><div class="dtext">Store polymorphic objects as <code>vector&lt;unique_ptr&lt;Base&gt;&gt;</code> (no slicing/leaks; needs virtual dtor)</div><div class="dtext"><b>Move</b>: <code>noexcept</code> moves, return by value, sink-by-value+<code>std::move</code></div><div class="dtext"><b>Closed</b> set → <code>std::variant</code> + <code>std::visit</code> (value semantics, no heap). <b>Open</b> set → virtual. Non-intrusive → type erasure</div><div class="dtext"><code>override</code>/<code>final</code>/<code>=default</code>/<code>=delete</code> state intent. C++23 deducing <code>this</code> &amp; C++20 <code>&lt;=&gt;</code> cut boilerplate</div></div></div>
<p>Next: <a href="15-pitfalls-and-best-practices.md">15-pitfalls-and-best-practices.md</a>.</p>` },
  { name: `17. Pitfalls And Best Practices`, path: `15-pitfalls-and-best-practices.md`, dir: ``, words: 1072, mins: 5, body: `<h1 id="15--pitfalls--best-practices">15 — Pitfalls &amp; Best Practices</h1>
<p>A field guide to the OOP bugs that bite everyone, and the habits that prevent
them. Most of these have appeared earlier; this is the consolidated checklist.</p>
<hr />
<h2 id="1-missing-virtual-destructor-leak--ub">1. Missing virtual destructor (leak / UB)</h2>
<pre><code class="language-cpp">struct Base { ~Base(); };                 // NON-virtual dtor
struct Derived : Base { std::vector&lt;int&gt; big; ~Derived(); };
Base* p = new Derived();
delete p;                                 // only ~Base runs -&gt; ~Derived skipped -&gt; UB/leak
</code></pre>
<pre><code>   RULE: a class used polymorphically (deleted via Base*) MUST have a virtual
   destructor. If a class has ANY virtual function, give it a virtual dtor.
   Alternatively: make the base dtor protected+non-virtual to FORBID
   delete-through-base (used when you never delete polymorphically).
</code></pre>
<hr />
<h2 id="2-object-slicing">2. Object slicing</h2>
<pre><code class="language-cpp">std::vector&lt;Animal&gt; zoo;
zoo.push_back(Dog{});          // sliced to Animal — Dog part lost
Animal a = someDog;            // sliced copy
void feed(Animal a);           // by VALUE -&gt; slices any derived argument
feed(someDog);                 // Dog-ness gone inside feed
</code></pre>
<pre><code>   Slicing happens whenever a derived object is copied into a BASE VALUE.
   FIX: pass/store by reference or pointer for polymorphism:
     void feed(const Animal&amp; a);                    // no slice
     std::vector&lt;std::unique_ptr&lt;Animal&gt;&gt; zoo;      // no slice
</code></pre>
<hr />
<h2 id="3-calling-virtual-functions-in-constructorsdestructors">3. Calling virtual functions in constructors/destructors</h2>
<pre><code class="language-cpp">struct Base { Base(){ setup(); } virtual void setup(); };   // calls Base::setup!
</code></pre>
<pre><code>   During Base's ctor/dtor the object is (still/again) only a Base, so virtual
   calls resolve to Base's version, NOT the derived override. Avoid virtual calls
   in ctors/dtors, or use a separate init() called after construction.
</code></pre>
<hr />
<h2 id="4-forgetting-the-rule-of-threefive-shallow-copy">4. Forgetting the Rule of Three/Five (shallow copy)</h2>
<pre><code class="language-cpp">class Buf { int* p_; public: Buf(int n):p_(new int[n]){} ~Buf(){ delete[] p_; } };
Buf a(10);
Buf b = a;    // default copy = shallow -&gt; a.p_ == b.p_ -&gt; DOUBLE FREE at scope end
</code></pre>
<pre><code>   If you write a destructor that frees a resource, you MUST also handle copy
   (and move). Better: use RAII members (unique_ptr/vector) -&gt; Rule of Zero,
   the compiler does it correctly. (Chapter 04.)
</code></pre>
<hr />
<h2 id="5-self-assignment-and-self-move">5. Self-assignment and self-move</h2>
<pre><code class="language-cpp">T&amp; operator=(const T&amp; o) {
    delete p_;                  // if &amp;o == this, you just freed the source!
    p_ = new U(*o.p_);          // ...then read freed memory -&gt; UB
    return *this;
}
</code></pre>
<pre><code>   Guard with 'if (this != &amp;o)' OR use copy-and-swap (chapter 04 §7), which is
   inherently self-assignment safe and exception safe.
</code></pre>
<hr />
<h2 id="6-returning-referencespointers-to-locals-or-destroyed-members">6. Returning references/pointers to locals or destroyed members</h2>
<pre><code class="language-cpp">const std::string&amp; name() const { return std::string(&quot;x&quot;); }  // DANGLING: temp dies
int&amp; at(int i) { int local = data_[i]; return local; }        // DANGLING: local dies
</code></pre>
<pre><code>   Never return a reference/pointer to a local or a temporary. Return by value,
   or reference a member that outlives the call. Watch dangling references from
   'auto&amp; x = obj.method_returning_temporary();'.
</code></pre>
<hr />
<h2 id="7-inheriting-to-reuse-wrong-is-a--lsp-violations">7. Inheriting to reuse (wrong is-a) &amp; LSP violations</h2>
<pre><code class="language-cpp">class Stack : public std::vector&lt;int&gt; {};   // Stack is NOT a vector -&gt; leaks API
class Square : public Rectangle {};         // breaks setWidth/setHeight contract
</code></pre>
<pre><code>   Use inheritance for genuine IS-A + substitutability, not for code reuse.
   Prefer composition (chapter 10). If a subclass must throw &quot;unsupported&quot; or
   weaken a base guarantee, the hierarchy is wrong.
</code></pre>
<hr />
<h2 id="8-fat-interfaces--god-classes">8. Fat interfaces &amp; god classes</h2>
<pre><code>   * A class with 30 methods and 15 members doing unrelated jobs -&gt; split (SRP).
   * An interface forcing implementers to stub/throw unused methods -&gt; segregate
     (ISP). (Chapter 12.)
</code></pre>
<hr />
<h2 id="9-overusing-inheritance-depth">9. Overusing inheritance depth</h2>
<pre><code>   Deep hierarchies (A-&gt;B-&gt;C-&gt;D-&gt;E) are rigid and hard to reason about. Each
   level couples to all ancestors (fragile base class). Prefer shallow trees +
   composition. &quot;Prefer flat + compose&quot; over &quot;deep + inherit.&quot;
</code></pre>
<hr />
<h2 id="10-public-data-members--leaking-internals">10. Public data members / leaking internals</h2>
<pre><code class="language-cpp">class Account { public: double balance; };   // no invariant protection
</code></pre>
<pre><code>   Keep data private; expose behavior. A struct of public data is fine for
   PLAIN data with no invariants, but a class with rules must guard them
   (chapter 03). Don't return non-const references to private members that let
   callers bypass your invariants.
</code></pre>
<hr />
<h2 id="11-explicit-omitted---surprising-conversions">11. <code>explicit</code> omitted -&gt; surprising conversions</h2>
<pre><code class="language-cpp">class Timer { public: Timer(int seconds); };   // implicit
void wait(Timer);
wait(5);                                        // 5 silently -&gt; Timer(5). Surprise!
</code></pre>
<pre><code>   Mark single-argument constructors 'explicit' unless implicit conversion is
   genuinely wanted (chapter 02). Same for conversion operators (chapter 09).
</code></pre>
<hr />
<h2 id="12-shared_ptr-cycles-memory-leak-despite-raii">12. <code>shared_ptr</code> cycles (memory leak despite RAII)</h2>
<pre><code class="language-cpp">struct Node { std::shared_ptr&lt;Node&gt; next; std::shared_ptr&lt;Node&gt; prev; };
// a-&gt;next = b; b-&gt;prev = a;  -&gt; refcounts never reach 0 -&gt; LEAK
</code></pre>
<pre><code>   Two shared_ptrs pointing at each other keep each other alive forever.
   FIX: make one direction a weak_ptr (typically the &quot;back&quot;/parent pointer):
     struct Node { std::shared_ptr&lt;Node&gt; next; std::weak_ptr&lt;Node&gt; prev; };
</code></pre>
<hr />
<h2 id="13-overusing-shared_ptr-when-unique_ptr-suffices">13. Overusing <code>shared_ptr</code> (when <code>unique_ptr</code> suffices)</h2>
<pre><code>   shared_ptr has overhead (atomic refcount, control block) and blurs ownership
   (&quot;who owns this?&quot;). Default to unique_ptr (single clear owner); reach for
   shared_ptr only when ownership is genuinely shared. Pass raw T*/T&amp; for
   non-owning use.
</code></pre>
<hr />
<h2 id="14-best-practices-checklist">14. Best-practices checklist</h2>
<pre><code>   CLASS DESIGN
   [ ] Keep data private; expose behavior, protect invariants (ch 03).
   [ ] const-correct every non-mutating method.
   [ ] Single-arg ctors 'explicit'; single responsibility per class.
   [ ] Rule of Zero (RAII members). If not, handle all of Rule of Five.
   [ ] noexcept move operations.

   INHERITANCE / POLYMORPHISM
   [ ] Public inheritance only for real is-a + substitutability (LSP).
   [ ] Virtual destructor on polymorphic bases.
   [ ] 'override' on every override; 'final' where appropriate.
   [ ] No virtual calls in ctors/dtors.
   [ ] Prefer composition over inheritance for reuse.

   RESOURCES / MODERN
   [ ] Smart pointers, never raw new/delete; unique_ptr by default.
   [ ] Break shared_ptr cycles with weak_ptr.
   [ ] Return by value (move/RVO); sink params by value + std::move.
   [ ] Closed set of types -&gt; std::variant; open -&gt; virtual.
   [ ] C++20 &lt;=&gt; for comparisons; program to interfaces (DIP).

   TESTING / QUALITY
   [ ] Depend on abstractions so you can inject mocks (DIP).
   [ ] Build with -Wall -Wextra; run with sanitizers (asan/ubsan).
</code></pre>
<hr />
<h2 id="15-tooling-that-catches-oop-bugs">15. Tooling that catches OOP bugs</h2>
<pre><code>   -Wall -Wextra                 : warns on -Wreorder, hidden overrides, etc.
   -Wnon-virtual-dtor            : flags missing virtual destructors
   -fsanitize=address            : use-after-free, double-free, leaks (slicing
                                   fallout), buffer overruns
   -fsanitize=undefined          : UB (bad casts, null deref, etc.)
   clang-tidy                    : modernize-*, cppcoreguidelines-* checks
   -Weffc++                      : Meyers-style class hygiene warnings (noisy)
</code></pre>
<pre><code class="language-bash">clang++ -std=c++20 -Wall -Wextra -Wnon-virtual-dtor -fsanitize=address,undefined \\
        prog.cpp -o prog &amp;&amp; ./prog
</code></pre>
<hr />
<h2 id="16-summary">16. Summary</h2>
<div class="diagram"><div class="diagram-title">Pitfalls &amp; best practices</div><div class="dbox red"><div class="dbox-title">Top OOP bugs</div><div class="dtext">missing <b>virtual dtor</b>, <b>slicing</b>, <b>virtual-in-ctor</b>, shallow copy (rule of 3/5), self-assignment, dangling returns, wrong <b>is-a / LSP</b> breaks, <code>shared_ptr</code> cycles, missing <code>explicit</code></div></div><div class="dbox green"><div class="dbox-title">Habits that prevent them</div><div class="dtext">private data + behavior, <b>const-correct</b>, <b>Rule of Zero</b>, virtual dtor + <code>override</code>, <b>composition over inheritance</b>, smart pointers (<code>unique_ptr</code> by default), program to interfaces, use warnings + sanitizers</div></div></div>
<p>Next: <a href="16-cheatsheet.md">16-cheatsheet.md</a>.</p>` },
  { name: `18. Cheatsheet`, path: `16-cheatsheet.md`, dir: ``, words: 1027, mins: 5, body: `<h1 id="16--c-oop-cheatsheet">16 — C++ OOP Cheatsheet</h1>
<p>One-page recall. Read the chapters first; this is the reference card.</p>
<hr />
<h2 id="the-four-pillars">The four pillars</h2>
<div class="diagram"><div class="diagram-title">The four pillars</div><div class="dbox green"><div class="dbox-title">Encapsulation (ch 03)</div><div class="dtext">bundle data+methods, hide internals, protect invariants</div></div><div class="dbox teal"><div class="dbox-title">Abstraction (ch 07)</div><div class="dtext">expose <b>WHAT</b> not <b>HOW</b>; interfaces/abstract classes</div></div><div class="dbox purple"><div class="dbox-title">Inheritance (ch 05)</div><div class="dtext">is-a reuse/specialization</div></div><div class="dbox orange"><div class="dbox-title">Polymorphism (ch 06)</div><div class="dtext">one interface, many behaviors; virtual dispatch</div></div></div>
<h2 id="class-basics">Class basics</h2>
<pre><code class="language-cpp">class Foo {
public:                     // interface
    Foo(int x) : x_(x) {}   // ctor + initializer list
    int  get() const { return x_; }      // const method (non-mutating)
    void set(int x) { x_ = x; }
private:                    // internals
    int x_;                 // data member
};
// struct = class with default PUBLIC; class = default PRIVATE.
</code></pre>
<h2 id="access--inheritance-modes">Access &amp; inheritance modes</h2>
<pre><code>  public    : everyone      | public inheritance    : is-a (use this)
  protected : + subclasses  | protected inheritance : rare
  private   : this class    | private inheritance   : &quot;implemented-in-terms-of&quot;
  (+ friend : granted access, not inherited/transitive)
</code></pre>
<h2 id="the-six-special-members-rule-of-035">The six special members (Rule of 0/3/5)</h2>
<pre><code class="language-cpp">T();                              // default ctor
~T();                             // destructor
T(const T&amp;);                      // copy ctor
T&amp; operator=(const T&amp;);           // copy assignment
T(T&amp;&amp;) noexcept;                  // move ctor
T&amp; operator=(T&amp;&amp;) noexcept;       // move assignment

// RULE OF ZERO : own resources via RAII members; declare none. (best)
// RULE OF THREE: dtor + copy ctor + copy assign go together.
// RULE OF FIVE : + move ctor + move assign (noexcept!).
// Writing a dtor SUPPRESSES implicit moves -&gt; then declare all five (=default).
</code></pre>
<h2 id="construction--destruction-order">Construction / destruction order</h2>
<pre><code>  Construct: base(s) -&gt; members (DECLARATION order) -&gt; ctor body
  Destroy:   ctor body's counterpart -&gt; members (REVERSE) -&gt; base(s) (reverse)
  Virtual bases constructed FIRST, by the MOST-DERIVED class.
</code></pre>
<h2 id="copy-vs-move">Copy vs move</h2>
<pre><code>  copy: duplicate (deep). move: steal guts, leave source valid-empty (O(1)).
  std::move(x) = cast to rvalue (enables move overload); moves nothing itself.
  lvalue -&gt; copy overload;  rvalue/std::move -&gt; move overload.
</code></pre>
<h2 id="polymorphism">Polymorphism</h2>
<pre><code class="language-cpp">struct Base {
    virtual R f() ;                 // virtual -&gt; dynamic dispatch (via vtable)
    virtual ~Base() = default;      // VIRTUAL DTOR on polymorphic bases (mandatory)
};
struct Derived : Base {
    R f() override;                 // always write 'override'
};
Base* p = new Derived();  p-&gt;f();  // Derived::f (runtime)
// final : lock a class/method. Don't call virtuals in ctors/dtors.
</code></pre>
<h2 id="abstract-classes--interfaces">Abstract classes &amp; interfaces</h2>
<pre><code class="language-cpp">struct Shape {                       // abstract
    virtual double area() const = 0; // pure virtual -&gt; must override
    virtual ~Shape() = default;
};
// Interface idiom = all pure virtual + no data. Implement several via MI.
</code></pre>
<h2 id="multiple--diamond-inheritance">Multiple / diamond inheritance</h2>
<pre><code class="language-cpp">class D : public A, public B {};                 // multiple (best: interfaces)
class Mammal : public virtual Animal {};         // VIRTUAL inheritance -&gt;
class Winged : public virtual Animal {};         //   ONE shared Animal (no dup)
class Bat : public Mammal, public Winged {        //   most-derived inits vbase
    Bat(...) : Animal(...) {}
};
</code></pre>
<h2 id="operator-overloading">Operator overloading</h2>
<pre><code class="language-cpp">struct V {
    V&amp; operator+=(const V&amp;);              // member (compound assign)
    bool operator==(const V&amp;) const = default;   // C++20 member-wise ==
    auto operator&lt;=&gt;(const V&amp;) const = default;  // C++20 -&gt; all comparisons
    friend V operator+(V a, const V&amp; b){ return a += b; }         // symmetric
    friend std::ostream&amp; operator&lt;&lt;(std::ostream&amp;, const V&amp;);     // hidden friend
};
// member: = [] () -&gt;  ;  non-member/friend: + - == &lt;&lt;  (symmetric, conversions)
</code></pre>
<h2 id="relationships--design">Relationships / design</h2>
<pre><code>  IS-A   -&gt; inheritance (only if substitutable, LSP)
  HAS-A  -&gt; composition (member) / aggregation (ref)   &lt;- FAVOR THIS for reuse
  USES-A -&gt; dependency (parameter)
  Inherit to be SUBSTITUTABLE, not to REUSE.
</code></pre>
<h2 id="solid">SOLID</h2>
<div class="diagram"><div class="diagram-title">SOLID</div><div class="dbox green"><div class="dbox-title">S — Single Responsibility</div><div class="dtext">one reason to change</div></div><div class="dbox green"><div class="dbox-title">O — Open/Closed</div><div class="dtext">extend via new code, don't edit working code</div></div><div class="dbox green"><div class="dbox-title">L — Liskov Substitution</div><div class="dtext">subtypes honor base contract</div></div><div class="dbox green"><div class="dbox-title">I — Interface Segregation</div><div class="dtext">small focused interfaces</div></div><div class="dbox green"><div class="dbox-title">D — Dependency Inversion</div><div class="dtext">depend on abstractions; inject impls</div></div></div>
<h2 id="design-patterns-recognize">Design patterns (recognize)</h2>
<div class="diagram"><div class="diagram-title">Design patterns</div><div class="dbox blue"><div class="dbox-title">Creational</div><div class="dtext">Factory, Builder, Singleton (sparingly), Prototype</div></div><div class="dbox teal"><div class="dbox-title">Structural</div><div class="dtext">Adapter, Decorator, Composite, Facade, Proxy, Bridge</div></div><div class="dbox purple"><div class="dbox-title">Behavioral</div><div class="dtext">Strategy, Observer, Command, State, Template Method, Visitor</div></div><div class="dbox gray"><div class="dbox-title">Modern alternatives</div><div class="dtext">lambdas/<code>std::function</code> (Strategy/Command/Observer), <code>std::variant</code>+<code>visit</code> (Visitor, closed set), DI (Singleton)</div></div></div>
<h2 id="modern-c-oop">Modern C++ OOP</h2>
<pre><code class="language-cpp">std::unique_ptr&lt;T&gt; p = std::make_unique&lt;T&gt;(...);   // sole owner (DEFAULT)
std::shared_ptr&lt;T&gt; s = std::make_shared&lt;T&gt;(...);   // shared (refcount)
std::weak_ptr&lt;T&gt;   w = s;                           // observer (break cycles)
std::vector&lt;std::unique_ptr&lt;Base&gt;&gt; polys;           // polymorphism, no slicing/leaks

// closed set of types:
using Shape = std::variant&lt;Circle, Square&gt;;
std::visit([](auto&amp; x){ return x.area(); }, shape);

// C++23 deducing this (one getter for all qualifications):
template &lt;class Self&gt; auto&amp;&amp; data(this Self&amp;&amp; self){ return std::forward&lt;Self&gt;(self).data_; }
</code></pre>
<h2 id="ownership-in-signatures">Ownership in signatures</h2>
<pre><code>  unique_ptr&lt;T&gt; by value  -&gt; &quot;I take ownership&quot; (sink) / factory returns it
  shared_ptr&lt;T&gt; by value  -&gt; &quot;I share ownership&quot;
  T* / T&amp;                 -&gt; &quot;I just use it&quot; (non-owning)
  const T&amp;                -&gt; read-only, non-owning
</code></pre>
<h2 id="pitfalls-checklist">Pitfalls checklist</h2>
<div class="diagram"><div class="diagram-title">Pitfalls checklist</div><div class="dbox red"><div class="dbox-title">Check before shipping</div><div class="dtext"><code>[ ]</code> virtual destructor on polymorphic bases (else delete-via-base = UB)</div><div class="dtext"><code>[ ]</code> no object slicing → use ref/ptr/<code>unique_ptr</code>, not base values</div><div class="dtext"><code>[ ]</code> no virtual calls in ctors/dtors</div><div class="dtext"><code>[ ]</code> Rule of Zero, else full Rule of Five (<code>noexcept</code> moves)</div><div class="dtext"><code>[ ]</code> self-assignment safe <code>operator=</code> (copy-and-swap)</div><div class="dtext"><code>[ ]</code> never return refs/ptrs to locals/temporaries</div><div class="dtext"><code>[ ]</code> public inheritance = real is-a (LSP); else compose</div><div class="dtext"><code>[ ]</code> break <code>shared_ptr</code> cycles with <code>weak_ptr</code>; prefer <code>unique_ptr</code></div><div class="dtext"><code>[ ]</code> private data + behavior; single-arg ctors <code>explicit</code></div><div class="dtext"><code>[ ]</code> build with <code>-Wall -Wextra -Wnon-virtual-dtor</code> + sanitizers</div></div></div>
<h2 id="expert-internals-chapters-1723">Expert internals (chapters 17–23)</h2>
<div class="diagram"><div class="diagram-title">Expert internals</div><div class="dbox blue"><div class="dbox-title">Layout</div><div class="dtext">vptr @ offset 0 (Itanium); members in decl order + padding; EBO; <code>[[no_unique_address]]</code> (C++20); tail-pad reuse</div></div><div class="dbox teal"><div class="dbox-title">Vtable</div><div class="dtext"><code>[off-to-top][RTTI][slot0][slot1..]</code>; vptr → slot0. Call = load vptr; load vptr[i]; indirect call</div></div><div class="dbox purple"><div class="dbox-title">Virt dtor</div><div class="dtext">3 variants D2/D1/D0; virtual dtor = 2 slots; <code>delete p</code> → D0 slot → derived dtor then free</div></div><div class="dbox orange"><div class="dbox-title">Multi inh / virtual inh</div><div class="dtext">N vptrs; this-adjusting thunks; vbase offsets; VTT + construction vtables</div></div><div class="dbox gray"><div class="dbox-title">RTTI / mangling / PTM / zero-cost / tools</div><div class="dtext"><code>type_info</code> @ vptr[-1]; <code>dynamic_cast</code> walks base graph; <code>_Z...</code> mangling; PTM = offset / <code>{ptr, adj}</code>; CRTP/<code>variant</code>/type-erasure; <code>clang++ -fdump-record-layouts</code></div></div></div>
<h2 id="golden-rules">Golden rules</h2>
<div class="diagram"><div class="diagram-title">Golden rules</div><div class="dbox green"><div class="dbox-title">Seven rules</div><div class="dtext">1. Encapsulate: private data, public behavior, protect invariants</div><div class="dtext">2. Rule of Zero: let RAII members manage resources</div><div class="dtext">3. Prefer composition over inheritance; inherit for substitutability</div><div class="dtext">4. Virtual destructor + <code>override</code> on every polymorphic class</div><div class="dtext">5. Smart pointers, never raw <code>new</code>/<code>delete</code>; <code>unique_ptr</code> by default</div><div class="dtext">6. Program to interfaces (abstractions), inject dependencies</div><div class="dtext">7. Use the simplest tool: <code>variant</code>/templates/functions may beat a hierarchy</div></div></div>
<hr />

  { name: `19. Internals Object Layout`, path: `17-internals-object-layout.md`, dir: ``, words: 1440, mins: 7, body: `<h1 id="17--internals-object-layout--the-itanium-c-abi">17 — Internals: Object Layout &amp; the Itanium C++ ABI</h1>
<p>Time to go under the hood. This chapter explains <strong>exactly</strong> how C++ lays objects
out in memory — the rules the compiler follows, the <strong>Itanium C++ ABI</strong> (used by
GCC/Clang on Linux/macOS; MSVC differs in details but the concepts transfer), and
the optimizations experts exploit: <strong>standard-layout</strong>, <strong>empty base
optimization (EBO)</strong>, <code>[[no_unique_address]]</code>, and <strong>tail-padding reuse</strong>.</p>
<p>Prereq: <a href="01-classes-and-objects.md">01-classes-and-objects.md</a>, <a href="05-inheritance.md">05-inheritance.md</a>.</p>
<blockquote>
<p>Most of this is <em>implementation-defined</em> by the language but <em>nailed down</em> by
the platform ABI. That&rsquo;s why two compilers targeting the same ABI produce
layout-compatible objects — it&rsquo;s a contract, not a language guarantee.</p>
</blockquote>
<hr />
<h2 id="1-the-three-layout-categories">1. The three layout categories</h2>
<p>The standard classifies class types by how constrained their layout is:</p>
<div class="diagram"><div class="diagram-title">Class layout categories</div><div class="dbox blue"><div class="dbox-title">Trivial</div><div class="dtext">trivial ctors/dtor/copy; memcpy-able; no user-provided special members</div></div><div class="dbox green"><div class="dbox-title">Standard-layout</div><div class="dtext">C-compatible layout; one access control; no virtuals; no mixed-access data</div></div><div class="dbox orange"><div class="dbox-title">POD (Plain Old Data)</div><div class="dtext">trivial <b>AND</b> standard-layout (the old C-struct-like guarantee)</div></div></div>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
struct A { int x; double y; };            // trivial + standard-layout (POD-ish)
struct B { private: int a; public: int b; };  // NOT standard-layout (mixed access)
struct C { virtual ~C(); };               // NOT standard-layout (has vtable)

static_assert(std::is_standard_layout_v&lt;A&gt;);
static_assert(std::is_trivial_v&lt;A&gt;);
static_assert(!std::is_standard_layout_v&lt;B&gt;);
static_assert(!std::is_standard_layout_v&lt;C&gt;);
</code></pre>
<p>Why you care: only <strong>standard-layout</strong> types give you <code>offsetof</code>, guaranteed
&ldquo;first member at offset 0&rdquo;, and safe interop with C / <code>memcpy</code> / serialization.</p>
<hr />
<h2 id="2-alignment-size-and-padding-the-exact-rules">2. Alignment, size, and padding (the exact rules)</h2>
<p>Every type has a <strong>size</strong> (<code>sizeof</code>) and an <strong>alignment</strong> (<code>alignof</code>). The
compiler places each member at an offset that is a multiple of its alignment,
inserting <strong>padding</strong> as needed, and rounds the total size up to a multiple of
the class&rsquo;s alignment (so arrays stay aligned).</p>
<pre><code class="language-cpp">struct S {
    char  c;      // alignof 1
    double d;     // alignof 8
    int   i;      // alignof 4
};
</code></pre>
<pre><code>   Alignment of S = max(alignof members) = 8. Offsets computed left-to-right:

   offset 0        1 .. 7            8 ............ 15   16 .. 19   20 .. 23
          +--------+-----------------+------------------+----------+----------+
          |  c(1)  | padding (7)     |     d (8)        |  i (4)   | pad (4)  |
          +--------+-----------------+------------------+----------+----------+
   * c at 0. d needs offset %8 -&gt; jump to 8 (7 bytes pad).
   * i at 16. size so far 20, but alignof(S)=8 -&gt; round up to 24 (4 tail pad).
   sizeof(S) == 24, alignof(S) == 8.
</code></pre>
<pre><code>   REORDER members largest-alignment-first to shrink padding:
     struct S2 { double d; int i; char c; };  // 8 + 4 + 1 + 3pad = 16 (not 24!)
   Data members are laid out in DECLARATION order (the ABI forbids reordering),
   so the ORDER YOU WRITE is the order in memory. This is a real tuning knob.
</code></pre>
<p>Runnable: <a href="examples/ch17_ebo.cpp"><code>examples/ch17_ebo.cpp</code></a> prints these sizes.</p>
<hr />
<h2 id="3-where-the-vptr-goes-itanium-abi">3. Where the vptr goes (Itanium ABI)</h2>
<p>For a polymorphic class, the Itanium ABI places the <strong>vptr at offset 0</strong> (before
the data members). This is why a <code>Derived*</code> → <code>Base*</code> upcast to the <em>primary</em>
base needs <strong>no pointer adjustment</strong> (the vptr and primary-base subobject share
offset 0).</p>
<pre><code>   struct Poly { int x; virtual void f(); };   // 64-bit

   offset 0 ................ 7   8 .. 11   12 .. 15
          +--------------------+----------+----------+
          |  vptr (8 bytes)    |  x (4)   | pad (4)  |
          +--------------------+----------+----------+
   sizeof(Poly) == 16, alignof == 8. The vptr is an INVISIBLE first member.
</code></pre>
<pre><code>   Consequence: a &quot;just add a virtual function&quot; change grows every object by one
   pointer AND makes it non-standard-layout (offsetof no longer valid, not
   memcpy-safe). Don't add virtuals to a type you memcpy or share with C.
</code></pre>
<hr />
<h2 id="4-empty-base-optimization-ebo">4. Empty Base Optimization (EBO)</h2>
<p>An object must have <code>sizeof &gt;= 1</code> so distinct objects have distinct addresses.
But an <strong>empty base subobject</strong> is allowed to occupy <strong>zero</strong> bytes — the ABI
lets the derived class reuse that space. This is <strong>EBO</strong>, and it&rsquo;s why
<code>std::vector</code>, <code>std::unique_ptr</code>, etc., can carry stateless allocators/deleters
for <em>free</em>.</p>
<pre><code class="language-cpp">struct Empty {};                       // sizeof(Empty) == 1 (as a standalone object)

struct AsMember { Empty e; int x; };   // e still needs an address -&gt; 1 + pad + 4
struct AsBase : Empty { int x; };      // EBO: Empty contributes 0 bytes -&gt; just 4
</code></pre>
<div class="diagram"><div class="diagram-title">Empty Base Optimization</div><div class="dbox red"><div class="dbox-title">As a MEMBER (no EBO)</div><div class="dtext"><code>struct { Empty e; int x; }</code>  -&gt;  <b>sizeof 8</b> (e occupies a byte + pad)</div></div><div class="dbox green"><div class="dbox-title">As a BASE (EBO applies)</div><div class="dtext"><code>struct : Empty { int x; }</code>  -&gt;  <b>sizeof 4</b> (Empty takes 0 bytes)</div></div></div>
<pre><code>   Rule: an empty BASE can overlap the derived object (0 size) as long as it
   doesn't collide with another subobject of the SAME TYPE (which would break
   &quot;distinct objects of the same type have distinct addresses&quot;).
   This is THE reason libraries put stateless policies (Deleter, Compare,
   Allocator) in a BASE (or in a compressed pair), not a member.
</code></pre>
<hr />
<h2 id="5-no_unique_address-c20--ebo-for-members">5. <code>[[no_unique_address]]</code> (C++20) — EBO for members</h2>
<p>C++20 lets you get the EBO benefit <em>without</em> inheritance, by marking a
(potentially empty) member with <code>[[no_unique_address]]</code>. The compiler may then
overlay it with other members.</p>
<pre><code class="language-cpp">struct Empty {};

struct Widget {
    [[no_unique_address]] Empty e;   // may occupy 0 bytes
    int x;
};
static_assert(sizeof(Widget) == sizeof(int));   // e folded away
</code></pre>
<pre><code>   [[no_unique_address]] : &quot;this member need not have a unique address; if it's
   empty, reuse the space.&quot; Modern replacement for the EBO-via-base trick.
   Two [[no_unique_address]] members of the SAME empty type still need distinct
   addresses (so they can't BOTH be zero-sized simultaneously).
</code></pre>
<p>This is how modern standard libraries implement things like <code>std::ranges</code> view
adaptors and stateless comparators with zero overhead.</p>
<hr />
<h2 id="6-tail-padding-reuse-a-surprising-layout-trick">6. Tail-padding reuse (a surprising layout trick)</h2>
<p>The padding at the <em>end</em> of a base subobject can be <strong>reused</strong> to store the
derived class&rsquo;s members — but <em>only</em> for non-standard-layout types. This means a
base subobject inside a derived object can be <em>smaller</em> than the base as a
standalone object.</p>
<pre><code class="language-cpp">struct Base {                  // non-standard-layout (mixed access) so reuse is allowed
    int  i;                    // offset 0..3
    char c;                    // offset 4        -&gt; tail padding 5,6,7
private:
    int secret;                // makes it non-standard-layout
};                             // sizeof(Base) == 12 (with tail padding)

struct Derived : Base {
    char d;                    // may sit in Base's TAIL PADDING (offset 5)!
};
</code></pre>
<pre><code>   Base standalone:   [ i(4) | c(1) | pad(3) | secret? ... ]  sizeof includes pad
   Derived:           [ ...Base part... d ]  &lt;- 'd' tucked into Base's tail pad
   -&gt; sizeof(Derived) can EQUAL sizeof(Base) (no growth), reusing the padding.

   CATCH: this is why memcpy'ing a BASE subobject inside a derived object is
   dangerous — you might clobber the derived member living in the tail padding.
   Standard-layout types do NOT reuse tail padding (safe for offsetof/C interop).
</code></pre>
<p>This is the deep reason the standard says: don&rsquo;t <code>memcpy</code> into a base subobject;
use assignment. It&rsquo;s also why <code>std::is_standard_layout</code> matters for serialization.</p>
<hr />
<h2 id="7-reference--bitfield-layout-notes">7. Reference &amp; bitfield layout notes</h2>
<pre><code>   * References are NOT objects; a T&amp; member is typically stored as a pointer
     (implementation detail) and makes the class non-standard-layout-ish for
     copy purposes (reference members can't be reseated -&gt; no copy assignment).
   * Bitfields pack multiple fields into one storage unit:
       struct Flags { unsigned a:1, b:1, c:6; };  // often 1 byte total
     Bitfield layout (order within the unit, straddling) is largely
     implementation/ABI-defined — don't rely on exact bit positions across
     compilers.
   * alignas(N) raises alignment: 'struct alignas(64) CacheLine {...};' pads to
     64-byte alignment (used to avoid false sharing — see the cpp-atomics guide).
</code></pre>
<hr />
<h2 id="8-inspecting-layout-yourself">8. Inspecting layout yourself</h2>
<pre><code>   sizeof(T)            : total bytes (incl. padding &amp; vptr)
   alignof(T)           : required alignment
   offsetof(T, member)  : byte offset (STANDARD-LAYOUT types only!)
   __builtin_offsetof   : compiler builtin behind offsetof

   Clang/GCC dumps (invaluable for real work):
     clang++ -Xclang -fdump-record-layouts -c foo.cpp   # exact field offsets, vptr
     clang++ -Xclang -fdump-vtable-layouts -c foo.cpp    # vtable contents (ch 18)
     g++ -fdump-lang-class foo.cpp                        # GCC class/vtable dump
</code></pre>
<pre><code>   *** RUN THIS ***  the record-layout dump prints something like:
     0 | struct Poly
     0 |   (Poly vtable pointer)
     8 |   int x
       | [sizeof=16, dsize=12, align=8, nvsize=12, nvalign=8]
   'dsize' = data size (without tail padding) — the value used for tail-padding
   reuse in derived classes. This is the ground truth for layout questions.
</code></pre>
<p>Runnable: <a href="examples/ch17_ebo.cpp"><code>examples/ch17_ebo.cpp</code></a>.</p>
<hr />
<h2 id="9-summary">9. Summary</h2>
<pre><code> +------------------------------------------------------------------+
 | Layout categories: trivial (memcpy-able), standard-layout (C     |
 |   compatible, offsetof-legal), POD = both.                       |
 | Members laid out in DECLARATION order; padding aligns each; size |
 |   rounds up to alignof. Reorder big-&gt;small to cut padding.       |
 | Itanium ABI: vptr at offset 0; adding a virtual grows the object |
 |   by a pointer AND breaks standard-layout.                       |
 | EBO: empty BASE subobjects take 0 bytes (libraries exploit this).|
 | C++20 [[no_unique_address]]: EBO for MEMBERS.                    |
 | Tail-padding reuse: derived members may live in a base's trailing|
 |   padding (non-standard-layout only) -&gt; don't memcpy base parts. |
 | Inspect with sizeof/alignof/offsetof and -fdump-record-layouts.  |
 +------------------------------------------------------------------+
</code></pre>

<p>This is the chapter that makes <code>virtual</code> stop being magic. We&rsquo;ll dissect the
<strong>vtable</strong> structure exactly as the Itanium C++ ABI defines it, watch the
compiler <strong>lower</strong> <code>p-&gt;f()</code> into machine instructions, and cover the linker-level
facts experts must know: the <strong>key function</strong> rule, <strong>vague linkage</strong>, pure
virtuals, and <strong>devirtualization</strong>.</p>
<p>Prereq: <a href="06-polymorphism-vtables.md">06-polymorphism-vtables.md</a>, <a href="17-internals-object-layout.md">17-internals-object-layout.md</a>.</p>
<hr />
<h2 id="1-the-exact-shape-of-a-vtable-itanium-abi">1. The exact shape of a vtable (Itanium ABI)</h2>
<p>A vtable is <em>not</em> just an array of function pointers. It&rsquo;s a structure with parts
<em>above and below</em> the address the vptr points at:</p>
<div class="diagram"><div class="diagram-title">Itanium vtable structure</div><div class="dbox gray"><div class="dbox-title">offset-to-top</div><div class="dtext">signed offset from this subobject back to the most-derived object (0 for primary)</div></div><div class="dbox gray"><div class="dbox-title">RTTI pointer</div><div class="dtext"><code>&amp;typeinfo</code> for the class (used by dynamic_cast / typeid)</div></div><div class="dbox blue"><div class="dbox-title">--- vptr points HERE ---</div><div class="dtext">address stored in the object's vptr</div></div><div class="dbox green"><div class="dbox-title">virtual function pointers</div><div class="dtext">slot 0, slot 1, ... in declaration order (this is the "address point")</div></div></div>
<pre><code>   Object:                         Class vtable (shared by all instances):
   +------------------+            [ off-to-top = 0 ]
   | vptr ------------|----------&gt; [ &amp;type_info     ]
   | ...data...       |    +-----&gt; [ &amp;Derived::f0   ]  vptr[0]
   +------------------+    |       [ &amp;Derived::f1   ]  vptr[1]
                          vptr     ...
</code></pre>
<p>The vtable is emitted <strong>once per class</strong> (in static/read-only memory) and shared
by every object of that class. Each object stores only the small <code>vptr</code>.</p>
<hr />
<h2 id="2-how-the-compiler-lays-out-slots">2. How the compiler lays out slots</h2>
<p>Virtual functions get slots in <strong>declaration order</strong>, with the base class&rsquo;s
virtuals first (so a <code>Derived</code> vtable begins with the same slot order as <code>Base</code>,
overwritten by overrides). This positional stability is what makes dispatch a
constant-index array load.</p>
<pre><code class="language-cpp">struct Base    { virtual void a(); virtual void b(); virtual ~Base(); };
struct Derived : Base { void b() override; virtual void c(); };
</code></pre>
<pre><code>   Base vtable slots:        Derived vtable slots:
     [0] &amp;Base::a              [0] &amp;Base::a          (inherited, same slot)
     [1] &amp;Base::b              [1] &amp;Derived::b       (OVERRIDE -&gt; same slot 1!)
     [2] complete dtor (D1)    [2] Derived complete dtor (D1)   (see ch 19)
     [3] deleting dtor (D0)    [3] Derived deleting dtor (D0)
                               [4] &amp;Derived::c       (new virtual appended)

   Key insight: b() keeps slot [1] in BOTH tables. So 'p-&gt;b()' compiles to
   &quot;load vptr; call vptr[1]&quot; regardless of the dynamic type -&gt; the override just
   changes WHAT's in slot 1, not WHERE the call looks.
</code></pre>
<hr />
<h2 id="3-lowering-p-f-to-instructions">3. Lowering <code>p-&gt;f()</code> to instructions</h2>
<p>Here&rsquo;s the whole trick in ~3 instructions. Given <code>Base* p; p-&gt;b();</code> where <code>b</code> is
the 2nd virtual (slot index 1):</p>
<pre><code>   C++:            p-&gt;b();

   Pseudo-asm (x86-64, System V), p in RDI:
     mov   rax, [rdi]          ; rax = p-&gt;vptr        (load the vtable pointer)
     mov   rax, [rax + 8]      ; rax = vptr[1]        (slot 1; 8 = 1 * 8 bytes)
     call  rax                 ; indirect call to the resolved function
   (this pointer 'p' is already in RDI as the hidden first argument)
</code></pre>
<pre><code>   Non-virtual call:  call Base::b       (direct; address known at compile time;
                                          inlinable)
   Virtual call:      load vptr -&gt; load slot -&gt; indirect call
                      (2 dependent loads + an indirect branch; NOT inlinable
                       unless the compiler proves the dynamic type)

   Cost breakdown of a virtual call:
     * 2 dependent memory loads (vptr, then the slot) — cache/latency bound
     * an INDIRECT branch — the CPU's branch predictor must guess the target
       (monomorphic call sites predict well; megamorphic ones stall)
     * blocks inlining -&gt; loses downstream optimizations (often the bigger cost)
</code></pre>
<p>Runnable: <a href="examples/ch18_vtable_dump.cpp"><code>examples/ch18_vtable_dump.cpp</code></a> reads a
live object&rsquo;s vptr and calls through the slots manually (ABI-specific, for
learning).</p>
<hr />
<h2 id="4-when-is-the-vptr-set-during-construction">4. When is the vptr set? (during construction)</h2>
<p>The vptr is <strong>not</strong> set once. The constructor writes the vptr <strong>at each level</strong>
as construction proceeds, so during <code>Base</code>&rsquo;s constructor the object&rsquo;s vptr points
at <code>Base</code>&rsquo;s vtable (this is <em>why</em> virtual calls in a base ctor resolve to <code>Base</code>
— chapter 06 §9, now explained).</p>
<pre><code>   Constructing a Derived:
     1. Base ctor entry   : vptr := &amp;Base::vtable      &lt;-- virtual calls =&gt; Base's
        (Base ctor body runs; a virtual call here hits Base's slot)
     2. Derived ctor entry: vptr := &amp;Derived::vtable   &lt;-- now upgraded
        (Derived ctor body runs; virtual calls hit Derived's slot)
   Destruction reverses it: ~Derived sets vptr to Derived, then ~Base sets it to
   Base — so a virtual call in ~Base sees Base's version. (Chapter 19.)
</code></pre>
<pre><code>   This per-stage vptr rewrite is real code the compiler injects. It's the
   mechanism behind &quot;don't call virtuals in ctors/dtors&quot;: the vptr genuinely
   points at the CURRENTLY-CONSTRUCTED class's table, not the final one.
</code></pre>
<hr />
<h2 id="5-pure-virtual-functions--__cxa_pure_virtual">5. Pure virtual functions &amp; <code>__cxa_pure_virtual</code></h2>
<p>A pure virtual <code>= 0</code> still occupies a slot. The ABI fills it with a pointer to a
handler (<code>__cxa_pure_virtual</code>) that aborts if ever called — which can happen if
you call a virtual during construction of an abstract base before the override
exists.</p>
<pre><code>   Abstract class vtable slot for a pure virtual:
     [i] &amp;__cxa_pure_virtual    ; calling it -&gt; terminate(&quot;pure virtual called&quot;)

   You can trigger it: call a pure virtual indirectly from the base ctor before
   the derived override is installed -&gt; runtime &quot;pure virtual method called&quot;.
</code></pre>
<p>A pure virtual <em>with a body</em> (chapter 07 §5) puts the real function address in
the slot for derived classes to <code>Base::f()</code>-call, but the class stays abstract.</p>
<hr />
<h2 id="6-the-key-function-rule--vague-linkage-linker-level">6. The key function rule &amp; vague linkage (linker-level!)</h2>
<p>A class&rsquo;s vtable and RTTI must be emitted <strong>somewhere</strong>, but a class defined in a
header is seen by many translation units. Two rules prevent duplicate-symbol
errors and bloat:</p>
<pre><code>   KEY FUNCTION (Itanium ABI):
     The vtable is emitted in the ONE object file that defines the class's
     &quot;key function&quot; = the FIRST non-inline, non-pure virtual function.
     -&gt; Put at least one virtual's definition in a .cpp (&quot;anchor&quot;) to emit the
        vtable exactly once.

   If there is NO key function (all virtuals inline/pure), the vtable has
   VAGUE LINKAGE: it's emitted in EVERY TU that needs it, marked COMDAT/weak,
   and the LINKER merges the duplicates into one.
</code></pre>
<div class="diagram"><div class="diagram-title">Where does the vtable live?</div><div class="dbox green"><div class="dbox-title">Has a key function</div><div class="dtext">vtable emitted <b>once</b>, in the TU that defines the first non-inline virtual</div></div><div class="dbox orange"><div class="dbox-title">No key function (all inline/pure)</div><div class="dtext">vtable emitted in <b>every</b> TU as <b>COMDAT/weak</b>; linker deduplicates</div></div></div>
<pre><code>   Practical rule: give a polymorphic class at least one out-of-line virtual
   (often the destructor: 'Widget::~Widget() = default;' in the .cpp). This
   &quot;anchors&quot; the vtable to one object file, avoiding bloat and the classic
   &quot;undefined reference to vtable&quot; error.
</code></pre>
<hr />
<h2 id="7-devirtualization--when-virtual-costs-nothing">7. Devirtualization — when <code>virtual</code> costs nothing</h2>
<p>The compiler removes the indirect call when it can <em>prove</em> the dynamic type:</p>
<pre><code class="language-cpp">struct Base { virtual int f(); };
struct Derived final : Base { int f() override { return 42; } };

Derived d;
d.f();                 // devirtualized: exact type known -&gt; direct call/inline
Base&amp; b = d;
b.f();                 // may devirtualize: 'b' provably refers to a Derived here

void g(Derived&amp; d) { d.f(); }   // 'final' on the class/method -&gt; direct call
</code></pre>
<pre><code>   Devirtualization triggers:
     * the object's exact type is known at the call site (local of known type)
     * 'final' on the class or the overriding method (no further overrides
       possible -&gt; the target is unique)
     * Link-Time Optimization (LTO) / whole-program devirtualization sees the
       full class hierarchy and proves there's a single override
     * profile-guided speculative devirtualization: &quot;if (vptr==X) call X::f()
       directly; else fall back to indirect&quot; for hot monomorphic call sites

   -&gt; Mark leaf classes / final overrides 'final'. It's a real speed knob.
</code></pre>
<hr />
<h2 id="8-sizeof-and-multiple-virtuals-recap-with-numbers">8. <code>sizeof</code> and multiple virtuals (recap with numbers)</h2>
<pre><code class="language-cpp">struct Empty {};                                sizeof == 1
struct OneVirtual { virtual ~OneVirtual(); };   sizeof == 8   (just the vptr)
struct Data { int a, b; virtual void f(); };    sizeof == 16  (vptr + 8 data)
</code></pre>
<pre><code>   Adding a 2nd, 3rd, ... virtual function does NOT grow the object — they all
   share the ONE vptr and just add SLOTS to the (per-class) vtable. The per-
   OBJECT cost of virtual is exactly one pointer, no matter how many virtuals.
</code></pre>
<hr />
<h2 id="9-summary">9. Summary</h2>
<pre><code> +-------------------------------------------------------------------+
 | A vtable = [offset-to-top][RTTI ptr][slot0][slot1]... ; the vptr  |
 |   points at slot0. RTTI at vptr[-1], offset-to-top at vptr[-2].   |
 | Slots are positional (decl order, base first); an override        |
 |   replaces the CONTENTS of a fixed slot -&gt; dispatch is a constant |
 |   index load.                                                     |
 | p-&gt;f() lowers to: load vptr; load vptr[i]; indirect call.         |
 |   Cost = 2 loads + indirect branch + lost inlining.               |
 | vptr is (re)written at EACH ctor/dtor stage -&gt; that's why base    |
 |   ctors see base virtuals.                                        |
 | Pure virtual slot = &amp;__cxa_pure_virtual (aborts if called).       |
 | KEY FUNCTION emits the vtable once; else vague/COMDAT linkage.    |
 |   Missing key fn -&gt; &quot;undefined reference to vtable&quot;.              |
 | 'final' / known type / LTO -&gt; DEVIRTUALIZATION (virtual is free). |
 +-------------------------------------------------------------------+
</code></pre>
<p>Next: <a href="19-internals-virtual-destructors.md">19-internals-virtual-destructors.md</a>.</p>` },

<p>Everyone learns the rule &ldquo;give polymorphic base classes a virtual destructor.&rdquo;
Few know <em>why it works at the machine level</em> — that the compiler emits <strong>up to
three</strong> distinct destructor functions per class, that <code>delete p</code> calls through a
special vtable slot, and exactly what goes wrong without <code>virtual</code>. This chapter
makes it concrete.</p>
<p>Prereq: <a href="18-internals-vtables.md">18-internals-vtables.md</a>.</p>
<hr />
<h2 id="1-the-itanium-abi-emits-three-destructors-d0d1d2">1. The Itanium ABI emits THREE destructors (D0/D1/D2)</h2>
<p>For a class with a destructor, the compiler can generate three variants:</p>
<div class="diagram"><div class="diagram-title">The three destructor variants (Itanium ABI)</div><div class="dbox green"><div class="dbox-title">D2 - base object destructor</div><div class="dtext">destroys members + non-virtual bases only; does NOT touch virtual bases</div></div><div class="dbox blue"><div class="dbox-title">D1 - complete object destructor</div><div class="dtext">D2 + destroys virtual bases; the "normal" destructor for a full object</div></div><div class="dbox red"><div class="dbox-title">D0 - deleting destructor</div><div class="dtext">runs D1, then calls <code>operator delete</code> to free the storage</div></div></div>
<p>Why three? Because &ldquo;destroy this subobject,&rdquo; &ldquo;destroy this whole object,&rdquo; and
&ldquo;destroy AND free this heap object&rdquo; are genuinely different jobs, especially once
virtual bases (chapter 20) are involved.</p>

<h2 id="2-the-vtable-holds-the-destructors">2. The vtable holds the destructor(s)</h2>
<p>When a destructor is <code>virtual</code>, <strong>two</strong> slots are reserved in the vtable: the
<strong>complete-object (D1)</strong> and the <strong>deleting (D0)</strong> destructors, adjacent.</p>
<pre><code>   Widget vtable (virtual dtor present):
     [ offset-to-top ]
     [ RTTI          ]
     [ &amp;Widget::~D1  ]   &lt;- complete object destructor  (vptr[k])
     [ &amp;Widget::~D0  ]   &lt;- deleting destructor          (vptr[k+1])
     [ &amp;Widget::f    ]   ... other virtuals follow
</code></pre>
<pre><code>   So a virtual destructor consumes TWO vtable slots (D1 and D0). A subclass
   provides its OWN D1/D0 in the same slots -&gt; deleting through a base pointer
   finds the DERIVED deleting destructor. That's the whole mechanism.
</code></pre>
<hr />
<h2 id="3-how-delete-p-is-lowered">3. How <code>delete p</code> is lowered</h2>
<p>This is the crux. <code>delete p</code> where <code>p</code> is a pointer to a class with a <strong>virtual</strong>
destructor does NOT call a fixed function — it dispatches through the vtable&rsquo;s
<strong>deleting-destructor (D0)</strong> slot.</p>
<pre><code>   C++:   Base* p = new Derived();  delete p;

   With a VIRTUAL destructor, 'delete p' lowers to roughly:
     mov  rax, [p]            ; load vptr
     mov  rax, [rax + D0off]  ; load the DELETING destructor slot (D0)
     mov  rdi, p              ; this = p
     call rax                 ; -&gt; Derived::~D0 : runs ~Derived (D1) then frees

     ; static type is Base -&gt; call Base's dtor DIRECTLY, no vtable
     call Base::~D0           ; only ~Base runs; frees sizeof(Base) worth
   Result: ~Derived is NEVER called. Derived's members leak; UB by the standard.
</code></pre>
<div class="diagram"><div class="diagram-title">delete p  (p : Base*, points at a Derived)</div><div class="dbox green"><div class="dbox-title">Virtual destructor (correct)</div><div class="dtext"><code>delete p</code> -&gt; vtable <b>D0</b> slot -&gt; Derived deleting dtor -&gt; ~Derived, ~Base, free</div></div><div class="dbox red"><div class="dbox-title">Non-virtual destructor (BUG / UB)</div><div class="dtext"><code>delete p</code> -&gt; <b>static</b> call to Base::~ only -&gt; ~Derived skipped -&gt; leak / UB</div></div></div>
<hr />
<h2 id="4-the-destructor-chain-d1--base-d2">4. The destructor chain (D1 → base D2)</h2>
<p>A complete-object destructor (D1) does its own cleanup, then <strong>calls each base&rsquo;s
base-object destructor (D2)</strong> in reverse order. This is how &ldquo;destroy the whole
hierarchy&rdquo; is assembled from per-class pieces.</p>
<pre><code>   Derived::~D1:
     1. run ~Derived body
     2. destroy Derived's members (reverse declaration order)
     3. call Base::~D2   (base object destructor — NOT D1, to avoid re-destroying
                          virtual bases twice)
   Base::~D2:
     4. run ~Base body
     5. destroy Base's members (reverse order)
   (virtual bases, if any, destroyed by the MOST-DERIVED D1 at the very end)
</code></pre>
<pre><code>   Note the ABI subtlety: D1 chains to the base's D2 (base-object), not D1. Only
   the most-derived object's D1 is responsible for the shared virtual bases, so
   intermediates must NOT re-destroy them. (Ties back to chapter 08 / chapter 20.)
</code></pre>
<p>Runnable: <a href="examples/ch19_dtor_variants.cpp"><code>examples/ch19_dtor_variants.cpp</code></a>
prints the chain order for virtual vs non-virtual bases.</p>
<hr />
<h2 id="5-vptr-during-destruction-mirror-of-construction">5. vptr during destruction (mirror of construction)</h2>
<p>Just as construction upgrades the vptr level by level (chapter 18 §4),

<code>Base</code>&rsquo;s vtable — so a virtual call inside <code>~Base</code> resolves to <code>Base</code>&rsquo;s version,
and the (already-destroyed) <code>Derived</code> override is never reached.</p>
<pre><code>   Destroying a Derived:
     ~Derived body      : vptr = &amp;Derived::vtable   (virtual call -&gt; Derived's)
     [destroy Derived members]
     vptr := &amp;Base::vtable                          &lt;-- DOWNGRADED
     ~Base body         : vptr = &amp;Base::vtable       (virtual call -&gt; Base's)

   This is the machine reason a virtual call in a destructor NEVER dispatches to
   an already-destroyed derived override. Safe, but rarely what people expect -&gt;
   just don't call virtuals in dtors.
</code></pre>
<hr />
<h2 id="6-optimization-when-destructors-are-trivial-or-devirtualized">6. Optimization: when destructors are trivial or devirtualized</h2>
<pre><code>   * TRIVIAL destructor: if a class (and all members/bases) has no custom dtor,
     the destructor is trivial -&gt; the compiler emits NOTHING to run (and such
     types are memcpy-able / can skip destruction entirely, e.g. in containers).

     &lt;Derived*&gt;(p)' or a local Derived), the compiler calls the D0/D1 directly,
     no vtable lookup.
   * A non-polymorphic class needs NO deleting destructor in a vtable at all
     (it has no vtable). The two-slot cost applies only to virtual dtors.
</code></pre>
<hr />
<h2 id="7-the-protected-non-virtual-destructor-alternative">7. The protected-non-virtual-destructor alternative</h2>
<p>If a base is used polymorphically but you <em>never</em> <code>delete</code> through it (e.g. it&rsquo;s

avoiding the vtable slots while staying safe.</p>
<pre><code class="language-cpp">class Interface {
public:
    virtual void f() = 0;
protected:
    ~Interface() = default;   // protected + non-virtual: can't 'delete Interface*'
};
</code></pre>
<pre><code>   * protected dtor -&gt; external code cannot 'delete p' (compile error) -&gt; no
     accidental slicing-of-destruction bug.
   * non-virtual -&gt; no D0/D1 vtable slots, marginally smaller vtable.
   Use when the base is a pure interface managed by the owner, never deleted
   polymorphically. (Guideline C.35 in the C++ Core Guidelines.)
</code></pre>
<hr />
<h2 id="8-summary">8. Summary</h2>
<pre><code> +------------------------------------------------------------------+
 | The ABI emits up to 3 destructors per class:                     |
 |   D2 base-object (subobject cleanup),                            |
 |   D1 complete-object (D2 + virtual bases),                       |
 |   D0 deleting (D1 + operator delete).                            |
 | A VIRTUAL dtor occupies TWO vtable slots (D1 &amp; D0).              |
 | 'delete p' with a virtual dtor dispatches through the D0 slot -&gt; |
 |   runs the DERIVED dtor then frees. Without virtual, it calls    |

 | vptr is downgraded per level during destruction (mirror of ctor).|
 | Trivial dtors emit nothing; known types devirtualize delete.     |
 | Alternative: protected non-virtual dtor forbids delete-via-base. |
 +------------------------------------------------------------------+
</code></pre>
