<h2 id="1-where-rtti-lives-vptr-1">1. Where RTTI lives: <code>vptr[-1]</code></h2>
<p>Recall the vtable layout (chapter 18): just <em>above</em> the function slots sits the
<strong>RTTI pointer</strong> — a pointer to the class&rsquo;s <code>std::type_info</code>. That single pointer
is the entry point to all run-time type queries.</p>
<pre><code>   Object -&gt; vptr -&gt; vtable:
       [ offset-to-top ]
       [ RTTI ptr ] ---------&gt; std::type_info for the dynamic class
       [ &amp;f0 ] &lt;- vptr
       ...
   typeid(*p) and dynamic_cast both start by reading vptr[-1] (the RTTI ptr).
   =&gt; RTTI works ONLY on POLYMORPHIC types (types with a vtable). typeid on a
      non-polymorphic expression is resolved at COMPILE time (static type).
</code></pre>
<hr />
<h2 id="2-the-type_info-and-abi-class-info-structures">2. The <code>type_info</code> and ABI class-info structures</h2>
<p><code>std::type_info</code> is the public face; underneath, the Itanium ABI defines a small
hierarchy of type-info classes that encode the inheritance graph so
<code>dynamic_cast</code> can walk it.</p>

<h2 id="4-the-dynamic_cast-algorithm">4. The <code>dynamic_cast</code> algorithm</h2>

<code>__dynamic_cast(src_ptr, src_type_info, dst_type_info, src2dst_offset)</code>. Here&rsquo;s
what it actually does:</p>
<pre><code>   __dynamic_cast steps (conceptually):
     1. If src is null -&gt; return null.
     2. Read the object's dynamic type via src's vptr[-1] (RTTI).
        Use offset-to-top (vptr[-2]) to find the MOST-DERIVED object address.
     3. Walk the dynamic type's RTTI base graph (__vmi/__si_class_type_info),
        computing offsets (including virtual-base offsets), searching for a
        subobject whose type_info == dst_type_info reachable via PUBLIC bases.
     4. If a unique, unambiguous public path is found -&gt; return the adjusted
        pointer (most-derived-addr + computed offset).
     5. Otherwise -&gt; return null (for pointers) or throw std::bad_cast (refs).
</code></pre>
<div class="diagram"><div class="diagram-title">dynamic_cast&lt;Dst*&gt;(src)</div><div class="dbox blue"><div class="dbox-title">1. read dynamic type</div><div class="dtext"><code>src-&gt;vptr[-1]</code> (type_info) + <code>vptr[-2]</code> (offset-to-top) -&gt; most-derived object</div></div><div class="dbox green"><div class="dbox-title">2. search the base graph</div><div class="dtext">walk RTTI bases for a <b>public</b>, unambiguous subobject of type Dst</div></div><div class="dbox orange"><div class="dbox-title">3a. found</div><div class="dtext">return most-derived addr + computed (possibly virtual) offset</div></div><div class="dbox red"><div class="dbox-title">3b. not found / ambiguous</div><div class="dtext">pointer -&gt; <b>nullptr</b>;  reference -&gt; throw <b>std::bad_cast</b></div></div></div>
<pre><code class="language-cpp">struct A { virtual ~A(); };
struct B { virtual ~B(); };
struct D : A, B {};

A* a = new D();
B* b = dynamic_cast&lt;B*&gt;(a);   // CROSS-CAST A-&gt;B via the shared D. Works!
                              // static_cast&lt;B*&gt;(a) would be ill-formed (unrelated).
void* top = dynamic_cast&lt;void*&gt;(a);   // address of the whole D
</code></pre>
<hr />
<h2 id="5-cost-and-when-to-avoid-it">5. Cost and when to avoid it</h2>
<pre><code>   dynamic_cast cost:
     * a call to __dynamic_cast (not inlined) that WALKS the RTTI graph.
     * cost grows with hierarchy depth/width; far pricier than a virtual call.
     * downcast to a leaf is cheaper than a general cross-cast.

   Prefer, in order:
     1. A VIRTUAL FUNCTION (let the object tell you what to do) — no cast at all.
     2. A visitor / std::variant (closed set) — compile-time dispatch.
     3. dynamic_cast only when you genuinely must recover a specific derived type
        from a base reference you don't control (e.g. plugin boundaries).
   Frequent dynamic_cast in hot code is a design smell (often a missing virtual).
</code></pre>
<hr />
<h2 id="6-disabling-rtti--fno-rtti-and-its-consequences">6. Disabling RTTI (<code>-fno-rtti</code>) and its consequences</h2>
<pre><code>   Compiling with -fno-rtti:
     * removes type_info emission -&gt; smaller binaries.
     * DISABLES dynamic_cast (to polymorphic types) and typeid on polymorphic
       lvalues -&gt; compile error / UB if used.
     * common in embedded / game engines / LLVM itself (which uses its own
       lightweight RTTI: llvm::isa&lt;&gt;/dyn_cast&lt;&gt; built on a manual 'classof' tag).

   If you find yourself wanting -fno-rtti but still needing type queries, that's
   the sign to build a lightweight tagged hierarchy (an enum 'kind' + isa&lt;&gt;)
   instead of relying on the language's RTTI.
</code></pre>
<hr />
<h2 id="7-stdtype_index--using-types-as-map-keys">7. <code>std::type_index</code> — using types as map keys</h2>
<pre><code class="language-cpp">#include &lt;typeindex&gt;
#include &lt;unordered_map&gt;

std::unordered_map&lt;std::type_index, std::string&gt; names;
names[std::type_index(typeid(int))]    = &quot;int&quot;;
names[std::type_index(typeid(double))] = &quot;double&quot;;
// type_index wraps type_info with copyability + hashing so it works as a key.
</code></pre>
<pre><code>   This is the backbone of type-erased registries, serializers, and
   &quot;component maps&quot; (ECS): map from a runtime type to a handler/factory.
</code></pre>
<hr />
<h2 id="8-summary">8. Summary</h2>
<pre><code> +-------------------------------------------------------------------+
 | RTTI ptr lives at vptr[-1]; works ONLY on polymorphic types.      |
 |   typeid on non-polymorphic / a type = compile-time (static).     |
 | The ABI encodes the class graph in type_info subclasses           |
 |   (__class_/__si_class_/__vmi_class_type_info) so the runtime can |
 |   traverse bases + offsets.                                       |
 | dynamic_cast -&gt; __dynamic_cast: find most-derived (offset-to-top),|
 |   walk PUBLIC base graph for the target subobject; adjust pointer.|
 |   Supports downcasts AND cross-casts; &lt;void*&gt; yields most-derived.|
 |   Fail: nullptr (ptr) / std::bad_cast (ref).                      |
 | Cost: a graph walk, not inlined -&gt; prefer virtuals/variant.       |
 | -fno-rtti removes it (engines roll their own isa&lt;&gt;/dyn_cast).     |
 | type_index -&gt; types as hash-map keys (type-erased registries).    |
 +-------------------------------------------------------------------+
</code></pre>

<p>Two more expert-level pieces of machinery: <strong>name mangling</strong> (how the linker
tells <code>foo(int)</code> from <code>foo(double)</code> and <code>A::f</code> from <code>B::f</code>) and
<strong>pointers-to-members</strong> (a genuinely weird type whose representation encodes
vtable indices and <code>this</code>-adjustments). Both are things senior engineers
routinely read in linker errors, <code>nm</code> output, and disassembly.</p>
<p>Prereq: <a href="18-internals-vtables.md">18-internals-vtables.md</a>, <a href="20-internals-multiple-inheritance.md">20-internals-multiple-inheritance.md</a>.</p>
<hr />
<h2 id="1-why-name-mangling-exists">1. Why name mangling exists</h2>
<p>C++ has function overloading, namespaces, classes, and templates — but the linker
only understands flat symbol names. <strong>Name mangling</strong> encodes the full signature
(scope, name, parameter types, cv-qualifiers) into a unique linker symbol.</p>
<pre><code>   C++ source                         Mangled symbol (Itanium ABI)
   --------------------------------   ---------------------------------
   void foo(int)                      _Z3fooi
   void foo(double)                   _Z3food
   void foo(int, char*)               _Z3fooiPc
   namespace n { void foo(int); }     _ZN1n3fooEi
   struct A { void f() const; };      _ZNK1A1fEv     (K = const this)
   A::A(int)                          _ZN1AC1Ei      (C1 = complete ctor)
   A::~A()                            _ZN1AD1Ev      (D1 = complete dtor, ch 19)
   template T max&lt;int&gt;(T,T)           _Z3maxIiET_S0_S0_
</code></pre>
<div class="diagram"><div class="diagram-title">Anatomy of _ZNK1A3fooEi</div><div class="dbox blue"><div class="dbox-title">_Z</div><div class="dtext">prefix marking a mangled C++ name</div></div><div class="dbox green"><div class="dbox-title">N ... E</div><div class="dtext">a NESTED name (qualified); the block between N and E is the scope+name</div></div><div class="dbox orange"><div class="dbox-title">K</div><div class="dtext">the implicit <code>this</code> is <b>const</b> (cv-qualifier on the member)</div></div><div class="dbox teal"><div class="dbox-title">1A 3foo</div><div class="dtext">length-prefixed identifiers: <code>A</code> (len 1), <code>foo</code> (len 3)</div></div><div class="dbox gray"><div class="dbox-title">i</div><div class="dtext">parameter list: one <code>int</code></div></div></div>
<pre><code>   extern &quot;C&quot; DISABLES mangling: the symbol is the bare name (so C can link it),
   which is why extern &quot;C&quot; functions can't be overloaded. This is how C++
   interoperates with C and stable ABIs (dlsym, plugin entry points).
</code></pre>
<hr />
<h2 id="2-reading-mangled-names-in-practice">2. Reading mangled names in practice</h2>
<pre><code>   Demangle on the command line:
     echo _ZNK1A3fooEi | c++filt         -&gt;  A::foo(int) const
     nm -C libfoo.a                       -&gt;  list symbols, demangled (-C)
     nm libfoo.a | c++filt                -&gt;  same, manual demangle

   Demangle at runtime:
     #include &lt;cxxabi.h&gt;
     int status;
     char* dm = abi::__cxa_demangle(typeid(x).name(), nullptr, nullptr, &amp;status);
     // use dm ...; free(dm);
</code></pre>
<pre><code>   WHY YOU CARE (real scenarios):
     * &quot;undefined reference to \`A::foo(int)'&quot; -&gt; c++filt the mangled name in the
       error to find the exact overload/signature the linker wanted.
     * ABI breaks: change a parameter type / add const -&gt; the mangled name
       changes -&gt; old callers fail to link (this is how C++ detects ABI mismatch).
     * Reading disassembly / profilers: symbols appear mangled; c++filt them.
</code></pre>
<p>Runnable: <a href="examples/ch22_ptmf.cpp"><code>examples/ch22_ptmf.cpp</code></a> also prints demangled
type names.</p>
<hr />
<h2 id="3-pointers-to-data-members">3. Pointers to data members</h2>
<p>A pointer-to-data-member is essentially an <strong>offset</strong> into an object — not an
address. You combine it with a specific object to get a real member.</p>
<pre><code class="language-cpp">struct Point { int x; int y; };

int Point::*px = &amp;Point::x;   // &quot;pointer to member x&quot;: really the offset of x (0)
int Point::*py = &amp;Point::y;   //  offset of y (4)

Point p{10, 20};
p.*px;                        // 10  (apply the offset to object p)
Point* pp = &amp;p;
pp-&gt;*py;                      // 20  (arrow form)
</code></pre>
<pre><code>   int Point::*  is NOT a normal pointer. Its VALUE is an offset:
     px  ==  offset_of(Point, x)  ==  0
     py  ==  offset_of(Point, y)  ==  4
   p.*px  means  *(int*)((char*)&amp;p + offset)   -&gt; reaches p.x
   A null member pointer is represented specially (often offset -1), not 0,
   because offset 0 is a valid first member.
</code></pre>
<hr />
<h2 id="4-pointers-to-member-functions-the-weird-one">4. Pointers to member FUNCTIONS (the weird one)</h2>
<p>A pointer-to-member-function must work for both <strong>non-virtual</strong> and <strong>virtual</strong>
functions, and must carry the <code>this</code>-adjustment needed under multiple
inheritance. The Itanium ABI represents it as a <strong>two-word struct</strong>: <code>{ ptr,
adj }</code>.</p>
<div class="diagram"><div class="diagram-title">Pointer-to-member-function representation (Itanium)</div><div class="dbox blue"><div class="dbox-title">field 1: ptr</div><div class="dtext">if <b>even</b> -&gt; a normal function address (non-virtual); if <b>odd</b> -&gt; <code>1 + vtable byte-offset</code> (virtual)</div></div><div class="dbox green"><div class="dbox-title">field 2: adj</div><div class="dtext">the <code>this</code>-pointer adjustment (bytes to add to <code>this</code> before the call — for MI)</div></div></div>
<pre><code>   Consequences experts know:
     * sizeof(pointer-to-member-function) is often 16 bytes (two words), NOT 8.
       It is NOT a plain code pointer — don't reinterpret_cast it to void*.
     * A member-function pointer can transparently refer to a VIRTUAL function;
       calling through it still dispatches correctly (the LSB/vtable trick).
     * The 'adj' field is why member pointers survive multiple inheritance:
       the correct 'this' offset is baked into the pointer value.
     * std::function / std::mem_fn wrap all this so you rarely touch it raw.
   (MSVC uses a DIFFERENT, variable-size representation depending on the
    inheritance model — another reason member-fn pointers aren't portable bits.)
</code></pre>
<pre><code class="language-cpp">struct Base { virtual int f(); int g(); };
int (Base::*pf)() = &amp;Base::f;    // virtual   -&gt; {ptr = 1+vtbl_offset, adj = 0}
int (Base::*pg)() = &amp;Base::g;    // non-virt  -&gt; {ptr = &amp;Base::g,      adj = 0}
Base b;
(b.*pf)();   // dispatches virtually through b's vtable
(b.*pg)();   // direct call
</code></pre>
<p>Runnable: <a href="examples/ch22_ptmf.cpp"><code>examples/ch22_ptmf.cpp</code></a>.</p>
<hr />
<h2 id="5-linkage--the-odr-at-the-symbol-level">5. Linkage &amp; the ODR at the symbol level</h2>
<p>Tying chapters together — mangling is what makes the <strong>One Definition Rule</strong> and
<strong>vague linkage</strong> (chapter 18 §6) enforceable at link time:</p>
<pre><code>   * Each entity gets a mangled symbol. The linker requires exactly ONE
     definition of each strong symbol (ODR) -&gt; &quot;multiple definition&quot; errors.
   * inline functions, templates, and vtables use VAGUE LINKAGE: emitted as
     WEAK/COMDAT symbols in every TU that needs them; the linker keeps one and
     discards the rest (so header-defined inline/template code doesn't collide).
   * 'static' / anonymous-namespace entities get INTERNAL linkage -&gt; not mangled
     into external symbols; invisible across TUs (good for TU-private helpers).
   * Templates are instantiated (and mangled with their args, e.g. _Z3maxIiE...)
     on demand; identical instantiations across TUs merge via COMDAT.
</code></pre>
<div class="diagram"><div class="diagram-title">Linkage kinds and the linker</div><div class="dbox green"><div class="dbox-title">External + strong (normal functions)</div><div class="dtext">exactly ONE definition allowed (ODR); duplicate -&gt; "multiple definition"</div></div><div class="dbox orange"><div class="dbox-title">Vague / weak / COMDAT (inline, templates, vtables)</div><div class="dtext">may appear in many TUs; linker keeps one, drops the rest</div></div><div class="dbox gray"><div class="dbox-title">Internal (static / anonymous namespace)</div><div class="dtext">private to its TU; never collides across TUs</div></div></div>
<hr />
<h2 id="6-summary">6. Summary</h2>
<pre><code> +-------------------------------------------------------------------+
 | NAME MANGLING encodes scope+name+param types+cv into a unique     |
 |   linker symbol (Itanium: _Z..., N..E nested, K const, builtins   |
 |   as letters). Demangle with c++filt / nm -C / __cxa_demangle.    |
 |   Enables overloading &amp; ABI checks; extern &quot;C&quot; turns it off.      |
 | POINTER-TO-DATA-MEMBER = an OFFSET (combine with an object).      |
 | POINTER-TO-MEMBER-FUNCTION = a 2-word struct {ptr, adj}: LSB of   |
 |   ptr flags virtual (vtable offset) vs direct; adj fixes 'this'   |
 |   for MI. Often 16 bytes; NOT a plain code pointer.               |
 | Linkage: strong/external (ODR, one def), vague/COMDAT (inline,    |
 |   templates, vtables — deduped), internal (static/anon ns).       |
 +-------------------------------------------------------------------+
</code></pre>
<p>Next: <a href="23-zero-overhead-and-idioms.md">23-zero-overhead-and-idioms.md</a>.</p>` },

<p>The final internals chapter zooms back out. Now that you know <em>how</em> the machinery
works, this chapter is about <strong>using it like an expert</strong>: the &ldquo;zero-overhead
principle,&rdquo; the real cost model of exceptions/RAII, and the idioms that give you
polymorphism <em>without</em> the vtable — <strong>CRTP</strong>, <strong>type erasure</strong>, <strong>SSO</strong>, <strong>tag
dispatch</strong>, and knowing when abstraction is genuinely free.</p>
<p>Prereqs: chapters 14, 17–22.</p>
<hr />
<h2 id="1-the-zero-overhead-principle-stroustrups-law">1. The zero-overhead principle (Stroustrup&rsquo;s law)</h2>
<blockquote>
<p>&ldquo;What you don&rsquo;t use, you don&rsquo;t pay for. And what you do use, you couldn&rsquo;t hand-
code any better.&rdquo;</p>
</blockquote>
<pre><code>   * A class with no virtuals has NO vptr and NO vtable — same layout/cost as a C
     struct (chapter 17).
   * A non-virtual member call is a plain direct call — identical to a free
     function taking the object as the first arg.
   * RAII destructors that are trivial emit no code.
   * Templates monomorphize -&gt; a std::sort&lt;int&gt; is as fast as a hand-written int
     sort; no runtime dispatch (see the cpp-templates guide).

   The COST you pay for OOP is exactly the feature you asked for:
     virtual  -&gt; vptr + indirect call     (chapter 18)
     RTTI     -&gt; type_info + dynamic_cast  (chapter 21)
     exceptions -&gt; unwinding tables (but zero cost on the happy path — §2)
</code></pre>
<hr />
<h2 id="2-exceptions-stack-unwinding--raii--the-real-cost-model">2. Exceptions, stack unwinding &amp; RAII — the real cost model</h2>
<p>RAII (chapter 02) relies on destructors running during <strong>stack unwinding</strong> when
an exception propagates. Modern ABIs implement this with the <strong>&ldquo;zero-cost&rdquo;
(table-driven)</strong> model.</p>
<div class="diagram"><div class="diagram-title">Zero-cost exception model</div><div class="dbox green"><div class="dbox-title">Happy path (no throw)</div><div class="dtext"><b>no extra instructions</b> — no setup, no checks; normal code speed</div></div><div class="dbox red"><div class="dbox-title">Throw path (rare)</div><div class="dtext">the runtime consults side tables to find handlers &amp; run destructors (slow, but rare)</div></div></div>
<pre><code>   noexcept — a correctness AND performance tool:
     * Promises a function won't throw -&gt; the compiler can OMIT unwinding setup
       around calls to it and enables optimizations (e.g. vector move, ch 04).
     * If a noexcept function DOES throw -&gt; std::terminate (no unwinding).
     * Move ctors/dtors should be noexcept so containers move instead of copy.

   Destructors are IMPLICITLY noexcept. Throwing from a destructor during
   unwinding -&gt; std::terminate. Never let a destructor throw.
</code></pre>
<p>Runnable (RAII during unwinding): <a href="examples/ch02_raii.cpp"><code>examples/ch02_raii.cpp</code></a>.</p>
<hr />
<h2 id="3-crtp--static-polymorphism-virtual-dispatch-zero-runtime-cost">3. CRTP — static polymorphism (virtual dispatch, zero runtime cost)</h2>
<p>The <strong>Curiously Recurring Template Pattern</strong>: a base templated on its derived
type. It gives you the &ldquo;call derived behavior from base code&rdquo; superpower —
resolved entirely at <strong>compile time</strong>, so no vptr, no indirect call, fully
inlinable. (Deep-dive lives in the <code>cpp-templates</code> guide; here&rsquo;s the OOP framing.)</p>
<pre><code class="language-cpp">template &lt;class Derived&gt;
struct Shape {                         // CRTP base
    double area() const {
        return static_cast&lt;const Derived*&gt;(this)-&gt;area_impl();  // static dispatch
    }
    void describe() const {
        std::cout &lt;&lt; &quot;area = &quot; &lt;&lt; area() &lt;&lt; '\\n';   // base code calls derived impl
    }
};

struct Circle : Shape&lt;Circle&gt; {        // note: inherits Shape&lt;Circle&gt;
    double r;
    explicit Circle(double r) : r(r) {}
    double area_impl() const { return 3.14159265 * r * r; }
};
</code></pre>
<div class="diagram"><div class="diagram-title">Runtime polymorphism vs CRTP (static)</div><div class="dbox blue"><div class="dbox-title">virtual (runtime)</div><div class="dtext">vptr per object; indirect call; OPEN set; heterogeneous containers OK</div></div><div class="dbox green"><div class="dbox-title">CRTP (compile-time)</div><div class="dtext"><b>no vptr</b>, direct inlinable call; closed/known type; no base-pointer container</div></div></div>
<pre><code>   Use CRTP when: you want interface reuse / policy injection with ZERO runtime
   cost and you DON'T need a heterogeneous runtime collection. Common for
   mixins, static interfaces, and expression templates.
   NOTE: C++23 &quot;deducing this&quot; (chapter 14) replaces many CRTP uses more cleanly.
</code></pre>
<p>Runnable: <a href="examples/ch23_crtp.cpp"><code>examples/ch23_crtp.cpp</code></a>.</p>
<hr />
<h2 id="4-type-erasure--runtime-polymorphism-without-inheritance">4. Type erasure — runtime polymorphism WITHOUT inheritance</h2>
<p>Type erasure gives you a <em>value</em> that can hold <strong>any</strong> type satisfying an
interface, with virtual dispatch under the hood but <strong>no base class required</strong> by
the stored types (non-intrusive). <code>std::function</code>, <code>std::any</code>, and
<code>std::shared_ptr</code>&rsquo;s deleter all use it.</p>
<pre><code class="language-cpp">class Drawable {                       // a type-erasing wrapper (value semantics)
    struct Concept {                   // internal interface (the &quot;erased&quot; API)
        virtual void draw() const = 0;
        virtual std::unique_ptr&lt;Concept&gt; clone() const = 0;
        virtual ~Concept() = default;
    };
    template &lt;class T&gt;
    struct Model : Concept {           // adapts ANY T with a draw() free/method
        T obj;
        explicit Model(T o) : obj(std::move(o)) {}
        void draw() const override { obj.draw(); }                 // duck-typed
        std::unique_ptr&lt;Concept&gt; clone() const override {
            return std::make_unique&lt;Model&gt;(*this);
        }
    };
    std::unique_ptr&lt;Concept&gt; self_;    // the hidden vtable lives here
public:
    template &lt;class T&gt;
    Drawable(T obj) : self_(std::make_unique&lt;Model&lt;T&gt;&gt;(std::move(obj))) {}
    Drawable(const Drawable&amp; o) : self_(o.self_-&gt;clone()) {}       // value copy
    void draw() const { self_-&gt;draw(); }
};

struct Button { void draw() const { /*...*/ } };   // NO base class needed!
struct Icon   { void draw() const { /*...*/ } };

std::vector&lt;Drawable&gt; ui{ Button{}, Icon{} };      // heterogeneous, value-based
</code></pre>
<div class="diagram"><div class="diagram-title">Type erasure (the Concept/Model sandwich)</div><div class="dbox blue"><div class="dbox-title">Drawable (public value type)</div><div class="dtext">copyable value with <code>.draw()</code>; users store it in containers by value</div><div class="dbox orange"><div class="dbox-title">Concept (private abstract interface)</div><div class="dtext">the erased virtual API: <code>draw()</code>, <code>clone()</code>, virtual dtor</div><div class="dbox green"><div class="dbox-title">Model&lt;T&gt; (private template)</div><div class="dtext">wraps a concrete T and forwards <code>draw()</code> to it — the ONLY place T is known</div></div></div></div></div>
<hr />
<h2 id="5-small-object--small-buffer-optimization-ssosbo">5. Small-object / Small-buffer optimization (SSO/SBO)</h2>
<p>Experts know that <code>std::string</code> (and often <code>std::function</code>) avoids heap
allocation for small values by storing them <strong>inline</strong> in the object itself.</p>
<pre><code>   std::string layout (typical libstdc++/libc++, ~24-32 bytes):
     small string (&quot;hi&quot;):   [ len | 'h''i''\\0'... stored INLINE | cap ]  no heap!
     large string:          [ ptr -&gt; heap buffer | len | cap ]           heap

   The object reserves a small inline buffer; if the value fits, it lives there
   (no malloc). This is why copying short strings is nearly free and cache-
   friendly. std::function does the same for small callables (SBO).
</code></pre>
<pre><code>   Design lesson: for your own wrappers/handles, consider a small-buffer
   optimization when values are usually tiny -&gt; dodge the allocator on the hot
   path. (This is a big reason std::string beats naive char* management.)
</code></pre>
<hr />
<h2 id="6-tag-dispatch--if-constexpr--compile-time-branching">6. Tag dispatch &amp; <code>if constexpr</code> — compile-time branching</h2>
<p>Selecting behavior at compile time (no runtime branch, no virtual) via
overloading on tag types — the classic pre-concepts technique still worth knowing:</p>
<pre><code class="language-cpp">// pick an algorithm based on the iterator category, at COMPILE time:
template &lt;class It&gt;
void advance_impl(It&amp; it, int n, std::random_access_iterator_tag) { it += n; }
template &lt;class It&gt;
void advance_impl(It&amp; it, int n, std::input_iterator_tag) { while (n--) ++it; }

template &lt;class It&gt;
void my_advance(It&amp; it, int n) {
    advance_impl(it, n, typename std::iterator_traits&lt;It&gt;::iterator_category{});
}
</code></pre>
<pre><code>   Tag dispatch: overload resolution picks the right impl from a TAG type — zero
   runtime cost, chosen by the type system. Modern C++ often replaces it with
   'if constexpr' or concepts (see cpp-templates guide), but you'll see tag
   dispatch throughout the STL internals.
</code></pre>
<hr />
<h2 id="7-choosing-your-polymorphism-the-expert-decision-table">7. Choosing your polymorphism (the expert decision table)</h2>
<pre><code>   +--------------------+-----------+----------+-----------+------------------+
   | Technique          | dispatch  | per-obj  | container | when             |
   |                    | cost      | overhead | of mixed  |                  |
   |--------------------+-----------+----------+-----------+------------------|
   | virtual functions  | indirect  | 1 vptr   | yes       | OPEN set, need   |
   |                    | call      |          | (via ptr) | runtime extension|
   | CRTP               | none      | none     | no        | static reuse,    |
   |                    | (inlined) |          |           | zero overhead    |
   | std::variant+visit | ~switch   | tag byte | yes       | CLOSED set, value|
   |                    |           |          | (value)   | semantics        |
   | type erasure       | indirect  | ptr+heap | yes       | non-intrusive,   |
   |                    | call      |          | (value)   | value semantics  |
   | templates/overload | none      | none     | no        | full compile-time|
   +--------------------+-----------+----------+-----------+------------------+
</code></pre>
<pre><code>   The expert instinct: reach for the LEAST powerful tool that solves the problem.
   Free-function/template &lt; CRTP &lt; variant &lt; virtual &lt; type erasure &lt; dynamic_cast,
   roughly in order of increasing runtime machinery. Don't pay for dynamism you
   don't need — but don't contort code to avoid a cheap virtual, either.
</code></pre>
<hr />
<h2 id="8-final-expert-mental-model">8. Final expert mental model</h2>
<pre><code> +-------------------------------------------------------------------+
 | Zero-overhead: you pay ONLY for the dynamism you use. Non-virtual |
 |   classes cost like C structs; virtual adds a vptr + indirect     |
 |   call; RTTI adds type_info; exceptions are free until thrown.    |
 | noexcept + trivial dtors + devirtualization make abstractions     |
 |   genuinely free in the common case.                              |
 | Polymorphism without vtables:                                     |
 |   CRTP        -&gt; compile-time, inlined, no heterogeneous container|
 |   variant     -&gt; closed set, value semantics                      |
 |   type erasure-&gt; open set, value semantics, non-intrusive (heap)  |
 | SSO/SBO stores small values inline (no malloc). Tag dispatch /    |
 |   if constexpr branch at compile time.                            |
 | Pick the least powerful tool that works.                          |
 +-------------------------------------------------------------------+
</code></pre>
<p>You&rsquo;ve now seen C++ OOP from the four pillars down to thunks, VTTs, and unwind
tables. Back to the <a href="README.md">README</a> or the <a href="16-cheatsheet.md">cheatsheet</a>.</p>` },

<pre><code class="language-cpp">// ch02 — RAII: resource freed automatically, even on exceptions
// build: clang++ -std=c++20 -Wall -Wextra ch02_raii.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;stdexcept&gt;

class Resource {
    const char* name_;
public:
    explicit Resource(const char* name) : name_(name) {
        std::cout &lt;&lt; &quot;acquire &quot; &lt;&lt; name_ &lt;&lt; '\\n';
    }
    ~Resource() { std::cout &lt;&lt; &quot;release &quot; &lt;&lt; name_ &lt;&lt; '\\n'; }
};

void risky(bool fail) {
    Resource a(&quot;A&quot;);
    Resource b(&quot;B&quot;);
    if (fail) throw std::runtime_error(&quot;boom&quot;);   // both A and B still released!
    std::cout &lt;&lt; &quot;did work\\n&quot;;
}

int main() {
    std::cout &lt;&lt; &quot;-- normal path --\\n&quot;;
    risky(false);
    std::cout &lt;&lt; &quot;-- exception path --\\n&quot;;
    try { risky(true); } catch (const std::exception&amp; e) {
        std::cout &lt;&lt; &quot;caught: &quot; &lt;&lt; e.what() &lt;&lt; '\\n';
    }
    // Note release order is reverse of acquisition (B before A).
}

</code></pre>` },
  { name: `30. Examples / Ch03 Pimpl`, path: `examples/ch03_pimpl.cpp`, dir: `examples`, words: 144, mins: 1, body: `<h1 id="ch03_pimplcpp">ch03_pimpl.cpp</h1>
<pre><code class="language-cpp">// ch03 — Pimpl idiom in a single file (normally split header/.cpp)
// build: clang++ -std=c++20 -Wall -Wextra ch03_pimpl.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;memory&gt;
#include &lt;vector&gt;
#include &lt;numeric&gt;

// ---- widget.hpp (interface only; no internals leak) ----
class Widget {
public:
    Widget();
    ~Widget();                        // defined where Impl is complete
    Widget(Widget&amp;&amp;) noexcept;
    Widget&amp; operator=(Widget&amp;&amp;) noexcept;
    void add(int x);
    int  sum() const;
private:
    struct Impl;                      // incomplete here
    std::unique_ptr&lt;Impl&gt; pimpl_;
};

// ---- widget.cpp (all real internals live here) ----
struct Widget::Impl {
    std::vector&lt;int&gt; data;
};
Widget::Widget() : pimpl_(std::make_unique&lt;Impl&gt;()) {}
Widget::~Widget() = default;                       // Impl complete -&gt; OK
Widget::Widget(Widget&amp;&amp;) noexcept = default;
Widget&amp; Widget::operator=(Widget&amp;&amp;) noexcept = default;
void Widget::add(int x) { pimpl_-&gt;data.push_back(x); }
int  Widget::sum() const {
    return std::accumulate(pimpl_-&gt;data.begin(), pimpl_-&gt;data.end(), 0);
}

int main() {
    Widget w;
    w.add(1); w.add(2); w.add(3);
    std::cout &lt;&lt; &quot;sum = &quot; &lt;&lt; w.sum() &lt;&lt; '\\n';   // 6
}

</code></pre>` },

<pre><code class="language-cpp">// ch03 — encapsulated Stack: internals hidden, invariants enforced
// build: clang++ -std=c++20 -Wall -Wextra ch03_stack.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;vector&gt;
#include &lt;stdexcept&gt;
#include &lt;iostream&gt;

template &lt;class T&gt;
class Stack {
    std::vector&lt;T&gt; data_;
public:
    bool empty() const { return data_.empty(); }
    std::size_t size() const { return data_.size(); }
    void push(T value) { data_.push_back(std::move(value)); }

    T pop() {
        if (data_.empty()) throw std::out_of_range(&quot;pop from empty stack&quot;);
        T top = std::move(data_.back());
        data_.pop_back();
        return top;
    }
    const T&amp; top() const {
        if (data_.empty()) throw std::out_of_range(&quot;top of empty stack&quot;);
        return data_.back();
    }
};

int main() {
    Stack&lt;int&gt; s;
    s.push(1); s.push(2); s.push(3);
    std::cout &lt;&lt; s.top() &lt;&lt; '\\n';   // 3
    std::cout &lt;&lt; s.pop() &lt;&lt; '\\n';   // 3
    std::cout &lt;&lt; s.size() &lt;&lt; '\\n';  // 2
    try { Stack&lt;int&gt;{}.pop(); } catch (const std::exception&amp; e) {
        std::cout &lt;&lt; &quot;caught: &quot; &lt;&lt; e.what() &lt;&lt; '\\n';
    }
}

</code></pre>` },
  { name: `32. Examples / Ch04 Rule Of Five`, path: `examples/ch04_rule_of_five.cpp`, dir: `examples`, words: 263, mins: 1, body: `<h1 id="ch04_rule_of_fivecpp">ch04_rule_of_five.cpp</h1>
<pre><code class="language-cpp">// ch04 — Rule of Five: a class that manages a raw buffer correctly
// build: clang++ -std=c++20 -Wall -Wextra ch04_rule_of_five.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;algorithm&gt;
#include &lt;cstddef&gt;
#include &lt;iostream&gt;

class Buffer {
    int* data_;
    std::size_t size_;
public:
    explicit Buffer(std::size_t n) : data_(new int[n]{}), size_(n) {
        std::cout &lt;&lt; &quot;ctor(&quot; &lt;&lt; n &lt;&lt; &quot;)\\n&quot;;
    }
    ~Buffer() { delete[] data_; }                                  // 1

    Buffer(const Buffer&amp; o) : data_(new int[o.size_]), size_(o.size_) {  // 2
        std::copy(o.data_, o.data_ + size_, data_);
        std::cout &lt;&lt; &quot;copy ctor\\n&quot;;
    }
    Buffer&amp; operator=(const Buffer&amp; o) {                           // 3
        if (this != &amp;o) {
            int* fresh = new int[o.size_];
            std::copy(o.data_, o.data_ + o.size_, fresh);
            delete[] data_;
            data_ = fresh; size_ = o.size_;
        }
        std::cout &lt;&lt; &quot;copy assign\\n&quot;;
        return *this;
    }
    Buffer(Buffer&amp;&amp; o) noexcept : data_(o.data_), size_(o.size_) { // 4
        o.data_ = nullptr; o.size_ = 0;
        std::cout &lt;&lt; &quot;move ctor\\n&quot;;
    }
    Buffer&amp; operator=(Buffer&amp;&amp; o) noexcept {                       // 5
        if (this != &amp;o) {
            delete[] data_;
            data_ = o.data_; size_ = o.size_;
            o.data_ = nullptr; o.size_ = 0;
        }
        std::cout &lt;&lt; &quot;move assign\\n&quot;;
        return *this;
    }

    std::size_t size() const { return size_; }
    void set(std::size_t i, int v) { data_[i] = v; }
    int  get(std::size_t i) const { return data_[i]; }
};

int main() {
    Buffer a(3);
    a.set(0, 42);
    Buffer b = a;              // copy ctor (deep) -&gt; independent buffer
    b.set(0, 99);
    std::cout &lt;&lt; &quot;a[0]=&quot; &lt;&lt; a.get(0) &lt;&lt; &quot; b[0]=&quot; &lt;&lt; b.get(0) &lt;&lt; '\\n'; // 42 99
    Buffer c = std::move(a);   // move ctor -&gt; steals a's buffer
    std::cout &lt;&lt; &quot;c[0]=&quot; &lt;&lt; c.get(0) &lt;&lt; &quot; a.size=&quot; &lt;&lt; a.size() &lt;&lt; '\\n'; // 42 0
}

</code></pre>` },

struct GoodBase {

<pre><code class="language-cpp">// ch07 — abstract base + programming to an interface

<pre><code class="language-cpp">// ch09 — operator overloading idioms

#include &lt;iostream&gt;

struct Vector2D {

<pre><code class="language-cpp">// ch10 — composition (has-a) vs inheritance (is-a): Stack done right
// build: clang++ -std=c++20 -Wall -Wextra ch10_stack_composition.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;vector&gt;

// Stack HAS-A vector (composition) -&gt; exposes ONLY stack operations.
template &lt;class T&gt;
class Stack {
    std::vector&lt;T&gt; data_;              // hidden implementation detail
public:
    void push(const T&amp; x) { data_.push_back(x); }
    void pop()            { data_.pop_back(); }
    const T&amp; top() const  { return data_.back(); }
    bool empty() const    { return data_.empty(); }
    std::size_t size() const { return data_.size(); }
};

int main() {
    Stack&lt;int&gt; s;
    s.push(1); s.push(2); s.push(3);
    // s[0] = 9;             // COMPILE ERROR: no operator[] -&gt; invariant safe
    // s.insert(...);        // COMPILE ERROR: no insert -&gt; can't bypass push/pop
    std::cout &lt;&lt; &quot;top=&quot; &lt;&lt; s.top() &lt;&lt; &quot; size=&quot; &lt;&lt; s.size() &lt;&lt; '\\n';  // top=3 size=3
    s.pop();
    std::cout &lt;&lt; &quot;top=&quot; &lt;&lt; s.top() &lt;&lt; &quot; size=&quot; &lt;&lt; s.size() &lt;&lt; '\\n';  // top=2 size=2
}

// build: clang++ -std=c++20 -Wall -Wextra ch11_static_friend.cpp -o /tmp/d &amp;&amp; /tmp/d

class Entity {

<pre><code class="language-cpp">// ch12 — Dependency Inversion: depend on an abstraction, inject the impl
// build: clang++ -std=c++20 -Wall -Wextra ch12_dip.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;string&gt;

struct IMessageSender {
    virtual void send(const std::string&amp; msg) = 0;
    virtual ~IMessageSender() = default;
};

class EmailSender : public IMessageSender {
public:
    void send(const std::string&amp; msg) override {
        std::cout &lt;&lt; &quot;[email] &quot; &lt;&lt; msg &lt;&lt; '\\n';
    }
};
class SmsSender : public IMessageSender {
public:
    void send(const std::string&amp; msg) override {
        std::cout &lt;&lt; &quot;[sms] &quot; &lt;&lt; msg &lt;&lt; '\\n';
    }
};

// High-level policy depends on the abstraction, not a concrete sender:
class NotificationService {
    IMessageSender&amp; sender_;
public:
    explicit NotificationService(IMessageSender&amp; s) : sender_(s) {}
    void notify(const std::string&amp; msg) { sender_.send(msg); }
};

int main() {
    EmailSender email;
    SmsSender   sms;

    NotificationService viaEmail(email);
    NotificationService viaSms(sms);
    viaEmail.notify(&quot;build passed&quot;);   // [email] build passed
    viaSms.notify(&quot;build passed&quot;);     // [sms] build passed
    // swapping the sender required NO change to NotificationService.
}

</code></pre>` },

<pre><code class="language-cpp">// ch13 — Decorator pattern: add behavior by wrapping
// build: clang++ -std=c++20 -Wall -Wextra ch13_decorator.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;memory&gt;
#include &lt;string&gt;

struct DataSource {
    virtual std::string read() = 0;
    virtual ~DataSource() = default;
};

struct FileSource : DataSource {
    std::string read() override { return &quot;raw&quot;; }
};

struct Decorator : DataSource {
    std::unique_ptr&lt;DataSource&gt; inner_;
    explicit Decorator(std::unique_ptr&lt;DataSource&gt; d) : inner_(std::move(d)) {}
};

struct Encrypted : Decorator {
    using Decorator::Decorator;
    std::string read() override { return &quot;enc(&quot; + inner_-&gt;read() + &quot;)&quot;; }
};
struct Compressed : Decorator {
    using Decorator::Decorator;
    std::string read() override { return &quot;zip(&quot; + inner_-&gt;read() + &quot;)&quot;; }
};

int main() {
    auto s = std::make_unique&lt;Compressed&gt;(
                 std::make_unique&lt;Encrypted&gt;(
                     std::make_unique&lt;FileSource&gt;()));
    std::cout &lt;&lt; s-&gt;read() &lt;&lt; '\\n';   // zip(enc(raw))
}

</code></pre>` },

<pre><code class="language-cpp">// ch13 — Observer pattern (publish/subscribe)
// build: clang++ -std=c++20 -Wall -Wextra ch13_observer.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

struct Observer {
    virtual void on_update(int value) = 0;
    virtual ~Observer() = default;
};

class Subject {
    std::vector&lt;Observer*&gt; observers_;   // non-owning
    int state_ = 0;
public:
    void subscribe(Observer* o) { observers_.push_back(o); }
    void set_state(int v) {
        state_ = v;
        for (auto* o : observers_) o-&gt;on_update(state_);
    }
};

struct Display : Observer {
    std::string name;
    explicit Display(std::string n) : name(std::move(n)) {}
    void on_update(int value) override {
        std::cout &lt;&lt; name &lt;&lt; &quot; sees &quot; &lt;&lt; value &lt;&lt; '\\n';
    }
};

int main() {
    Subject temperature;
    Display a(&quot;PhoneApp&quot;), b(&quot;Dashboard&quot;);
    temperature.subscribe(&amp;a);
    temperature.subscribe(&amp;b);

    temperature.set_state(21);   // both observers notified
    temperature.set_state(25);
}

</code></pre>` },

<pre><code class="language-cpp">// ch14 — C++23 deducing 'this': one member for all cv/ref qualifications
// build: clang++ -std=c++23 -Wall -Wextra ch14_deducing_this.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;utility&gt;
#include &lt;type_traits&gt;

class Widget {
    std::string data_ = &quot;hello&quot;;
public:
    // A single accessor that returns a reference matching the caller's value
    // category / constness — replaces const&amp;, &amp;, and &amp;&amp; overloads.
    template &lt;class Self&gt;
    auto&amp;&amp; data(this Self&amp;&amp; self) {
        return std::forward&lt;Self&gt;(self).data_;
    }
};

int main() {
    Widget w;
    const Widget cw;

    std::cout &lt;&lt; w.data() &lt;&lt; '\\n';                 // hello (std::string&amp;)
    std::cout &lt;&lt; cw.data() &lt;&lt; '\\n';                // hello (const std::string&amp;)
    std::string taken = std::move(w).data();       // moves out (std::string&amp;&amp;)
    std::cout &lt;&lt; &quot;taken=&quot; &lt;&lt; taken &lt;&lt; &quot; left='&quot; &lt;&lt; w.data() &lt;&lt; &quot;'\\n&quot;;

    // Show that the returned ref-ness matches the caller:
    static_assert(std::is_same_v&lt;decltype(w.data()),  std::string&amp;&gt;);
    static_assert(std::is_same_v&lt;decltype(cw.data()), const std::string&amp;&gt;);
    static_assert(std::is_same_v&lt;decltype(std::move(w).data()), std::string&amp;&amp;&gt;);
}

</code></pre>` },

<pre><code class="language-cpp">// ch14 — modern OOP: virtual + unique_ptr, no raw new/delete, no leaks
// build: clang++ -std=c++20 -Wall -Wextra ch14_modern_shapes.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;memory&gt;
#include &lt;vector&gt;

class Shape {
public:
    virtual double area() const = 0;
    virtual ~Shape() = default;
};

class Circle final : public Shape {
    double r_;
public:
    explicit Circle(double r) : r_(r) {}
    double area() const override { return 3.14159265 * r_ * r_; }
};

class Rectangle final : public Shape {
    double w_, h_;
public:
    Rectangle(double w, double h) : w_(w), h_(h) {}
    double area() const override { return w_ * h_; }
};

std::unique_ptr&lt;Shape&gt; make_circle(double r) { return std::make_unique&lt;Circle&gt;(r); }

int main() {

    shapes.push_back(make_circle(2.0));
    shapes.push_back(std::make_unique&lt;Rectangle&gt;(3.0, 4.0));

    double total = 0;
    for (const auto&amp; s : shapes) total += s-&gt;area();
    std::cout &lt;&lt; &quot;total = &quot; &lt;&lt; total &lt;&lt; '\\n';   // 24.5664

<pre><code class="language-cpp">// ch14 — unique_ptr / shared_ptr / weak_ptr ownership
// build: clang++ -std=c++20 -Wall -Wextra ch14_smart_pointers.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;memory&gt;

struct Resource {
    int id;
    explicit Resource(int i) : id(i) { std::cout &lt;&lt; &quot;acquire #&quot; &lt;&lt; id &lt;&lt; '\\n'; }
    ~Resource() { std::cout &lt;&lt; &quot;release #&quot; &lt;&lt; id &lt;&lt; '\\n'; }
};

int main() {
    std::cout &lt;&lt; &quot;-- unique_ptr (sole owner) --\\n&quot;;
    {
        auto up = std::make_unique&lt;Resource&gt;(1);
        std::cout &lt;&lt; &quot;using #&quot; &lt;&lt; up-&gt;id &lt;&lt; '\\n';
    }   // released here automatically

    std::cout &lt;&lt; &quot;-- shared_ptr (shared owner) --\\n&quot;;
    std::weak_ptr&lt;Resource&gt; weak;
    {
        auto sp1 = std::make_shared&lt;Resource&gt;(2);
        weak = sp1;
        {
            auto sp2 = sp1;   // refcount = 2
            std::cout &lt;&lt; &quot;use_count = &quot; &lt;&lt; sp1.use_count() &lt;&lt; '\\n';   // 2

        std::cout &lt;&lt; &quot;weak alive? &quot; &lt;&lt; !weak.expired() &lt;&lt; '\\n';       // 1
    }   // sp1 gone -&gt; released

  { name: `50. Examples / Ch14 Variant`, path: `examples/ch14_variant.cpp`, dir: `examples`, words: 161, mins: 1, body: `<h1 id="ch14_variantcpp">ch14_variant.cpp</h1>
<pre><code class="language-cpp">// ch14 — closed-set polymorphism with std::variant + std::visit
// build: clang++ -std=c++20 -Wall -Wextra ch14_variant.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;variant&gt;
#include &lt;vector&gt;

struct Circle { double r; double area() const { return 3.14159265 * r * r; } };
struct Square { double s; double area() const { return s * s; } };
struct Rect   { double w, h; double area() const { return w * h; } };

using Shape = std::variant&lt;Circle, Square, Rect&gt;;

double area(const Shape&amp; sh) {
    return std::visit([](const auto&amp; x) { return x.area(); }, sh);
}

int main() {
    std::vector&lt;Shape&gt; shapes{ Circle{2.0}, Square{3.0}, Rect{2.0, 5.0} };
    double total = 0;
    for (const auto&amp; s : shapes) {
        std::cout &lt;&lt; &quot;area = &quot; &lt;&lt; area(s) &lt;&lt; '\\n';
        total += area(s);
    }
    std::cout &lt;&lt; &quot;total = &quot; &lt;&lt; total &lt;&lt; '\\n';   // 12.566 + 9 + 10 = 31.566
    // Value semantics: no heap, no vtable, no inheritance. Closed set of types.
}

<pre><code class="language-cpp">// ch17 — object layout: padding, standard-layout, EBO, [[no_unique_address]]
// build: clang++ -std=c++20 -Wall -Wextra ch17_ebo.cpp -o /tmp/d &amp;&amp; /tmp/d
//
// Bonus: dump exact field offsets with:
//   clang++ -std=c++20 -Xclang -fdump-record-layouts -c ch17_ebo.cpp
#include &lt;cstddef&gt;
#include &lt;iostream&gt;
#include &lt;type_traits&gt;

struct S      { char c; double d; int i; };   // padding demo
struct S2     { double d; int i; char c; };    // reordered -&gt; smaller

struct Empty  {};
struct AsMember { Empty e; int x; };           // empty as MEMBER -&gt; costs space
struct AsBase : Empty { int x; };              // empty as BASE   -&gt; EBO (0 bytes)

struct WithNUA {
    [[no_unique_address]] Empty e;             // C++20 EBO for members
    int x;
};

struct Poly { int x; virtual ~Poly() = default; };  // vptr at offset 0

int main() {
    std::cout &lt;&lt; std::boolalpha;
    std::cout &lt;&lt; &quot;sizeof(S)  = &quot; &lt;&lt; sizeof(S)  &lt;&lt; &quot; (padding)\\n&quot;;      // 24
    std::cout &lt;&lt; &quot;sizeof(S2) = &quot; &lt;&lt; sizeof(S2) &lt;&lt; &quot; (reordered)\\n&quot;;    // 16

    std::cout &lt;&lt; &quot;sizeof(AsMember) = &quot; &lt;&lt; sizeof(AsMember) &lt;&lt; '\\n';    // 8
    std::cout &lt;&lt; &quot;sizeof(AsBase)   = &quot; &lt;&lt; sizeof(AsBase)   &lt;&lt; &quot; (EBO)\\n&quot;; // 4
    std::cout &lt;&lt; &quot;sizeof(WithNUA)  = &quot; &lt;&lt; sizeof(WithNUA)  &lt;&lt; &quot; (no_unique_address)\\n&quot;; // 4

    std::cout &lt;&lt; &quot;is_standard_layout&lt;S&gt;   = &quot; &lt;&lt; std::is_standard_layout_v&lt;S&gt;   &lt;&lt; '\\n'; // true
    std::cout &lt;&lt; &quot;is_standard_layout&lt;Poly&gt;= &quot; &lt;&lt; std::is_standard_layout_v&lt;Poly&gt;&lt;&lt; '\\n'; // false
    std::cout &lt;&lt; &quot;sizeof(Poly) = &quot; &lt;&lt; sizeof(Poly) &lt;&lt; &quot; (has vptr)\\n&quot;; // 16

    std::cout &lt;&lt; &quot;offsetof(S, d) = &quot; &lt;&lt; offsetof(S, d) &lt;&lt; '\\n';        // 8
    std::cout &lt;&lt; &quot;offsetof(S2,c) = &quot; &lt;&lt; offsetof(S2, c) &lt;&lt; '\\n';       // 12

  { name: `52. Examples / Ch18 Vtable Dump`, path: `examples/ch18_vtable_dump.cpp`, dir: `examples`, words: 309, mins: 2, body: `<h1 id="ch18_vtable_dumpcpp">ch18_vtable_dump.cpp</h1>
<pre><code class="language-cpp">// ch18 — peek at a live vtable and call through it manually.
// build: clang++ -std=c++20 -Wall -Wextra ch18_vtable_dump.cpp -o /tmp/d &amp;&amp; /tmp/d
//
// *** ABI-SPECIFIC, FOR LEARNING ONLY ***
// This relies on the Itanium C++ ABI vtable layout (GCC/Clang on Linux/macOS):
//   - the vptr is the first word of a polymorphic object
//   - the vptr points at the first virtual-function slot (&quot;address point&quot;)
//   - slots are in declaration order (base virtuals first)
// It is technically UB by the language; do NOT do this in real code.
#include &lt;cstdint&gt;
#include &lt;iostream&gt;

struct Base {
    virtual int  f() const { return 1; }   // slot 0
    virtual int  g() const { return 2; }   // slot 1
    virtual ~Base() = default;             // dtor slots follow
};
struct Derived : Base {
    int x = 42;
    int f() const override { return 100; } // overrides slot 0
    int g() const override { return 200; } // overrides slot 1
};

using Fn = int (*)(const void*);           // signature: takes 'this'

int main() {
    Derived d;
    Base* p = &amp;d;

    std::cout &lt;&lt; &quot;normal virtual calls:  f()=&quot; &lt;&lt; p-&gt;f()
              &lt;&lt; &quot; g()=&quot; &lt;&lt; p-&gt;g() &lt;&lt; &quot;\\n\\n&quot;;      // 100 200

    Fn slot0 = reinterpret_cast&lt;Fn&gt;(vtable[0]);

    std::cout &lt;&lt; &quot;manual vtable[0](this) = &quot; &lt;&lt; slot0(p) &lt;&lt; '\\n';   // 100
    std::cout &lt;&lt; &quot;manual vtable[1](this) = &quot; &lt;&lt; slot1(p) &lt;&lt; '\\n';   // 200

    // The RTTI pointer sits just ABOVE the address point (vptr[-1]):
    void* rtti = *reinterpret_cast&lt;void**&gt;(reinterpret_cast&lt;char*&gt;(vtable) - sizeof(void*));

<pre><code class="language-cpp">// ch20 — multiple inheritance: base subobjects live at different addresses,
//        pointer casts ADJUST the value, and dynamic_cast&lt;void*&gt; finds the top.
// build: clang++ -std=c++20 -Wall -Wextra ch20_this_adjust.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;cstdint&gt;
#include &lt;iostream&gt;

struct A { int a = 1; virtual void fa() {} virtual ~A() = default; };
struct B { int b = 2; virtual void fb() {} virtual ~B() = default; };
struct C : A, B { int c = 3; void fa() override {} void fb() override {} };

static std::uintptr_t addr(const void* p) { return reinterpret_cast&lt;std::uintptr_t&gt;(p); }

int main() {
    C c;
    C* pc = &amp;c;
    A* pa = pc;                 // no adjustment (A is the primary base @ offset 0)
    B* pb = pc;                 // ADJUSTED: pb = pc + sizeof(A-subobject)

    std::cout &lt;&lt; std::hex &lt;&lt; std::showbase;
    std::cout &lt;&lt; &quot;C* = &quot; &lt;&lt; addr(pc) &lt;&lt; '\\n';
    std::cout &lt;&lt; &quot;A* = &quot; &lt;&lt; addr(pa) &lt;&lt; &quot;  (delta from C = &quot; &lt;&lt; std::dec
              &lt;&lt; (addr(pa) - addr(pc)) &lt;&lt; std::hex &lt;&lt; &quot;)\\n&quot;;
    std::cout &lt;&lt; &quot;B* = &quot; &lt;&lt; addr(pb) &lt;&lt; &quot;  (delta from C = &quot; &lt;&lt; std::dec
              &lt;&lt; (addr(pb) - addr(pc)) &lt;&lt; std::hex &lt;&lt; &quot;)\\n&quot;;

    // Recover the most-derived object address from a secondary base pointer:
    void* top = dynamic_cast&lt;void*&gt;(pb);   // uses offset-to-top in B's vtable
    std::cout &lt;&lt; std::dec &lt;&lt; &quot;\\ndynamic_cast&lt;void*&gt;(B*) == C*? &quot;
              &lt;&lt; std::boolalpha &lt;&lt; (top == static_cast&lt;void*&gt;(pc)) &lt;&lt; '\\n';

    // Cross-cast A* -&gt; B* (only dynamic_cast can do this):
    B* viaCross = dynamic_cast&lt;B*&gt;(pa);
    std::cout &lt;&lt; &quot;cross-cast A*-&gt;B* == B*? &quot; &lt;&lt; (viaCross == pb) &lt;&lt; '\\n';
}

<pre><code class="language-cpp">// ch21 — RTTI: typeid, demangling, dynamic_cast (down + cross), bad_cast
// build: clang++ -std=c++20 -Wall -Wextra ch21_rtti.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;memory&gt;
#include &lt;string&gt;
#include &lt;typeinfo&gt;
#include &lt;typeindex&gt;
#include &lt;unordered_map&gt;

#if defined(__GNUG__)     // GCC/Clang: demangle the ABI name
  #include &lt;cxxabi.h&gt;
  static std::string demangle(const char* n) {
      int st = 0;
      char* d = abi::__cxa_demangle(n, nullptr, nullptr, &amp;st);
      std::string s = (st == 0 &amp;&amp; d) ? d : n;
      std::free(d);
      return s;
  }
#else
  static std::string demangle(const char* n) { return n; }
#endif

struct Animal { virtual ~Animal() = default; };
struct Dog : Animal {};
struct Cat : Animal {};

struct Swimmer { virtual ~Swimmer() = default; };
struct Platypus : Animal, Swimmer {};       // multiple inheritance -&gt; cross-cast

int main() {
    std::unique_ptr&lt;Animal&gt; a = std::make_unique&lt;Dog&gt;();

    std::cout &lt;&lt; &quot;typeid(*a).name() demangled = &quot; &lt;&lt; demangle(typeid(*a).name()) &lt;&lt; '\\n';

    // Downcast: checked at runtime
    std::cout &lt;&lt; &quot;dynamic_cast&lt;Dog*&gt; : &quot; &lt;&lt; (dynamic_cast&lt;Dog*&gt;(a.get()) ? &quot;Dog&quot; : &quot;null&quot;) &lt;&lt; '\\n';
    std::cout &lt;&lt; &quot;dynamic_cast&lt;Cat*&gt; : &quot; &lt;&lt; (dynamic_cast&lt;Cat*&gt;(a.get()) ? &quot;Cat&quot; : &quot;null&quot;) &lt;&lt; '\\n';

    // Cross-cast across multiple inheritance:
    std::unique_ptr&lt;Animal&gt; p = std::make_unique&lt;Platypus&gt;();
    Swimmer* s = dynamic_cast&lt;Swimmer*&gt;(p.get());   // Animal* -&gt; Swimmer* sideways
    std::cout &lt;&lt; &quot;cross-cast Animal*-&gt;Swimmer* : &quot; &lt;&lt; (s ? &quot;ok&quot; : &quot;null&quot;) &lt;&lt; '\\n';

    // Reference cast failure throws:
    try {
        Cat&amp; bad = dynamic_cast&lt;Cat&amp;&gt;(*a);          // *a is a Dog -&gt; throws
        (void)bad;
    } catch (const std::bad_cast&amp; e) {
        std::cout &lt;&lt; &quot;dynamic_cast&lt;Cat&amp;&gt; threw: &quot; &lt;&lt; e.what() &lt;&lt; '\\n';
    }

    // type_index as a map key (type-erased registry):
    std::unordered_map&lt;std::type_index, std::string&gt; reg;
    reg[typeid(Dog)] = &quot;woof&quot;; reg[typeid(Cat)] = &quot;meow&quot;;
    std::cout &lt;&lt; &quot;registry[typeid(*a)] = &quot; &lt;&lt; reg[typeid(*a)] &lt;&lt; '\\n';   // woof
}

</code></pre>` },

<pre><code class="language-cpp">// ch22 — pointers to members: data (offset) and function (2-word {ptr, adj}),
//        and how a member-function pointer to a VIRTUAL still dispatches.
// build: clang++ -std=c++20 -Wall -Wextra ch22_ptmf.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;

struct Point { int x; int y; };

struct Base {
    virtual int f() { return 1; }   // virtual
    int g() { return 2; }           // non-virtual
    virtual ~Base() = default;
};
struct Derived : Base {
    int f() override { return 100; }
};

int main() {
    // --- pointer to DATA member: really an offset ---
    int Point::* px = &amp;Point::x;
    int Point::* py = &amp;Point::y;
    Point p{10, 20};
    std::cout &lt;&lt; &quot;p.*px = &quot; &lt;&lt; p.*px &lt;&lt; &quot;, p.*py = &quot; &lt;&lt; p.*py &lt;&lt; '\\n';  // 10 20

    // --- pointer to MEMBER FUNCTION: two words; virtual dispatches correctly ---
    int (Base::* pf)() = &amp;Base::f;   // points at a VIRTUAL
    int (Base::* pg)() = &amp;Base::g;   // points at a non-virtual

    Base b;
    Derived d;
    Base&amp; rb = d;                    // refers to a Derived

    std::cout &lt;&lt; &quot;(b.*pf)()  = &quot; &lt;&lt; (b.*pf)()  &lt;&lt; '\\n';   // 1   (Base::f)
    std::cout &lt;&lt; &quot;(rb.*pf)() = &quot; &lt;&lt; (rb.*pf)() &lt;&lt; '\\n';   // 100 (Derived::f! virtual)
    std::cout &lt;&lt; &quot;(b.*pg)()  = &quot; &lt;&lt; (b.*pg)()  &lt;&lt; '\\n';   // 2   (non-virtual)

    std::cout &lt;&lt; &quot;\\nsizeof(int Point::*)      = &quot; &lt;&lt; sizeof(px) &lt;&lt; &quot; (data: 1 word)\\n&quot;;
    std::cout &lt;&lt; &quot;sizeof(int (Base::*)())  = &quot; &lt;&lt; sizeof(pf)
              &lt;&lt; &quot; (function: often 2 words {ptr, this-adjust})\\n&quot;;
}

<pre><code class="language-cpp">// ch23 — CRTP: static polymorphism with zero runtime overhead (no vtable)
// build: clang++ -std=c++20 -Wall -Wextra ch23_crtp.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;

template &lt;class Derived&gt;
struct Shape {                       // CRTP base
    double area() const {
        // static (compile-time) dispatch to the derived implementation:
        return static_cast&lt;const Derived*&gt;(this)-&gt;area_impl();
    }
    void describe() const {
        std::cout &lt;&lt; &quot;area = &quot; &lt;&lt; area() &lt;&lt; '\\n';   // base code, derived behavior
    }
};

struct Circle : Shape&lt;Circle&gt; {
    double r;
    explicit Circle(double r) : r(r) {}
    double area_impl() const { return 3.14159265 * r * r; }
};

struct Square : Shape&lt;Square&gt; {
    double s;
    explicit Square(double s) : s(s) {}
    double area_impl() const { return s * s; }
};

// A generic function constrained to CRTP shapes — resolved at compile time,
// fully inlinable, NO virtual dispatch and NO vptr in the objects:
template &lt;class T&gt;
void print_area(const Shape&lt;T&gt;&amp; shape) { shape.describe(); }

int main() {
    Circle c(2.0);
    Square s(3.0);
    print_area(c);   // area = 12.5664
    print_area(s);   // area = 9

    std::cout &lt;&lt; &quot;sizeof(Circle) = &quot; &lt;&lt; sizeof(Circle)
              &lt;&lt; &quot; (no vptr -&gt; just the double)\\n&quot;;   // 8
}

];

const docSelect = document.getElementById('docSelect');
const docList = document.getElementById('docList');
const tabPanels = document.getElementById('tabPanels');
const navDocTitle = document.getElementById('navDocTitle');
let navLastY = 0;

// Prettify function in JS (matching Python's prettify)
function prettify(component) {
    let c = component.replace(/^[0-9]+[_-]/, '');
    c = c.replace(/_/g, ' ').replace(/-/g, ' ').trim();
    if (c.toLowerCase() === 'readme') return 'README';
    if (c.toLowerCase() === 'cheatsheet') return 'Cheatsheet';
    return c.replace(/\b\w/g, l => l.toUpperCase());
}

// Like prettify(), but keeps any leading "01_"/"2-" style number as a "01. "
// prefix so the sidebar mirrors the on-disk ordering of the documents.
function prettifyKeepNum(component) {
    const m = component.match(/^([0-9]+)[_-]/);
    const prefix = m ? m[1] + '. ' : '';
    return prefix + prettify(component);
}

const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => HTML_ESCAPES[c]); }
function cleanName(name) { return (name || '').replace(/^\s*\d+\.\s*/, ''); }

const CLOCK_ICON = '<svg class="icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8.75-4.25v3.94l2.4 2.4a.75.75 0 0 1-1.06 1.06l-2.62-2.62a.75.75 0 0 1-.22-.53V3.75a.75.75 0 0 1 1.5 0Z"></path></svg>';

TAB_DATA.forEach((tab, idx) => {
    const opt = document.createElement('option');
    opt.value = String(idx);
    opt.textContent = tab.name;
    docSelect.appendChild(opt);

    const panel = document.createElement('div');
    panel.className = 'tab-content';
    panel.id = 'panel-' + idx;
    panel.dataset.dir = tab.dir || '';
    panel.innerHTML = tab.body;

    // Breadcrumb + reading-time meta line (prepended, built once).
    const meta = document.createElement('div');
    meta.className = 'doc-meta';
    const crumbs = cleanName(tab.name).split(' / ');
    const crumbHtml = crumbs.map((c, i) =>
        '<span class="crumb">' + escapeHtml(c) + '</span>' +
        (i < crumbs.length - 1 ? '<span class="crumb-sep">/</span>' : '')
    ).join('');
    const words = (tab.words || 0).toLocaleString();
    meta.innerHTML =
        '<span class="doc-breadcrumb">' + crumbHtml + '</span>' +
        '<span class="doc-reading-time">' + CLOCK_ICON +
        (tab.mins || 1) + ' min read \u00b7 ' + words + ' words</span>';
    panel.insertBefore(meta, panel.firstChild);

    tabPanels.appendChild(panel);
});

// Build directory tree structure
const docTree = { files: [], dirs: {} };
TAB_DATA.forEach((tab, idx) => {
    const parts = (tab.path || '').split('/');
    let current = docTree;
    for (let i = 0; i < parts.length - 1; i++) {
        const dirName = parts[i];
        if (!current.dirs[dirName]) {
            current.dirs[dirName] = { files: [], dirs: {} };
        }
        current = current.dirs[dirName];
    }
    current.files.push({ tab, idx });
});

// Build HTML from tree
function createTreeHtml(node, parentPath = '') {
    const ul = document.createElement('ul');
    ul.className = 'nav-list';
    
    // Sort directories and add them
    Object.keys(node.dirs).sort().forEach(dirName => {
        const dirNode = node.dirs[dirName];
        const li = document.createElement('li');
        li.className = 'nav-dir-item expanded'; // expanded by default
        
        const header = document.createElement('div');
        header.className = 'nav-dir-header';
        
        const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        chevron.setAttribute('class', 'icon chevron-icon');
        chevron.setAttribute('viewBox', '0 0 16 16');
        chevron.innerHTML = '<path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"></path>';
        
        const folder = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        folder.setAttribute('class', 'icon folder-icon');
        folder.setAttribute('viewBox', '0 0 16 16');
        folder.innerHTML = '<path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.58L6.06 1.48A1.75 1.75 0 0 0 4.81 1H1.75Zm0 1.5h3.06c.2 0 .39.08.53.22L6.873 4.25H14.25a.25.25 0 0 1 .25.25v8.5a.25.25 0 0 1-.25.25H1.75a.25.25 0 0 1-.25-.25v-10.5a.25.25 0 0 1 .25-.25Z"></path>';
        
        const label = document.createElement('span');
        label.className = 'dir-name';
        label.textContent = prettifyKeepNum(dirName);
        
        header.appendChild(chevron);
        header.appendChild(folder);
        header.appendChild(label);
        li.appendChild(header);
        
        const childrenContainer = createTreeHtml(dirNode, parentPath ? parentPath + '/' + dirName : dirName);
        childrenContainer.className = 'nav-dir-children';
        li.appendChild(childrenContainer);
        
        header.addEventListener('click', (e) => {
            e.stopPropagation();
            li.classList.toggle('expanded');
        });
        
        ul.appendChild(li);
    });
    
    // Sort and add files
    node.files.forEach(({ tab, idx }) => {
        const li = document.createElement('li');

        a.href = '#tab-' + idx;

        const baseName = tab.path.split('/').pop() || tab.name;
        let displayName = baseName.replace(/\.[a-zA-Z0-9]+$/, '');
        displayName = prettifyKeepNum(displayName);
        
        a.textContent = displayName;
        a.title = tab.name;
        a.dataset.docIdx = String(idx);
        a.addEventListener('click', function(e) {
            e.preventDefault();
            activateTab(idx);
        });
        li.appendChild(a);
        ul.appendChild(li);
    });
    
    return ul;
}

const treeHtml = createTreeHtml(docTree);

/* ───── Cross-document link resolution (supports nested folders) ─────
   Docs may live in sub-directories and link to each other with relative
   paths ("../03_patterns/README.md"), bare files ("CHEATSHEET.md") or even a
   folder ("01_pthreads/"), which we resolve to that folder's README. */
const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

TAB_DATA.forEach((tab, idx) => {
    const path = (tab.path || '').toLowerCase();
    if (path) BY_PATH[path] = idx;
    const base = path.split('/').pop();
    if (base) {
        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;
        else BY_BASENAME[base] = idx;
    }
    if (base === 'readme.md') {
        BY_DIR_README[(tab.dir || '').toLowerCase()] = idx;
    }
});
Object.keys(BASENAME_DUP).forEach(b => { delete BY_BASENAME[b]; });

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}
classifyLinks();

docSelect.addEventListener('change', () => {
    activateTab(parseInt(docSelect.value, 10));
});

/* Previous / next document buttons in the navbar. */
const docPrevBtn = document.getElementById('docPrev');
const docNextBtn = document.getElementById('docNext');
if (docPrevBtn) docPrevBtn.addEventListener('click', () => {
    const i = currentTabIdx();
    if (i > 0) { pushHistory(); activateTab(i - 1); }
});
if (docNextBtn) docNextBtn.addEventListener('click', () => {
    const i = currentTabIdx();
    if (i < TAB_DATA.length - 1) { pushHistory(); activateTab(i + 1); }
});

function updateDocNav(idx) {
    if (docPrevBtn) docPrevBtn.disabled = (idx <= 0);
    if (docNextBtn) docNextBtn.disabled = (idx >= TAB_DATA.length - 1);
}

/* ───── Syntax highlighting ───── */

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

/* ───── Wrap tables so they scroll horizontally on narrow screens ───── */
function wrapTables() {
    document.querySelectorAll('.tab-content table').forEach(table => {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
}
